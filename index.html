            {
                id: "csi_12", number: 12, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Nu vă temeţi de ei!", text: `1. Înainte, al Meu popor,\nCu vestea ‘Mpărăţiei!\nNu tremura de dușman!\nCei de bine să știe,\nIehova-i Atotputernic.\nCurând va lovi mortal\nȘi nimici pe nemernic,\nScoţând prizonieri din lanţ.\n\nRefren:\nNu te teme, iubitul Meu,\nDeși ei sunt lăudăroși!\nEu voi păstra pe Servul Meu\nCa lumina ochilor!\n\n2. Deși ameninţările\nSunt numeroase și mari,\nDeși ei vorbesc dulce,\nSpre a înșela pe slabi,\nNu te teme, războinice!\nNu fii deci descurajat,\nCă Dumnezeu te păzește,\nLiber și înviorat!\n\n3. Nu te teme că ești uitat!\nEu sunt scut și pavăză!\nDeși mori pe câmp căzut,\nChiar și moartea-Mi cedează.\nChiar dacă-ţi ucide trupul,\nSufletul e ocrotit.\nFii credincios până-n sfârșit,\nȘi vei ajunge ţelul!` }
                }
            },
            {
                id: "csi_13", number: 13, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Laudă pe Regele veșniciei!", text: `1. Etern Domn și Rege ceresc,\nNumele-Ţi fie prea ‘nălţat!\nCând cete-n cer Te prea măresc,\nJos iubirea-Ţi au proclamat.\n\n2. Cu inima spre Tine tind!\nNumai în Tin’ am speranţă!\nVestesc adevărul oricând,\nIubirea-Ţi cu stăruinţă.\n\n3. Sus, a mea limbă și liră,\nCă cu zorile timpurii\nCântări sufletu-mi inspiră,\nSăltând muzica pe câmpii!\n\n4. Cu cei ce în har abundă,\nŢie-ţi aduc mulţumire!\nPământul viaţă prindă,\nS-aud’ a Ta bucurie!` }
                }
            },
            {
                id: "csi_14", number: 14, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Curaj", text: `1. Nu te teme, turmă mică,\nDeși groaznic te atacă\nNemernicul dușman!\nCe voia-ţi strică când și când,\nCă vezi sfinţii pierzând, ce e\nNumai aparenţă.\n\n2. Fii vesel! A ta cauză\nChiar Domnul o va răzbuna.\nÎncrede-te-n Domnul!\nDeși de-ai lumii ochi ascuns,\nTotuși de credinţă pătruns,\nAscultă-I cuvântul!\n\n3. Ascultă-ne rugăciunea!\nPentru numele Tău mare,\nCei răi să nu ‘nvingă!\nDeși sunt mulţi dușmanii Tăi,\nTu ești cu noi, suntem ai Tăi!\nPacea e a noastră.` }
                }
            },
            {
                id: "csi_15", number: 15, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "O viaţă a laudei", text: `1. O, umple-mi, Doamne, viaţa\nCu a Ta laudă!\nToată viaţa mea fie\nMartor pentru Tine!\nȘi că nu numai inima,\nȘi gura-mi Te laudă!\nO, dă-mi, Doamne, o viaţă\nPe Tin’ să Te laude!\n\n2. Umple-mă cu a Ta laudă!\nPuterea-mi vorbească\nDespre iubirea Ta, Doamne,\nChiar dacă eu sunt slab!\nCă de la mine vei primi\nCuvenita slavă,\nȘi voi începe a rosti\nCântarea cea nouă.` }
                }
            },
            {
                id: "csi_16", number: 16, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Parola ne este: “Înainte!”", text: `1. Parola ne este: “Cu toţi, ‘nainte!”\nCu ochii ţintă, ‘napoi noi să nu dăm!\n‘Naintea noastră stâlpul de foc arde.\nIsus ne conduce. Cu toţi să-L urmăm!\nPrin trudă și luptă să-L servim voioși!\nNoi a Sionului lumină vedem.\n\n2. Înainte, dar, a lui Isus turmă,\nPân’ a lui Dumnezeu scop se ‘mplinește!\nTristul mângâiere, orbul lumină\nVor primi ei atunci și vestea bună.\nCeaţa rătăcirii noi să alungăm!\nCu arma Scripturii s-o împrăștiem!\n\n3. Glorii măreţe Domnul ne-a pregătit,\nDe car’ se ‘mpărtășesc toţi cei ce-L iubesc.\nOchiul n-a văzut, urechea n-auzit,\nNici în mintea omului nu s-a suit.\nÎnainte, dar, pe calea luminii!\nÎndepărtând vălul, credinţa păzim.` }
                }
            },
            {
                id: "csi_17", number: 17, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Daţi laudă lui Iehova!", text: `1. Laudă pe Iehova!\nNimic nu-i al tău.\nLaudă, ‘nchinăciune\nLui se cuvine.\nDe la tin’ nu-i nimic.\nToate El le dă.\nLui să-I dai mulţumiri!\nCinste merită!\n\n2. Tot la El să privești,\nȘi nu spre tine!\nDomnul cerului\nÎţi va fi mărire.\nDă-I întâietate,\nTot cu El umblând!\nCere-I sfaturile,\nDrumu-ţi conducând!\n\n3. Spune mângâierea\nPărintelui sfânt!\nDacă-ţi dă ocazii,\nMulţumește-I Lui!\nLaudă pe Iehova,\nȘi ‘Mpărăţia,\nPână orice popor\nNu-I dă temerea!` }
                }
            },
            {
                id: "csi_18", number: 18, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Bunătatea lui Iehova", text: `1. Dumnezeu, a Ta milă,\nLa toţi se revarsă! (revarsă)\nPeste bun și peste rău,\nReverși ploaie pârâu. (râu, pârâu)\nCelui din închisoare,\nDin a morţii umbră,\nZice: “Vino afară!\nChristos te-a lumina!” (lumina) \n\n2. Sunt plăcuţi, ‘naintea Lui,\nCei ce de El se tem, (tem de El)\nȘi, bazaţi pe-a Lui milă,\nCu Christos cântă ferm. (cântă ferm)\nMila-I fără margini\nLa toţi cei prinși se ‘mparte.\nTe lăudăm, Doamne Mare,\nPentru-a Ta ‘ndurare! (‘ndurare)\n\n3. Lăudăm bunătatea Ta,\nCe nouă ne-o arăţi, (ne-o arăţi)\nNe-ai făcut cunoscute\nA’ Tale mari taine! (mari taine)\nCa stânca de tari îţi sunt\nPromisiunile.\nIubirea și mila Ta\nNicicând margini nu au! (n-au margini)` }
                }
            },
            {
                id: "csi_19", number: 19, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Serviciu îmbucurător", text: `1. Mergem să servim vesel pe Regele,\nSă-I dăm darurile și talentele!\nChiar deși e puţin ce noi făptuim,\nServi credincioși altfel nu putem să fim.\n\n2. Lucrul lui Iehova la fapt ne cheamă.\nAceastă chemare toţi s-o audă!\nSfântă-i misiunea ce Domnul ne-a dat,\nPrin care mult vom fi binecuvântaţi!\n\n3. Fii părtaș în servici’ cu bucurie,\nDucând mesajul celor din pustie!\nInima ni-e veselă de-un așa har,\nCă Domnul ne-a dat un asemenea dar.` }
                }
            },
            {
                id: "csi_20", number: 20, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Tu ești cântarea noastră!", text: `1. O, Iehova – a noastră putere –\nAle mâinilor Tale lucrare!\nNoi suntem Martorii Tăi pe pământ!\nLucru-Ţi vestim oamenilor oricând.\n\nRefren:\nAl nostru cânt! Al nostru cânt!\nPreamărim numele Tău cel sfânt!\nO, Iehova, Atotputernice, Tu ne ești adăpost și scăpare!\n\n2. Cu bucurie-n lumină umblăm.\nAdevărul cu plăcere urmăm.\nOameni de bine, mulţi, se adună\nCa să scape de marea furtună.\n\n3. Înainte, dar, cu toţi! Să mergem!\nÎn a Ta putere ne încredem.\nDeși Satan rău ne persecută,\nSă ‘nvingem Iehova ne ajută.` }
                }
            },
            {
                id: "csi_21", number: 21, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Lăudaţi pe Domnul!", text: `1. Ţie, Doamne, Îţi mulţumim\nPentru tot ce noi făptuim!\nPentru a Ta bunătate,\nNoi vestim a Ta dreptate.\n\n2. A Ta ‘ndurare veșnică\nDe laudă e vrednică.\nMăreţia-Ţi s-o răspândim,\nÎn lumea nouă să pășim.\n\n3. Dreptatea Lui să o vestiţi!\nPe muntele sfânt vă suiţi!\nJustificarea proclamaţi!\nȘi pe Iehova lăudaţi!\n\n4. Peste tot sune cântarea!\nDin casă-n casă lucrarea!\nPopoarelor steag ridicăm,\nMesajul Său să-l publicăm.` }
                }
            },
            {
                id: "csi_22", number: 22, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Devotament", text: `1. Dumnezeu a zis să fie lumină,\nStrăbătând ceaţa nopţii de pomină.\nFulgeri ne trimite din templul Său sfânt,\nPrin raza divină să fim într-un gând.\n\n2. A ‘Mpărăţiei veste noi împărţim.\nMângâiere celor triști noi oferim.\nPuterea noastră de la Domnul vine.\nDe-a noastră misiune ne previne. \n\n3. Gata pentru servici’ noi ne devotăm.\nÎn numele lui Isus noi ne predăm.\nAl Tău popor ales, noi să proclamăm!\nSlava, cinstea și numele Tău chemăm!` }
                }
            },
            {
                id: "csi_23", number: 23, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Domnia glorioasă a lui Christos", text: `1. Daţi mărire Celui Uns,\nAl lui Iehova Fiu!\nSăltaţi! Timpul I-a ajuns.\nDe stăpân toţi Îl știu.\nVine să rupă lanţul,\nPe robi să-i dezlege,\nSă ridice păcatul,\n‘N drept să guverneze.\n\n2. Vine ca un ajutor,\nRobia să strice.\nSalvând pe-ai Săi din cuptor,\nPe slabi întărește.\nCânt să dea-n loc de suspin,\nȘi noaptea lumină,\nA căror moarte și chin\nÎi e preţioasă.\n\n3. Să-L mărim necontenit,\nȘi zilnic Lui cântând!\nDomnia-I fără finit,\nSfârșit n-are nicicând.\nNicicând lumea cea dreaptă\nNu ‘nceată a vesti\nTeocraţia sfântă,\nNumele-I a slăvi.` }
                }
            },
            {
                id: "csi_24", number: 24, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Sârguinţă și unitate", text: `1. Să sfârșim grabnic lucrul,\nDe Domnul prevăzut!\nVoi, copii consacraţi Lui,\nN-aveţi timp de pierdut!\nSabia sus ridicând,\nLa luptă fiţi gata!\nCei drepţi, credincioșia\nAșa vor arăta.\n\n2. Să unim puterile,\nRidicând drapelul!\nCă în lucrul unitar\nEste rezultatul.\nSă mărim cu toţii, dar,\nAl Domnului nume,\nPână se va nimici\nA lui Satan lume! \n\n3. Soldaţilor se cere\nCa loiali să fie,\nCei chemaţi, aleși și sfinţi,\nCredinţa s-o ţină.\nFie semnul “‘Nainte!”\nDe Domnul s-ascultăm,\nPână, din a Lui milă,\nViaţă câștigăm!` }
                }
            },
            {
                id: "csi_25", number: 25, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Înainte, spre biruinţă!", text: `1. Oștirile cerului\nSunt un mare sprijin\nPentru cei ce urmează\nPe Domnul cel Divin.\nChiar de se războiește\nBalaurul cu ei,\nSub umbra lui Iehova,\nEi nu sunt singurei.\n\n2. Lucrarea lui Elisei\nE atac curajos.\nVorbind noi cuvântul Său,\nNu suntem mai prejos.\n“Martorul drept, credincios”\nNe conduce ceata.\nÎn marea ofensivă\nȘi noi suntem gata.\n\n3. Prin oastea cea cerească\nIehova va ‘nvinge,\nDeși lupta cea mare\nGroaznic se încinge.\nBiruinţa-i sigură.\nDomnul va birui,\nȘi statornicul erou\nMărire va primi!` }
                }
            },
            {
                id: "csi_26", number: 26, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Înainte!", text: `1. Despre Iehova doresc ca să cânt,\nDespre a Sa sfântă domnie,\nMesajul Său la oameni să vestesc,\nȘi domnia cea de ani o mie.\n\nRefren:\nÎnainte! Fără frică! (Cu toţi) (Fără frică)\nÎmpingeţi lupta la porţi!\nNu ‘ntârziaţi! N-așteptaţi!\nUrmaţi Marelui Iefta, că nu greșiţi!\nUrmându-L, veţi fi izbăviţi.\n\n2. Ostașii lui Dumnezeu, vă sculaţi!\nÎn a Lui armată vă ‘nrolaţi!\nPe al ei Comandant să Îl urmăm,\nȘi coiful mântuirii să-l luăm! \n\n3. Nu pentru voi vă dă biruinţă.\nNu voi câștigaţi bătălia.\nCi Dumnezeu prin a Sa voinţă,\nNimicește taurii din Basan.` }
                }
            },
            {
                id: "csi_27", number: 27, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Rugăciunea servului", text: `1. Tată ceresc, al nost’ Domn,\nNumele-Ţi să-l preamărim,\nCă harul Tău Ţine-n veci!\nNoi credincioși să fim deci!\n\n2. Ca serviciul să urmăm,\nÎnvaţă-ne, Te rugăm,\nPoruncile-Ţi să păzim,\nAltor oi mesaj vestim!\n\n3. Dă-ne putere de sus,\nȘi iubirea lui Isus!\nAstfel, recunoscători,\nŢie Îţi suntem datori.\n\n4. Lasă să avem parte\nÎn sfânta Ta dreptate!\nNe rugăm să nu ‘ncetăm\nCalea Ta să o urmăm!` }
                }
            },
            {
                id: "csi_28", number: 28, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Eu sunt Iehova!", text: `1. Falnicul faraon din Egipt,\nNeslobozind pe Israel,\nZicând: “Pe Iehova nu-L cunosc.\nCe-i de astfel pretinde El?”\nA cui a fost puterea ce l-a zdrobit?\nCu oastea lui în marea-a pierit.\nAl cui braţ a liberat al Său popor,\nFiind cinstit ‘naintea tuturor?\n\nRefren:\nEu sunt Domnul! Nu este altul!\nEu sunt Domn! Iehova Mi-e numele!\nRegele Meu uns în Sion tronează!\nOm și popor pe El adorează!\n\n2. Mândrul rege al Asiriei,\nHulind pe-al Evreilor Domn:\n“Iehova pe tin’ nu te-a scăpa.\nMie îmi vei fi servitor!”\nAl cui a fost braţul care a ucis\nOastea regelui astfel decis?\nCine a scăpat pe popor de dușman, \nMărindu-Și al Său nume suveran?\n\n3. Și-acum, puterea răutăţii\nIese la luptă cu Christos.\nDar o groază o va apuca.\nPoporul e mult apăsat.\nCine va zdrobi pe cel apăsător?\nCine va strica acest jug greu?\nCine aduce dreptate la popor,\nȘi în locul necazului bine?` }
                }
            },
            {
                id: "csi_29", number: 29, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Curaj! Înainte!", text: `1. Toţi cei credincioși și toţi cei zeloși\nNu tremură, nu se tem.\nMântuirea strigă cu voce tare,\nPân’ bucuria vine.\n\nRefren:\nSă plecăm, dar, înainte!\nCuvântul ne conduce.\nZice Iehova: “Eu te voi ajuta!\nRidică-ţi, dară, mâna!”\n\n2. Credinţa dă putere la lucru,\nCar’ iubește, servește.\nZel îndeamnă acum pe cei credincioși.\nEgoismul loc n-are.\n\n3. Vezi, în mijlocul pericolului,\nCeata credincioșilor?\nGroaza luptei pe ei nu se observă.\nFeţele lor strălucesc.\n\n4. Lupta aceasta-i a lui Iehova.\nNe-ndeamnă să fim zeloși.\nBiruitor El e. Lumea aceasta\nAre sfârșit dureros.` }
                }
            },
            {
                id: "csi_30", number: 30, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Veseliţi-vă! Iehova domnește!", text: `1. Domnul e Rege! Sus! La cânt!\nPământ, cer pe El preamărind,\nTuturor vestea ajunge,\nCă Iehova este Rege!\nEl e Rege! Cine-a-ndrăzni\nDomnului a se ‘mpotrivi,\nSă calce-a Sa hotărâre,\nComiţând nelegiuire?\n\n2. Domnul e Rege! Voi oameni,\nNu vă ‘mpotriviţi luminii!\nEl cu dreptate judecă.\nTrăiește cel ce-L ascultă.\nDomnu-i Rege nebiruit.\nDistruge pe nelegiuit.\nÎn Sion pe tron L-așezat.\nIehova ca Rege L-a dat.\n\n3. Domnul e Rege! Sus! La cânt,\nA Sa maiestate văzând!\nEl va nimici pe tiran.\nDuce poporul la liman.\nȘi cu ‘Mpărăţia-n faţă,\nOamenii război nu ‘nvaţă.\nFiecare, fără frică,\nVa ședea în a sa vie.` }
                }
            },
            {
                id: "csi_31", number: 31, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Păstorul Cel Mare", text: `1. Iehova e al meu Păstor.\nDeci, de cine să mă tem?\nEl dă oilor Lui ajutor.\nNu uită pe cei ce gem.\nȘi, la ape liniștite,\nOdihnește sufletul.\n|: El mă povăţuiește mereu,\nPe-a’ Sale cărări drepte. :|\n\n2. Prin umbre și-a morţii vale \nNu mă tem de nici un rău.\nCu paza conducerii Tale\nSunt mângâiat tot mereu.\nÎmi ungi capul cu untdelemn.\nCupa-mi umpli din belșug.\n|: Iar eu, urmând al Tău sfânt îndemn,\nÎn casa Ta locuiesc. :|\n\n3. Păstorul meu e iubitor.\nLauda Sa o cânt duios,\nCă vestea Sa bună, tuturor\nAltor oi duce folos.\nCuvântul Său îl voi urma,\nCredincios pe-a Sa cale.\n|: Marea mea comoară de-a-L servi,\nVoi folosi zi de zi. :|` }
                }
            },
            {
                id: "csi_32", number: 32, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Cine nu se va teme de Tine?", text: `1. Mari sunt lucrările Tale, Doamne!\nToate căile Tale sunt drepte!\nCine nu va cinsti numele Tău sfânt?\nCă Tu singur, numai, ești suprem și sfânt! \n\n2. Toate neamurile vin la Tine,\nSă se-nchine și să Te laude.\nAdevăr și judecată răspândești.\nOamenilor sinceri le binevoiești.` }
                }
            },
            {
                id: "csi_33", number: 33, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Scoală-te! Luminează!", text: `1. Sus! Sus! Ridică-ţi vocea cântând!\nSioane, ridică-ţi vocea!\nPrin marea ceaţă vine zâmbind\nRegele. El îţi dă pacea.\n\nRefren:\nScoală-n veșnica tinereţe!\nE ziuă. Regele-a sosit!\nÎn curând, deci, în Armaghedon,\nIehova va fi preamărit.\n\n2. Nu vei mai fi-n picioare călcat,\nNici zilele-ţi înnorate.\nDe Iehova tu vei fi salvat.\nVestește a Lui dreptate!\n\n3. Nu va mai apune soarele.\nLuna va lumina-n noapte.\nDumnezeu îţi este gloria,\nA ta veșnică lumină.\n\n4. Ca nori de rouă la tine vin\nFii și fiice, regi și străini.\nFeriţi de primejdii și de chin,\nPe Cel Prea Înalt preamăresc.` }
                }
            },
            {
                id: "csi_34", number: 34, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Lăudaţi pe Regele domnitor!", text: `1. Priviţi, ai lui Iehova servi!\nVedeţi pe-al lui David Fiu,\nÎntronat ca Rege-n mari slăvi?\nDaţi mărire Celui viu!\n\nRefren:\nLaudă! Laudă! Laudă!\nRegele-n Sion!\nLaudă! Laudă! Laudă! El e Regele!\n\n2. Dușmanii Lui sunt înjosiţi,\nÎn pulbere aruncaţi.\nIar în mijlocul lor, sosit,\nStă El cu cei consacraţi.\n\n3. În ziua puterii Sale,\nVine-al Său popor liber,\nMergând vesel pe-a Sa cale, Proaspăt ca roua din cer.\n\n4. El judecă naţiunile.\nUmple peste tot cu morţi.\nȘi zdrobește capetele\nLa ai lui Satan consorţi.` }
                }
            },
            {
                id: "csi_35", number: 35, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Mesajul Împărăţiei", text: `1. Ascultă al Împărăţiei mesaj!\nChristos e Domn peste orice peisaj!\nÎn curând dușmanul Său va fi-nlăturat.\nGrăbește-te de a scăpa ne‘ntârziat!\n\nRefren:\nPăcătosul părăsească-și calea!\nNelegiuitul schimbe-și cugetarea!\nÎntoarcă-se la Domnul din inimă!\nȘi îi va da iertarea.\n\n2. Iehova, prin martorii Săi, vestește\nCă pe zdrobit El înveselește,\nCă Christos domnește și nu va odihni,\nPână ce rău și păcat va zădărnici.\n\n3. Fericit e omul care ascultă,\nȘi să Îl servească se prezintă!\nIehova pe cel credincios îl păzește,\nCare la popor adevărul vestește.` }
                }
            },
            {
                id: "csi_36", number: 36, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Atunci vor știe ei!", text: `1. Dușmanii numele Ţi-au ocărât.\nCu amăgiri locul Ţi-au murdărit.\nRegele Tău dreptatea va vesti.\nȘi domnia lui Satan va zdrobi.\n\nRefren:\nAtunci vor ști ei că Tu ești Iehova!\nAtunci vor ști ei că Ești drept și sfânt!\nAtunci vor ști ei că toată creaţiunea,\nPe toate Tu le-ai creat, Tu singur! \n\n2. A Ta mare putere slăvită\nNu va fi mai mult tăgăduită.\nOastea lui Satan, în Armaghedon,\nVa pieri fără niciun ajutor.\n\n3. Inimi nemiloase, îngâmfate,\nCe domnesc astăzi în nedreptate,\nBraţul puternic jugul va frânge,\nCând în mânia Ta-i vei învinge.` }
                }
            },
            {
                id: "csi_37", number: 37, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Să se scoale Dumnezeu!", text: `1. Scoală, Dumnezeu, la luptă!\nDușmani împrăștie!\nSă piară-n a Sa prezenţă\nToţi cei ce Îl urăsc!\n\n2. Cum focul topește ceara,\nȘi fumul dispare,\nAșa dușmanii să piară –\nSămânţa lui Satan!\n\n3. Bucure-se credinciosul\nÎn faţa Domnului!\nEl va scăpa prizonierul,\nMângâie pe orfan.\n\n4. Cântaţi laudă lui Dumnezeu!\nMăriţi-L cu-al vost’ glas!\nNumele Iehova-i mereu\nSlăvit în orice ceas.` }
                }
            },
            {
                id: "csi_38", number: 38, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Stai lângă Iehova!", text: `1. În trecut inima mea era rea,\nCă religia-mi turna cupa grea.\nO, ce bucurie-atunci am simţit\nCând mesaj’ am auzit! (auzit)\n\nRefren:\nStai lângă Iehova!\nEl ţi-e odihnă.\nEl nu te va uita.\nUmblă-n lumină!\nSpune vestea bună,\nA libertăţii,\nA Împărăţiei,\nȘi a dreptăţii!\n\n2. Acum eu pe Iehova voi servi.\nLa flămânzi cuvântul voi împărţi,\nÎmpărţind altora ce-am auzit \nDespre Domnul cel slăvit.\n(cel slăvit)\n\n3. Nu mă tem de cel ce rău îmi face.\nÎn Domnul mă-ncred, jos nu voi zace.\nDeși ei pot fi mulţi, iar noi puţini,\nDomnul e al nost’ sprijin.\n(nost’ sprijin)` }
                }
            },
            {
                id: "csi_39", number: 39, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Dumnezeu veșnic, al nostru ajutor", text: `1. O, Doamne-al nostru ajutor,\nIzvor de desfătări,\nNădejdea noastră ‘n viitor,\nTe lăudăm prin cântări!\n\n2. Sub a mâinii Tale umbră,\nSuntem în loc sigur.\nUmblând pe-a lui Christos urmă,\nNe păzește singur.\n\n3. Înainte de-a fi munţii,\nȘi pământul format,\nDin veșnicii ești Dumnezeu,\nMereu tot același!\n\n4. O, lasă ca să merg voios\nPe-a Ta sfântă cale,\nCa să fiu martor credincios\nPentru al Tău nume!` }
                }
            },
            {
                id: "csi_40", number: 40, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "În ofensivă", text: `1. De groază te-nspăimântă,\nCreștin zelos, ‘nainte!\nStai în faţa Lui luptând!\n|: Din cer primești nutremânt. :|\n\n2. Treci ‘nainte! Fii erou\nÎn faţa dușmanilor!\nDe ei de ce ai fugi?\n|: Christos ‘naintea-ţi! Tu ști. :|\n\n3. Îmbracă-ţi, dar, arma ta!\nȘi fii vesel în toate!\nLupta-ţi nu va ţine mult.\n|: Dar zi cânt de-nvingere! :|\n\n4. Rezistă, dar, curajos!\nCinstea ta sigură e.\nDeși e crud dușmanul,\n|: Creștin zelos, ‘nainte! :|` }
                }
            },
            {
                id: "csi_41", number: 41, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Cântarea celor liberi", text: `1. Lăudaţi pe Domnul, prin care\nLibertate am primit!\nA religiei putere\n|: În picioare a strivit. :|\n\n2. Lumina strălucitoare\nNegura înlătură.\nDe la al Său serv credincios\n|: Primim învăţătură. :|\n\n3. Deschise-s porţile-n Sion\nDe-al Lui Rege glorios!\nIntraţi cu oamenii liberi,\n|: De-adevăr vorbind voioși! :|\n\n4. Cu ‘ndrăzneală în lucrare,\nCeata nu e singură,\nCă a Sa eliberare\n|: Dă speranţă sigură. :|` }
                }
            },
            {
                id: "csi_42", number: 42, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Spuneţi mărimea Sa!", text: `1. Lăudaţi pe Domnul sfânt!\nSfinţi în curţile Lui stând,\nÎngeri la tronul de sus,\nVestiţi lucrul lui Isus!\n\n2. Lăudaţi-L voi, alte oi,\nCetăţeni ai lumii noi,\nÎn templul Său zi, noapte\nVestind a Sa dreptate!\n\n3. Lăudaţi-L că e milos!\nEl mântuiește voios.\nCe pentru om a făcut,\nPrin Fiul Său am văzut.\n\n4. Voci, mâini și inimi, sculaţi!\nÎn concert vă înrolaţi!\nTot ce are suflare\nPe Domnul să adore!` }
                }
            },
            {
                id: "csi_43", number: 43, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Adoraţi și lăudaţi pe Domnul!", text: `1. Lăudaţi pe Domnul, voi ceruri,\nȘi voi îngeri din ‘nălţimi,\nSoare și lună din ceruri,\nȘi-ale stelelor mulţimi!\n\n2. Lăudaţi-L, că El a vorbit,\nLumile L-au ascultat,\nȘi legi de netăgăduit\nPentru ele-a așezat!\n\n3. Lăudaţi-L, că El e slăvit!\nCe-a promis se va ‘mplini.\nCu ai Săi sfinţi a biruit.\nPe Satan va nimici. \n\n4. El e a noastră mântuire.\nOștile sus Îl vestesc.\nȘi a Lui orânduire,\nVântul, marea o rostesc.` }
                }
            },
            {
                id: "csi_44", number: 44, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Cu încredere vei fi lăudat în Sion", text: `1. În Sion primești laudă\nȘi juruinţe făcute!\nAcolo se-nchină,\nȘi rugăciuni drepte\nCătre Tine se îndreaptă!\nFericit e cine,\nPrin Christos, la Tine vine,\nÎn templul Tău cel sfânt!\n\n2. A noastră mântuire\nDreptatea Ta o vestește.\n‘N Armaghedon răspunzi\nRugăciunii noastre.\nTu ești a noastră ‘ncredere\nPeste tot pământul.\nTe rugăm, dă-ne putere\nSă-Ţi vestim cuvântul!\n\n3. Mâna-Ţi munţi întărește.\nVocea Ta marea alină.\nZiua Te vestește.\nPământul dă roadă,\nCu bunătăţi umple anul.\nCalea Lui e sfântă.\nBucuros cântă deșertul.\nOamenii Te laudă.` }
                }
            },
            {
                id: "csi_45", number: 45, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Fugiţi la Împărăţie!", text: `1. Căutaţi pe Domnul, toţi cei umiliţi!\nCăutaţi dreptatea și umilinţa!\nPoate, astfel, veţi fi de El ocrotiţi,\nDobândind astfel viaţa.\n\nRefren:\nFugiţi la munţi – calea de scăpare!\nIa loc pe a Lui parte! (Lui parte)\nAcolo-i primi binecuvântare.\nVestește a Lui dreptate! (dreptate)\n\n2. Voi, cei car’ după adevăr flămânziţi,\nPentru ce să mai suspinaţi în chin?\nCăutaţi pe Domnul ca să fiţi ocrotiţi!\nAscultaţi de Christos din plin! \n\n3. Ridică-ţi capul sus cu bucurie!\nVezi semnele? ‘Mpărăţia-i aici!\nPrimește lumina cu veselie,\nȘi El de teamă te-a feri!` }
                }
            },
            {
                id: "csi_46", number: 46, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Domnul – un soare și scut", text: `1. Bun Părinte, soare îmi ești!\nCu Tin’ noaptea nu matacă!\nVină norii oricât de mari,\nAi Tăi servi în Tine stau tari!\n\n2. Tu, al vieţii mele scut,\nDeși dușmanii mă pândesc,\nA mea scăpare Tu îmi ești,\nDe acei dușmani diavolești!\n\n3. Până la urmă de-i răbda,\nDin harul Său parte-ţi va da.\nNu-i duce lipsă de nimic,\nDe rămâi cu El statornic.\n\n4. Pe a Ta scumpă comoară,\nPentru noi ai dat să moară,\nCa preţ de răscumpărare,\nÎn faţa Ta apărare.\n\n5. Tu n-ai cruţat pe al Tău Fiu,\nPentru ca eu să pot fi viu.\nTu ne dai din belșug toate.\nEl trăiește și El poate.` }
                }
            },
            {
                id: "csi_47", number: 47, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Noul Rege al pământului", text: `1. O, vezi pe vârful munţilor\nVedenie măreaţă,\nArmata credincioșilor\nÎn zori de dimineaţă?\nCoiful la toţi spre cer le stă.\nPrin cuvânt eroarea-alungă.\nBătălia nu-i a noastră.\nChristos, Domnul să ‘nvingă!\n\nRefren:\nSărutaţi pe Fiul cel sfânt!\nNu mergeţi în pierzare!\nFericiţi sunt car’ în El cred\nCu ascultare!\n\n2. Înarmaţi cu-al “credinţei scut”,\nSpre-a putea întâmpina\nPe dușmanul cel rău, pierdut,\nSub care mulţi suspină,\nCu toţi’ iau parte la luptă.\nNu tremură-n primejdie.\nPe-al lor Rege ei salută,\nȘi măreaţa-I domnie. \n\n3. Regele conduce lupta.\nCei ce pe El urmează,\nVor primi sigur răsplată,\nȘi nu înfometează.\nSabia lor e cuvântul.\nVestea bună în gura lor,\nCa să se umple pământul,\nDucând-o neamurilor.\n\n4. Timpul a sosit, în fine,\nChristos să-Și ia puterea.\nStârpind orice mărăcine,\nEl suprimă durerea.\nIehova-Și ridică braţul!\nAuzi al Său avertisment?\nDomnitori, vă rupeţi lanţul,\nȘi spre El priviţi atent!` }
                }
            },
            {
                id: "csi_48", number: 48, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Trimite, Doamne, lumină!", text: `1. Trimite, Doamne, lumină,\nVizir să ne fie,\nS-ajungem pe muntele sfânt,\nSă ne-nchinăm Ţie!\nTrimite-o pe uscat și-ape!\nDu pe “alte oi” la ape!\n\nRefren:\nDă-ne, Doamne, (Dă-ne) (Doamne) lumina Ta dreaptă!\n\n2. Trimite, Doamne, lumină\nUnde e păcatul!\nRidică servii lui Christos\nCa să dea cuvântul!\nRisipește rătăcirea,\nȘi răspândește-Ţi mărirea!\n\n3. Trimite, Doamne, lumină –\nVestea bucuriei –\nPână lumea va cunoaște\nCuvântul Scripturii!\nRazele stelelor, toate,\nStrăbată tot mai departe!\n\n4. Trimite, Doamne, lumină,\nȘi-ale zilei raze,\nCa să pătrundă prin noapte,\nȘi prin orice faze!\nTrimite, Doamne, lumină,\nCa toţi să aibă odihnă!` }
                }
            },
            {
                id: "csi_49", number: 49, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Armaghedon", text: `1. Soare, lună ‘ntunecă,\nȘi marea mugește.\nDumnezeu, orice munte,\nPrin cuvânt clătește.\nNeamuri, car’ niciodată\nDe El n-au ascultat,\nStau deci la judecată,\nCei ce s-au răsculat. \n\n2. Forţele religiei\nContractul au călcat.\nȘi-n locu’ ‘Mpărăţiei,\nLui Satan s-au plecat.\nÎn timp ce seamănă vânt,\nIehova dă prilej\nSă culeagă, cu avânt,\nAl luptei lor vârtej.\n\n3. Smochinul nu ‘nflorește.\nN-a fi roadă-n vie.\nCâmpul nu mai rodește.\nVite n-o să fie.\nDar în Domnul Iehova\nEu mă voi odihni.\nA Lui să fie slava,\nDomnia Lui e-aici!` }
                }
            },
            {
                id: "csi_50", number: 50, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Vestește!", text: `1. Vestește naţiunilor că Domnul e Rege!\nVestește! Vestește!\nVestește naţiunilor că nu le mai merge!\nVestește! Vestește!\nVestește că a Lui putere mereu crește!\nCă ‘Mpăratul păcii e Cel ce-o sprijinește!\nVestește ne‘ncetat! Cântecul Lui rostește!\nVestește! Vestește! (Vestește!)\n\n2. Vestește poporului: E-aici domnia Lui!\nVestește! Vestește!\nVestește la prizonieri ruperea lanţului!\nVestește! Vestește!\nVestește celor ce plâng, că Isus trăiește!\nVestește celor obosiţi: Odihnă este!\nVestește păcătoși că-i mântuiește!\nVestește! Vestește! (Vestește!)\n\n3. Vestește naţiunilor că Isus ia tronul!\nVestește! Vestește!\nVestește naţiunilor că pierde păcatul!\nVestește! Vestește! \nVestește prin orașe și din casă-n casă!\nVestește cuvântul scris tuturor, în masă,\nCă-n curând va fi fericită orice rasă!\nVestește! Vestește! (Vestește!)` }
                }
            },
            {
                id: "csi_51", number: 51, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Consacrare", text: `1. A mea viaţă fie\nPrimită, Doamne, Ţie!\nMâna-mi fie mișcată,\nDe iubirea-Ţi purtată!\n\n2. Picioarele să-mi fie\nMereu predate Ţie!\nA mea voce ‘ntărește,\nCe pe Rege vestește!\n\n3. Gura mea plină fie\nCu mesaj de la Tine!\nFolosește tot al meu!\nTot ce am eu e al Tău!\n\n4. Timpul meu și zilele,\nSă-Ţi vestească faptele!\nMintea mea folosește!\nDe răi mă ocrotește!\n\n5. Inima-mi să iubească\nCunoștinţa cerească!\nPrimește-mă! Eu doresc\nPe Tine să Te servesc.` }
                }
            },
            {
                id: "csi_52", number: 52, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Sabia Domnului și a lui Ghedeon!", text: `1. Iată, răsună chemarea pe pământ,\nSpre-a servi-n ceata lui Ghedeon!\nSe pregătește dușmanul cu avânt.\nIată, se-adună Madianul!\n\nRefren:\nSus, dar, la fapt! Sus, curajos,\nVestind vesel al Său mesaj!\n“Sabia Domnului și-a lui Ghedeon!”\nAcesta-i strigătul de luptă.\n\n2. Voiești cu El a propăși credincios?\nSună, dară, vesel trâmbiţa!\nCă nu-i servici’ frumos și mai glorios\nDecât ca să vestești viaţa!\n\n3. Sus, dar, la fapt! Frate, nu te retrage!\nCu bucurie răspândește,\nVestea cea bună ce ‘nainte merge,\nȘi necazul îl nimicește!` }
                }
            },
            {
                id: "csi_53", number: 53, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Slava lui Iehova", text: `1. Doamne, măreaţa-Ţi putere\nFirmamentul o declară!\nMintea mea să cutreiere\nA Ta ‘nţelepciune rară!\n\n2. Autor al naturii bază,\nTu îi dai ale Tale legi.\nTe mărim ca primă cauză!\nPentru viaţă ne alegi.\n\n3. Până și tot universul\nDe mărirea Ta vorbește!\nFăpturile și pământul\nPe Tine Te mărturisesc!\n\n4. Nu numai cer’ și pământul\nVestesc ale Tale scopuri,\nCi mai maiestuos cuvântul\nPe care-l ducem în grupuri.` }
                }
            },
            {
                id: "csi_54", number: 54, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Ziua lui Iehova", text: `1. Ziua gătită de Domnul\nLa Fiul a sosit.\nTresalte cerul, pământul,\nSalutând fericit!\nOsana, Rege domnitor,\nPiatră unghiulară!\nDă belșug la al Tău popor\nȘi salvare iară!\n\n2. Osana Celui ce vine-n\nNumele Domnului!\nNumai Lui I se cuvine\nSlavă și onoare!\nOsana întru cei de sus!\nSfinţii de pe pământ\nÎși ridică veseli capul,\nPe Domnul lăudând.\n\n3. Asta-i ziua când “alte oi”\nLângă Domnul stau tari,\nMoștenitori ai lumii noi,\nDemni fiind ca atari.\nÎn templu ziua și noaptea\nPorunca-Ţi urmează.\nVeseli, ei vestesc dreptatea\nÎn întreaga ţară.` }
                }
            },
            {
                id: "csi_55", number: 55, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Lupta noastră zilnică", text: `1. Lupta de ieri s-a terminat.\nAlta s-a început.\nRăzboiul nu s-a încheiat.\nPeste el n-am trecut.\nNu e timpul de odihnă!\nDomnul ne cheamă iar.\n“Înainte!” ne îndeamnă.\n“Umblaţi în al Meu har!”\n\n2. Ia a credinţei platoșă,\nȘi a Lui speranţă! Astfel, săgeata nu-ţi strică,\nTeama n-ameninţă.\nMergi în spirit și-n putere\nPe-a Domnului cale!\nSpune c-a Lui învingere\nEste-a noii zile!\n\n3. Și, așa mergând la luptă,\nNoi nu ne vom teme.\nIubit este cel ce luptă!\nEl nicicând nu pierde.\nTu, care ești al nostru scut,\nAi Tăi servi apără!\nEi cu toţii au cunoscut\nLumina Ta clară.` }
                }
            },
            {
                id: "csi_56", number: 56, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "La lucru!", text: `1. La lucru! La lucru, ai lui Dumnezeu servi!\n‘Nainte e Isus. Urmaţi-L bucuroși!\nBucuria Domnului ne e tărie.\nSă lucrăm cu toţi pentru Împărăţie!\n\nRefren:\n‘Nainte! (‘Nainte) ‘Nainte! (‘Nainte)\n‘Nainte! (‘Nainte) ‘Nainte! (‘Nainte)\nSă sperăm! Să veghem! (Credem) (Rugăm)\nSă servim pân’ lucru-i făcut!\n\n2. La lucru! La lucru! Cu pâinea la flămânzi!\nCu vestea mântuirii la cei ce-s pierduţi!\nOnoarea noastră fie steagul Regelui,\nVestind cu bucurie mântuirea Lui!\n\n3. La lucru! La lucru! E servici’ pentru toţi.\nNegura rătăcirii cadă în ruini!\nNumele lui Iehova ‘nălţat să fie\nÎn a Lui glorioasă Teocraţie!` }
                }
            },
            {
                id: "csi_57", number: 57, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Motiv de mulţumire", text: `1. Prin ale vieţii schimbări,\nÎn necaz, bucurii,\nA Domnului slavă sfântă\nS-o cânte toţi cei vii!\n\n2. Lăudaţi pe Domnul cu Mine!\nAl Său Nume măriţi!\nCine-n necaz la El vine, De rău va fi ferit.\n\n3. Ale lui Dumnezeu oștiri\nPe cei drepţi apără.\nA’ eliberării vestiri\nUmple-a Sa tabără.\n\n4. Lăudaţi pe Domnul toţi cei sfinţi!\nPe cei sfinţi păzește.\nÎn al Său servici’ să veniţi!\nEl vă ocrotește.` }
                }
            },
            {
                id: "csi_58", number: 58, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Loialitate", text: `1. Sus, voi vitejii lui Christos, la război!\nIehova vă cheamă în lupta Sa!\nPe șanţurile Salemului luptaţi!\nCu răsunet să sune trâmbiţa!\nIată, naţiunile se înșiră!\nToţi se răscoală contra Domnului.\nSatan le conduce, opunându-se,\nȘtiind că numai puţin timp are.\n\n2. Sună chemarea la lupta cea sfântă!\nVoi credincioși, staţi în rând bucuroși,\nArătând încredere în Acela,\nCare păzește pe cei credincioși!\nCredincioși faţă de Christos și de fraţi,\nSă-i dăm lui Dumnezeu ce I-am promis!\nArdă făclia în mâinile noastre!\nSă vestim cu zel al Său paradis!` }
                }
            },
            {
                id: "csi_59", number: 59, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Justificatorul", text: `1. Din Edom cine-i ce vine,\nPlin cu sânge pe haine?\nVeștmintele-I sunt Măreţe,\nȘi cu putere mare.\nAcest erou Domnul e!\nEl poate să mântuie.\n\n2. Al marelui Iehova Sol,\nE acel ce pășește\nSă se răzbune pe dușman,\nPoporul Său să-l scape.\nIsus este Mesia!\nCa El nu e nimenea.\n\n3. Haina Lui de ce-i cu sânge?\nPentru că în teasc călcând,\nAl hulitorilor sânge\nI-a stropit veșmintele,\nArmaghedonul luptând,\nLibertate câștigând.\n\n4. O, cine cu lupta mare\nBiruinţă câștigând,\nÎmpărăţești cu mărire,\nLa om bine aducând!\nPoporul Tău Te laudă\nPe veci, o, Rege mare!` }
                }
            },
            {
                id: "csi_60", number: 60, versions: {
                    ro: { book: NEW_BOOK_CSI, title: "Măreaţa comoară a serviciului", text: `1. Îţi mulţumim Ţie, Doamne,\nA ta mare milă,\nCă, cu mâini și buze slabe,\nPutem servi Ţie!\nÎţi mulţumim că Tu, prin noi,\nRăspândești lumina,\nÎn negura asta mare,\nUnde lumea zace!\n\n2. Îţi mulţumim că ne-ai permis\nSă-Ţi mărim numele,\nÎnaintea acelora\nCar’ sunt în robie!\nNimic nu-i așa de măreţ\nPe pământ, decât ce\nServiciul Tău ne oferă\nÎn veci, mărit Rege!\n\n3. Lasă ca tot ce-i sfânt și drept,\nPe noi să ne umple,\nBucurându-ne că putem\nMai curat să vedem!\nDă ca zelul nost’ fierbinte\nVeșnic să nu scadă,\nDe Tine să mărturisim\nCu mare ‘ndrăzneală!` }
                }
            },
