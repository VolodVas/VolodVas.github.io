            281: { title: "În Dumnezeu", text: `1. Mare Dumnezeu, permite-mi ca să-mi aflu toate-n Tine!\nTu să-mi fii scop și speranţă! Ochii mei pe Tin’ Te vadă!\n\n2. Mare ești, bun, drept și-nţelept! Tu ești Tatăl și Domnul meu!\nEu sunt al Tău prin sânge sfânt, răscumpărat fiu, serv al Tău.\n\n3. Viaţa, făr’ iubirea Ta, valoare nu poate avea.\nE-o sarcină, chinuire, de-aș fi respins de la Tine.\n\n4. Mâini și glas ridic la Tine! Te laud pân’ am suflarea!\nLucrul Tău sfânt mă bucure, cât zilele-mi vor mai ţinea!` },
            282: { title: "Loc de siguranţă", text: `1. Este loc de siguranţă sub mâna Domnului,\nUnde stă cu îndrăzneală cel ce credincios e.\n\n2. Chiar deși e un suflet slab, n-a pierde liniștea.\nSub aripa Celui Prea ‘Nalt are ocrotirea.\n\n3. Îngerii îi poartă grijă, însoţindu-l mereu.\nFie dușmanul cât de rău, nimic nu-i va strica.\n\n4. Cu adevăr îl nutrește, iubirea arătând.\nCe parte fericită ai, cu putere crezând!\n\n5. Mâna tare și miloasă, urechi care aud,\nViaţă sus în mărire, va fi a ta patrie.` },
            283: { title: "Ceata lui Ghedeon", text: `1. Iată, răsună chemarea pe pământ! O, intră-n ceata lui Ghedeon!\nSe pregătește dușmanul la război. Iată, se-adună Madianul!\n\nRefren:\nSus, dar, la fapt! Sus, cu curaj, făcând ce-Ţi este ‘ncredinţat,\nRidicându-ţi vocea, strigând: “Sabia Domnului și a lui Ghedeon!”\n\n2. Voiești cu El a propăși credincios? Tu sună, dar, vesel trâmbiţa!\nCă nu-i servici’ mai frumos, mai glorios decât a vesti mântuirea.\n\n3. Sus, dar, la fapt, frate! Nu te retrage! Cu bucurie răspândește\nVestea cea bună a Împărăţiei, ce tristeţe, necaz alungă!` },
            284: { title: "Vezi Scriptura? Uită-te!", text: `1. Mila Domnului e mare ca marea fără sfârșit.\nDreptatea Lui e gentilă fie El oricât de strict.\nVezi Scriptura? Uită-te! E plină de-armonie.\n\n2. Este loc să consimţească cu noi mai mult ca cerul,\nȘi cu așa simpatie să ne ierte păcatul?\nVezi Scriptura? Uită-te! De gingășie-i plină.\n\n3. Mintea nu poate cuprinde mărimea iubirii Lui.\nPentru milă este gata a Domnului inimă.\nVezi Scriptura? Uită-te! De iubire e plină.\n\n4. Însă omul ne‘nţelegând în drept a Sa putere,\nÎn El, un dușman nemilos și-un rău Dumnezeu vede.\nVezi Scriptura? Uită-te! De dreptate e plină.\n\n5. De e sinceră credinţa, pe cuvântul Său zidim.\nLumina ne împresoară. Bucure-se inima!\nVezi Scriptura? Uită-te! E plină de știri bune.` },
            285: { title: "Armaghedon", text: `1. Soare, lună ‘ntunecă, și marea mugește.\nDumnezeu orice munte prin cuvânt clătește.\nNaţiuni car’ pe El nicicând nu L-au ascultat, \nStau deci la judecată, și pierd stăpânirea.\n\n2. Auzi vocea Domnului cum din Sion sună,\nȘi, lovind El pământul, la ai Săi dă pradă?\nDeși Satan cu puteri se opune mereu,\nRege, în Sion, Christos e uns de Dumnezeu.\n\n3. Pe câmp de luptă pășiţi, voi, ai crucii ostași!\nVine Împărăţia! Cu glas tare strigaţi!\nVoi nu aveţi de luptat. Lupta-i a Domnului.\nLucrul vostru-i să sunaţi. El ia biruinţa.` },
            286: { title: "Ziua Domnului", text: `1. Ziua gătită de Tatăl, la Fiul a sosit.\nBucure-se cer și pământ, salutând fericit!\nOsana, Rege mare uns, piatră unghiulară,\nCu Tin’, vârsta mântuirii, ‘liberarea vine!\n\n2. Osana, Ţie cel ce vii ‘n numele Domnului,\nAducând mântuire și rău și păcat stârpind!\nPoporul Te salută, ce pe Tin’ te-a așteptat.\nÎmpreună suferind, în glorie te-a urma.` },
            287: { title: "Ajutor permanent", text: `1. Oriunde ne întoarcem, la Domnu-n noi înșine,\nDoar ne leagă într-una spirt de rugăciune.\n\n2. Când răul ne-nconjură, inima noastră plânge.\nLa El putem privi, că El e cu noi în toate.\n\n3. Când mâhniri se înmulţesc, și ne-apasă inima, \nLa El să ne întoarcem! În necaz nu ne lasă.\n\n4. Așa-n toate credincios, eu la Domnul mă întorc.\nMă ascultă pe mine și mă adăpostește.` },
            288: { title: "Prieten adevărat", text: `1. De necaz, tristeţe ca nor împresoară,\nCine în El se încrede, pace dulce are.\n\n2. Cine se-odihnește pe pieptul Tău, Doamne,\nVa avea liniște dreaptă, chiar de vifor urlă.\n\n3. De faţa-Ţi va vedea, bucurie vine.\nVăduvi, orfani se răcoresc, și lacrimile trec.\n\n4. Binecuvânţi crucea, jugu-Ţi mă mângâie!\nTu din belșug îmi răsplătești pierderile mele.\n\n5. Amici de mă lasă, în Tine voi afla, \nFiul lui Dumnezeu, ce-mi dai pace și viaţă!` },
            289: { title: "Tezaur binecuvântat", text: `1. Lumea batjocorească-mă, am tezaur ceresc mare.\nIsus cel credincios, nobil, nu e altul ca El darnic.\n\n2. Faţa-I privește amabil, vorba-i mai plăcut’ ca orice!\nEl e bun și, așa măreţ, lumina din ochi străluce!\n\n3. Port crucea Lui cu credinţă, să fiu sărac sau înjosit.\nCând am a Lui îndurare, nu vreau averi sau renume.\n\n4. Doamne, dă-mi a Ta iubire! Să fac tot ce Ţie-Ţi place.\nSă calc pe urmele Tale. Să-Ţi servesc cu ascultare.` },
            290: { title: "Lumina Lui", text: `1. Chiar de umbre acoperă acum cărarea Ta, \nCuvântul Tău le-a ‘mprăștia, cerul va-nsenina.\n\n2. Cu credinţă vie crede că El te iubește!\nDin orice probe, vei vedea, bine îţi reiese.\n\n3. Între nori grei tu încurcând, curcubeu vei vedea,\nCe te-asigură că vine, dulce ‘nseninare.\n\n4. Dar umblă cu credinţă! Și chiar de s-a înnora,\nIehova pentru tine-a fi lumină, vei vedea.` },
            291: { title: "El se îngrijește", text: `1. Când pericol, furtuni ne îngrozesc, prietenii vin cu împotrivire,\nOrice ne ajunge, noi nu ne pierdem. Că scris este: “Domnul se îngrijește!”\n\n2. Vezi tu păsărica? Deși-n grânar nu adună, totuși are hrană.\nDeci voi, cei sfinţi, de foame nu vă temeţi! Că scris este: “Domnul se îngrijește!”\n\n3. N-ai frică, Satan drumul îţi ţine! Credinţa învinge, tot’ dispare.\nA’ lui amăgiri nu-ţi pot strica ţie. Că scris este: “Domnul se îngrijește!”\n\n4. De-ţi șoptește Satan drumul să-l lași, puterea-ţi slabă nu va birui.\nÎn neputinţă, curajul nu-ţi pierde! Că scris este: “Domnul se îngrijește!”\n\n5. Nu te-ncrede-n tine! Tu n-ai merit. Christos puterea-ţi. La El privește!\nÎn neputinţa ta El isprăvește. Că scris este: “Domnul se îngrijește!”\n\n6. Și când, în sfârșit, moartea a sosit, găsești odihnă în al Lui cuvânt.\nNu fi trist! Ai semn harul Lui cu tine. Că scris este: “Domnul se îngrijește!”` },
            292: { title: "Lupta noastră", text: `1. O luptă s-a terminat și alta se ‘nnoiește, \nRăzboiul mai continuă. N-am trecut peste el.\nConducătorul ne ‘ndeamnă: “Sus, dar, ceată mică!”\nStai în contra dușmanului! Să ‘nconjuri n-ai voie.\n\n2. Ia platoșa credinţei și săgeata nu-ţi strică!\nÎndoieli nu te-or păgubi, de porţi coiful pe cap.\nUmblând exemplul Celui ce ‘nainte a umblat,\nFii martor în noapte până vei zări lumina!\n\n3. Și așa ieșind la luptă, ceata noastră mică, \nNe vom mări cu Christos, de murim împreună.\nDoamne, puternic Dumnezeu, Tu să ne-ajuţi mereu!\nChiar dacă deplin s-a ‘nnora, dă-ne lumina Ta!` },
            293: { title: "Așa se cade nouă", text: `1. Ia-ţi crucea și îmi urmează, ai zis, o, scumpe Isus,\nCă pe tronul cel glorios numai așa ajungem!\nO iau, dar Tu ajută-mi a o purta! Viaţa ce Tu mi-ai dat, vreau a Ţi-o da.\n\n2. Și privind asupra apei, care-i simbolul morţii, \nSunt gata a-Ţi urma Ţie. Nu-mi cruţ firul vieţii.\nÎn această apă să fiu afundat, cum Tu, Doamne, la Iordan Te-ai afundat!\n\n3. Loc potrivit pentru mine, aducându-mi aminte\nDe-a Domnului scump legământ, dându-ne-a Lui iubire,\nAșa, cu Tine sunt părtaș în lucru. Jertfindu-mă, la al Tău altar umblu.\n\n4. Orice pierderi sau rușine pentru Tine mă ajung,\nMă mângâie știind c-astfel Te-au ajuns și pe Tine.\nMântuitor, umblu pe-a’ Tale urme, știind că nu mă lași orfan pe mine!` },
            294: { title: "Isus – marele nostru preot", text: `1. Tu stai lângă altar, ce vedem prin credinţă.\nAcolo întinzi ruga, ce-aducem la Tine.\n\n2. Din mâna Ta, mirosul la tron se înalţă,\nUnde stai bun pentru noi, al nostru scump Isus.\n\n3. Tu ești Mielul acel sfânt, ce Dumnezeu ne-a dat.\nNe câștigi mântuire, prin al Tău sfânt sânge.\n\n4. Cu mulţumire primim acest Miel, o, Doamne,\nCe nouă ne-ai dăruit ca pâine cerească!` },
            295: { title: "În orice soartă trăind", text: `1. În orișice soartă trăim, tristă sau veselă, \nInima, gura mea numai pe Dumnezeu laudă!\n\n2. Mărește-L și tu cu mine! Vestește-I numele!\nEl te-a scăpat din lipsă și necazuri alungă.\n\n3. În jurul credincioșilor îngeri tăbărează.\nPăzește pe cei ce se-ncred, de s-ar lovi-n piatră.\n\n4. Iubește pe Iehova, că păzește pe ai Săi!\nServește-L cu bucurie, că mâna-I ţi-ajută!` },
            296: { title: "A venit lumina ta!", text: `1. Lumina ta a sosit, Sioane, și ziua\nCând puterea asupra-ţi a răsărit deja.\nO, scoală, dar, strălucind, îmbrăcat în soare,\nȘi lumina răspândind prin multe popoare!\n\n2. În glorie deplină, așa vei ajunge,\nDe toate le vei face pentru ‘Mpărăţie.\nPrivind numai spre ţintă, mergi ‘nainte zelos!\nFie bucuria ta a servi credincios!\n\n3. Lumina asupra ta pe deplin va crește.\nUmblă în ea ne‘ncetat! Domnul te păzește.\nRămâi pe calea care lumina ţi-arată,\nȘi vei domni cu Domnul în Împărăţie!` },
            297: { title: "Fie voia Ta!", text: `1. Doamne, fie cum Tu voiești! De soarta mea Te îngrijești!\nDe jos cu nori acoperit, știu că sus e numai pace.\n\n2. Și lumina cea cerească aruncă potop de raze.\nCe-i viaţa pământească, când speranţa mea-i de faţă?\n\n3. Părinte, iartă-mi greșeala, de n-am urmat bine calea!\nDă-mi aripi și-a Ta lumină, să trec eu orice piedică!\n\n4. Îndoieli nu mă gonească! Scutul Tău mă ocrotească!\nFie-mi chiar vitregă soarta, în inimă am eu pacea.` },
            298: { title: "Ajută-ne, Tată!", text: `1. Fii de faţă cu noi, Doamne! L-al Tău cuvânt părtași fă-ne!\nVorbești, Doamne! Noi ascultăm. Ca servi ai Tăi, atenţi suntem.\n\n2. ‘Nalţă-ne sus inimile, griji lumești nu le tulbure!\nCu dreapta-Ţi hrănește-ne, și cu a vieţii pâine!\n\n3. Cuvintele Tale sfinte, din nou, putere deie-ne!\nCa-n credinţă să ne-ntărim și credincioși să Te servim.\n\n4. Mai deplin Tu ni Te-arată! Și-a-Ţi face voia ne ‘nvaţă!\nConducă-ne-a Ta graţie, spre a Ta Împărăţie!` },
            299: { title: "Sus! La lucru!", text: `1. La lucru! La lucru, voi, servii Domnului!\n‘Nainte e Isus. Urmaţi-L bucuroși!\nÎn luptă dă arme. El vă dă putere.\n‘Nainte! Intraţi toţi în oastea lui Christos!\n\nRefren:\n|: ‘Nainte! ‘Nainte! :| Bucuroși și voioși\nFiţi în luptă pentru Christos!\n\n2. La lucru! La lucru! Cu pâinea la flămânzi!\nCu vestea mântuirii la cei ce-s pierduţi!\nOnoarea voastră fie crucea lui Isus!\nSă-L chemaţi, să vină cu ajutor de sus!\n\n3. La lucru! La lucru! Ne îndeamnă Domnul.\nNegura rătăcirii cadă în ruini!\nSă cunoască toţi al lui Iehova nume!\n“Mântuire-am aflat!” strige popoarele!\n\n4. La lucru! La lucru! Priveghind, vă rugaţi,\nCă n-a fi vrăjmașul neînvins de Domnul!\nCoroana e gata pentru cei credincioși.\nSă vestim cu zel mântuirea la popor!` },
            300: { title: "Se sfârși!", text: `1. La sfârșit Domnul a strigat, pe când murea sfântul nostru.\nEl sfârșii lucrul. E gata. Învingând, ia mărirea Sa.\n\n2. A sfârșit tot ce I s-a zis, și despre El s-a profeţit.\nȘi adevăr se arată, ce n-au văzut ochii vreodată’.\n\n3. A sfârșit și ne-a mântuit din moarte, al Tatălui Fiu.\nEl, Mielul ne-a răscumpărat. Pe moarte stăpân s-așezat.\n\n4. A sfârșit. Las’ audă toţi! Cei mâhniţi din orice popor, \nSă cânte veseli înspre cer! Sfârșit-a mântuirea, El!` },
            301: { title: "Victoria Sionului", text: `1. Sioane, vezi învingerea? Scoală! Lasă înjosirea!\n‘Nalţă-ţi capul cu trezire! |: Îţi vin puteri și mărire. :|\n\n2. Zi de domnie-ţi răsare. Îmbrac’ a măririi haine!\nCu dreptatea-I te învelești, |: pe ‘ntreg pământ să strălucești. :|\n\n3. Nu vei mai ajunge-odată curţile să-ţi molipsească.\nDușmanul, cu fălnicie, |: nu va domni-n sfânta-ţi culme. :|\n\n4. Vezi? Dumnezeu te-a auzit. Locul tău sfânt ţi-a rezidit.\nRegele tău te apără. |: Pacea-ţi nimic n-o tulbură. :|\n\n5. Și, în curând, popoarele pe muntele Tău vor privi.\nȘi cu drept le vei stăpâni. |: Pământul iar Eden va fi. :|` },
            302: { title: "Fidelitate", text: `1. Sus! Voi, vitejii lui Christos, la război! Iehova vă cheamă în lupta Sa.\nPe șanţurile Salemului luptaţi! Cu răsunet să sune trâmbiţa!\nIată, naţiunile se înșiră! Toţi se răscoală contra Domnului.\nSatan le conduce opunându-se, știind că numai puţin timp are.\n\n2. Sună chemarea la lupta cea sfântă! Voi, credincioși, staţi în rând bucuroși,\nArătând încredere în Acela care păzește pe cei credincioși!\nCredincioși faţă de Christos și de fraţi, să-I dăm lui Dumnezeu ce I-am promis!\nArdă făclia în mâinile noastre! Să vestim cu zel Împărăţia!` },
            303: { title: "Biruinţa dreptăţii", text: `1. Pe-a’ Sfintei Scripturi pagini ard a’ veacurilor străluciri,\nFiindcă ce în ea scrie tot mai mult se împlinește. \n\n2. Sfântul Cuvânt pe-aripi scoală. Din an în an se înalţă.\nPătrunderea-i tot mai mare. De raza lui noaptea piere.\n\n3. Și precum trec veacurile, steagul Lui se desfășoară,\nCa-n sfârșit orice hotare de El să se acopere.\n\n4. Precum a soarelui rază, vindecând, ea dă viaţă,\nCând orice ‘ntuneric, umbre, rătăciri sfârșit își ajung.` },
            304: { title: "Trezește-te! Scoală!", text: `1. Scoală! Sus, Ierusalime! Noaptea a trecut.\nAșa strigă străjerii din locul lor ‘nalt.\nȘi sfinţii cu bucurie ascultă chemarea în noapte.\nSus, fecioare înţelepte! A sosit Mirele!\nArdă candelele! Aleluia! \nIntraţi în serviciul Său! Din nuntă vă veţi împărtăși.\n\n2. Sion ascultând cântarea, de bucurie\nStrigă limba, din tristeţe neagră trezind,\nHaine măreţe îmbrăcând, că Așteptatul e de faţă.\nNoapte’-a trecut. Ziu’-a sosit. E de faţă Fiul\nCreatorului sfânt. Aleluia! \nPeste cel ce în Christos e, e a dreptăţii mantie.` },
            305: { title: "Așteaptă pe Domnul!", text: `1. Pe Domnul Îl așteaptă, și-al Lui cuvânt ia seamă!\nEl ţie îţi promite că în necaz te-ajută.\n\n2. Când mâhniri te-or ajunge, gânduri nor se ridică,\nAuzi cum El promite, că în necaz te-ajută.\n\n3. De te-ajunge ispita, așteaptă-L cu credinţă!\nȘi apoi tu vei vedea că în necaz te-ajută.` },
            306: { title: "Al jubileului cânt", text: `1. Al jubileului cânt, mare, pământ străbată!\nE de faţă ora când Isus Christos tronează.\nAuzi insule, pustii? Se grăbesc cu veselii\nSă salute pe Rege, că El binecuvântă.\n\n2. Al jubileului cânt, mare, pământ străbată!\nCa să știe oricine că tronu-I pe veci ţine.\nDomn va fi nemărginit. Orice tron va fi zdrobit.\nEl deja și lucrează. În curând va învinge.` },
            307: { title: "În lumină umblând", text: `1. În lumină umblând, vei ști bucuria dreaptă,\nCe vine de la acel ce chiar în lumină stă.\n\n2. În lumină umblând, cu El ai împărtășire.\nÎn cine nu e egoism, e căpetenie.\n\n3. În lumină umblând, ochii-ţi lumină vor vedea,\nCe clar îţi va descoperi cum să-I servești cauza.\n\n4. Atunci lucrezi cu fraţii tăi cu înţelegere.\nVei învăţa a iubi și vei lucra mai bine.` },
            308: { title: "Zorile", text: `1. Pază, spune zori mai fi-vor și peste Sion raze?\nArată-se semne bune peste a ta cărare?\nDa, pribeagule, uită-te! Strălucirea sus pe cer.\nIa-ţi hainele de mireasă! Fie-ţi sufletul vesel!\n\n2. Pază, spune strălucește anul mare-al Sâmbetei?\nȘi se văd semne ce-arată venirea ‘Mpărăţiei?\nDa, pribeagule, uită-te! Colinele-n Canaan\nȘi Salem pentru mărire se scoală la mare an.\n\n3. Uite pribeagule, ţara e cu fructe ‘ncărcată!\nAuzi ‘colo strălucirea ei cu pompă-mbrăcată? Auzi? Imnuri se înalţă pe Mielul bun lăudând,\nCare-aduce mântuire, viaţă și scăpare.` },
            309: { title: "Cât mai este din noapte?", text: `1. Pază, mult e din noapte? Vezi semnele sigure?\nPribeag, pe vârf de munte, vezi steaua dimineţii!\nPază, a ei lucire speranţă ne aduce?\nPribeagule, e semnul ce-l așteaptă Israel!\n\n2. Pază, mult e din noapte? S-a urcat mai sus steaua?\nDa, pribeag! Și în urmă se ‘nsenină privirea.\nPază, a ei lumină ceaţa nopţii ‘mprăștie?\nDa, pribeag! Și în curând, noaptea în zi se schimbă.\n\n3. Pază, mult e din noapte? Zori de dimineaţă e?\nPribeag, toate umbrele și îndoieli’ vor trece.\nPază, ce Iehova vrea s-a-mplini peste toate?\nDa! Pentru că Mesia e peste pământ Rege!` },
            310: { title: "Te lăudăm!", text: `1. Te mărim, o, Doamne, pentru al Tău Fiu!\nCare, pentru noi, sânge sfânt a jertfit.\n\nRefren:\nAleluia! Lauda Ta! A Ta fie slava!\nAleluia! Dă-ne nouă inimă nouă!\n\n2. Mulţumim noi, Doamne, cuvântul Tău sfânt,\nCă noaptea vieţii de la noi alungi!\n\n3. Mulţumim că aduci Împărăţia,\nȘi Mântuitorul ne va ‘libera!` },
            311: { title: "La sfârșit", text: `1. Dincolo ne vom întâlni. La sfârșit. La sfârșit.\nCă în liman noi vom păși. La sfârșit. La sfârșit. Când lupta ne-o vom sfârși, la ţintă vom ajunge.\nCu toţi’ vom fi fericiţi. La sfârșit. La sfârșit.\n\n2. Intonând harfa cerească. La sfârșit. La sfârșit.\nCântând lui Dumnezeu slavă. La sfârșit. La sfârșit.\nSunetul jos ajunge. Om la Domnul se ‘ntoarce.\nAscultând, e fericit. În sfârșit. În sfârșit.\n\n3. Acolo vedem pe Isus. La sfârșit. La sfârșit.\nCe în mărire ne pune. La sfârșit. La sfârșit.\nScopul Tatălui, așa, cu El vom executa.\nAici corpul întregit. La sfârșit. La sfârșit.\n\n4. Și când vom vedea gloria. La sfârșit. La sfârșit.\nDe pe pământ fuge umbra. La sfârșit. La sfârșit.\nȘi a Domnului mare înţelepciune, milă,\nTot poporul să vadă! La sfârșit. La sfârșit.` },
            312: { title: "Mulţumire", text: `1. Îţi mulţumim Ţie, Doamne, a Ta mare milă,\nCă, cu mâini și buze slabe putem servi Ţie!\nÎţi mulţumim că Tu, prin noi, răspândești lumina,\nÎn negura asta mare, unde lumea zace!\n\n2. Îţi mulţumim că ne-ai permis să-Ţi mărim numele,\nÎnaintea acelora car’ sunt în robie!\nNimic nu-i așa de măreţ, pe pământ, decât ce\nServiciul Tău ne oferă în veci, mărit Rege!\n\n3. Lasă ca tot ce-i sfânt și drept pe noi să ne umple,\nBucurându-ne că putem mai curat să vedem!\nDă ca zelul nost’ fierbinte veșnic să nu scadă,\nDe Tine să mărturisim cu mare ‘ndrăzneală!` },
            313: { title: "Moștenitori cu Christos", text: `1. Ce grupă de oameni săraci, care pe-acolo se trag,\nPe căi atât de brușoase, strâmte, părăsite?\n\n2. Viţă regească sunt ei, și ai Domnului copii.\nAu mare promisiune, de aceea cântă.\n\n3. Și de ce sunt așa zdrenţoși, ba și dispreţuiţi?\nFiindcă lumea nu vede hainele lor cerești.\n\n4. Și pentru ce umblă veseli pe îngusta cale?\nFiidcă le-a dat exemplu Vizirul lor mare.` },
            314: { title: "Rugăciunea", text: `1. Câte piedici sunt în cale, pân’ la tronul Lui ajungem?\nDar cine știe ce-i ruga, el se întoarce tot la ea.\n\n2. Rugăciunea nori alungă. Scara lui Iacob la cer e.\nCredinţa ne oţelește. De sus harul ne trimite.\n\n3. Rugăciunea ne ‘narmează. Pierde tot cel ce o lasă.\nSatan umblă înspăimântat când ne vede îngenunchiaţi.` },
            315: { title: "Sunteţi martorii mei!", text: `1. Copilul meu, ce ai în mâna ta? Talent, cu ce Christos m-a înzestrat!\nCe El ţi-a-ncredinţat, folosește-n curând, în fapte prefăcând talentul tău!\n\n2. Eu îţi sunt Dumnezeu! Zic să fie! Am ales un popor pentru Mine.\nBucurii de dorești, Mie să îmi servești! Ca sol bun să-Mi vestești cuvintele!\n\n3. “Martori Îmi sunteţi, că sunt Dumnezeu!” Cine mă servește mult străluce!\nScoate-ţi a ta parte din sfânta lucrare! Vei primi o cinste glorioasă.` },
            316: { title: "Cântec de mărire", text: `1. Părinte, dacă eu privesc mila-Ţi cu credinţă,\nAm eu mare bucurie și cânt Ţie laudă!\n\n2. Nu există grai fierbinte de a putea spune,\nDoamne, mulţumiri ascunse cântăm în inimă!\n\n3. În veci de veci Îţi dotorez eu mulţumire!\nBucuros, Părinte, vestesc eu a Ta iubire!` },
            317: { title: "Cântarea miresei", text: `1. Când eu mă uit la cruce, izbucnesc spre laudă.\nAcol’ Domnul a murit. Pe mine m-a izbăvit.\nCum să pot eu exprima ce-a umplut inima mea?\n|: Limba-mi nu e în stare nouă simţire-a spune. :|\n\n2. Primind nouă viaţă, las pe cea pământească.\nE mai plăcut jugul Tău, ce prietenia Ta dă!\nBucuros urmez Ţie pe calea de jertfire.\n|: Tu mă ajuţi în cale, fiind crucea grea, mare. :|\n\n3. ‘N viitor am gândirea unde Domnul îmi va da\nBogăţia, mărirea ce nu poate da lumea.\nFerice oră fi-va când la El ne va lua!\n|: Pe tron ne-așează. Fiind Regină, ne salută. :|\n\n4. Să fie orice loviri, tristeţe sau mari mâhniri,\nNumai spre bine-mi servesc, spre mângâieri, har ceresc.\nZelul meu la-ncercare ca moartea e mai tare,\n|: Ce veșnic va tot arde fericiri ne‘ncetate. :|` },
            318: { title: "Mă ascunde", text: `1. Când urlă furtuna mare, și abia stă cel tare,\nSub scutul aripii Tale îmi găsesc eu scăpare!\n\nRefren:\nMă ascunde. Mă ascunde. Nu mă ajunge nici un rău.\nMă ascunde. Mă ascunde. Și mă ia sub scutul Său.\n\n2. Deși vin întristări potop, tot pe El Îl recunosc.\n‘Ncercarea de voi suporta, îmi va crește credinţa.\n\n3. Pân’ Satan cu viclenie-n cursă-i vrea a mă prinde,\nEl m-ajută, mă ‘nnoiește. Din rău bucurii scoate.\n\n4. Zbată-se deci valurile, pericolul să urle,\nInima mea nu se teme, că la Domnul privește.` },
            319: { title: "Unde doi sau trei se adună", text: `1. Unde doi sau trei se-adună, și-n cuvântul Tău se-afundă,\nA-Ţi cerceta taina-Ţi, Doamne, cum ne-ai promis, acolo ești!\n\n2. Pentru aceasta Te rugăm, dă-ne harul și sfatul Tău!\nAi spus că nu ne vei lăsa! Ne ești păstor totdeauna!\n\n3. Dragoste curată dă-ne! Tot pentru Tine să facem!\nDespre noi lumea să vadă, Doamne, că ai Tăi noi suntem!` },
            320: { title: "Jertfă de mulţumire", text: `1. Când mă uit la cruce, unde Domnul muri pentru mine,\nNu vreau lume-a ta plăcere, așa mult înșelătoare.\n\n2. Cum mi-ași găsi eu odihnă, Doamne, făr’ de Tine-n lume?\nDacă sângele l-aș uita, ce-mi dă pacea și viaţa?\n\n3. Numai Tu dispui de mine! Tot realul meu e-al Tău, Doamne!\nCe mare favoare mie! Cum să-Ţi cânt eu laudă Ţie?\n\n4. Pe mine, ca jertfă vie, mă predau cu totul Ţie!\nMila-Ţi acum mă primește, și-n munca-Ţi mă ‘mpărtășește!\n\n5. Deși munca mea e slabă, pentru Tine-i o mireasmă,\nCă imboldu-mi e iubire, ce Ţie-ţi face plăcere!` },
            321: { title: "Cine-i lângă Domnul?", text: `1. Cine-i lângă Domnul? Cine-I servește,\nPunând mărturie între popoare?\nCine-i lângă dușman, contra Domnului?\nȘi cine-i cu Domnul la chemarea Lui?\nDin al Său mare har, la El se-adună,\nServindu-L credincios, ceata Lui mică.\n\n2. De-i tare Satan și groaznică lupta,\nMarele nost Rege are ‘nvingerea.\nSteagul Său fâlfâie – semn de ‘nvingere.\nIehova-I ajută cu a Lui oaste.\nDin al Său mare har, la El se-adună,\nServindu-L credincios, ceata Lui mică.\n\n3. Ceata acelor unși ca popor ales, \nAici, jos pe pământ, în oaste-I pășesc.\nAlarma Domnului cheamă la război.\nCurajos se luptă toţi cei credincioși.\nDomnul cu harul Său ni-e siguranţă.\nLui servește numai ceata Lui mică.` },
            322: { title: "Încredere și siguranţă", text: `1. Car’ în Domnul se ‘ncred, și-n scumpul Lui sânge,\nStau tari în orice furtună și nimic nu-i mișcă.\n\n2. Sionul neclintit, munte tare veșnic,\nPoporul e-n siguranţă în mila cerească.\n\n3. Cum Ierusalimul de munţi e ‘nconjurat,\nAșa îi păzește Domnul pe ai Săi ne‘ncetat.\n\n4. Domnul de Israel multă grijă poartă.\nSub umbra mâinilor Sale i-a dat siguranţă.` },
            323: { title: "Din Edom cine-i ce vine?", text: `1. Din Edom cine-i ce vine, plin cu sânge pe haine?\nVeșmintele-I sunt măreţe și cu putere mare.\nAcest erou Domnul e! El poate să mântuie!\n\n2. Al marelui Iehova Sol e acel ce pășește\nSă se răzbune pe dușman, poporul Său să-l scape.\nIsus este Mesia! Ca El nu e nimenea!\n\n3. Haina Lui de ce-i cu sânge? Pentru că în teasc călcând,\nAl hulitorilor sânge I-a stropit veșmintele,\nArmaghedonul luptând, libertate câștigând.\n\n4. O, cine cu lupta mare biruinţa-i câștigat!\nSă ‘mpărăţești cu mărire, la om bine aducând!\nPoporul Tău Te laudă, în veci, o, Rege mare!` },
            324: { title: "În același duh", text: `1. Pe Dumnezeu, sfinţii Lui, jos, cu o inimă Îl laudă,\nAplecându-se bucuroși, cântând despre El cântarea.\n\n2. Ei știu că El e Dumnezeu, dătătorul de viaţă.\nȘi poporul, de El chemat, va primi har și viaţă.\n\n3. O, intră, dar, în templul Său, și jertfește-I miros plăcut,\nCântând imnul mulţumirii, lăudându-L în templul sfânt!\n\n4. El este bun, milos și drept. Harul Său margini nu are.\nCe zice stă pe vecie. Faptele-I sunt de mărire.` },
            325: { title: "Slujire înţeleaptă", text: `1. Lângă Marele Preot, cu tot ce-avem, servim,\nLegănând în faţa Lui a jertfirii grăsimi.\n\nRefren:\nSă legăm, dar, de altar Mielul de sacrifici’, \nVestind marele nume al Domnului, aici! \n\n2. În mâna Lui oferind corpurile noastre,\nAșa ‘mplinind postul nost’, slujba înţeleaptă.\n\n3. Lucrul jertfirii singur Domnul săvârșește,\nAjutând, în legământ parte a ne face.\n\n4. Haina dreptăţii purtăm, car’ Lui aparţinem.\nȘi ca domnitori consorţi, mantie posedăm.` },
            326: { title: "Regele pământului", text: `1. Bucură-te, Israele! Sus la Mesia privește,\nCă e în putere! A scăpa pe om El vine.\nEl e-al pământului Rege, în locul cel înalt!\n\n2. În această calitate la popor poate s-ajute,\nDorinţa-i aducând. Că tot ce Lui se supune,\nVa putea primi viaţă și vedea lumină.\n\n3. Piatra ce a respins omul, acum este tocmai unghiul,\nPe muntele Sion, unde toţi aceia care\nCu piatra vor corespunde, vor putea ajunge.` },
            327: { title: "Psalmii 33", text: `1. Drepţi, credincioși, vă bucuraţi! Vouă se cuvine,\nDacă gura voastră laudă |: Domnului răsună. :|\n\n2. Harfe și timpane sune cânt de veselie!\nCântecul nou să se-audă, |: prin Sfânt Cuvântul Său! :|\n\n3. Că Cuvântul Său e real. Faptele-I sunt drepte.\nCe-i just și drept, El iubește, |: dând din belșug milă. :|\n\n4. Puteri rele El zdrobește. Dar poporul Lui stă.\nDin necaz pe-ai Săi îi scapă. |: În lipsă-i nutrește. :|` },
            328: { title: "Al Sionului Rege Sfânt", text: `1. Al Sionului Rege Sfânt va fi Domn peste pământ,\nGlorioasa-I guvernare tot terenul ocupând! \nPopoarele rătăcite, atunci, luciri vor vedea.\nÎntunericul sub Soare dispare ca negura.\n\n2. Poporul lui Israel la Domnul se va întoarce.\nVăzându-L pe cel pironit mângâiere primește.\nRege mare, ‘ntindeţi mâna să ‘nvingă cauza Ta!\nVindecând, adă ‘ndurare – dorinţa ‘ntre popoare!` },
            329: { title: "Sionul eliberat", text: `1. Sionul ‘liberat, iar harfele luaţi!\nPentru Sion, în Babilon, nu plângă nimenea!\n\n2. Spiritul Domnului harfa ne-a intonat.\nRăsune-n armonie-acum al nostru sfânt cântat!\n\n3. Pe harfa cerească răsune strunele!\nSionului re‘nviere Domnul îi dăruie!` },
            330: { title: "Fericitul Sion", text: `1. Vezi tu Sionul între munţi? De Dumnezeu e păzit.\nLumea ‘ntreagă să-l asalte, nu îl înving armele.\n|: Sioane, de mila Lui e-a ta parte! :|\n\n2. Orice prieten bun te lasă. Legătură lumească.\nMama își lasă copilul. Cerul nu dă sprijinul.\n|: Dar iubirea Lui Iehova nu scade. :|\n\n3. Ca mai mult să strălucești, las’ prin probe multe să treci!\nIubirea-I așa voiește că în ochii Lui scump ești.\n|: El cu tine lumină îţi dăruie. :|` },
            331: { title: "Psalmii 122", text: `1. Sion, loc fericit, cu har împodobit!\nCetatea-ţi miraculoasă, acolo vom merge,\nPlini de mulţumire, lăudând al Domnului Nume! \n\n2. Unsul lui Dumnezeu acolo ‘Și-așează\nTronul Său și judecata la el va aduce,\nCa ai Săi să spună mângâiere la popoare.\n\n3. Pașnic s-ai locașul! Că-n tine tot omul\nAflă pacea, fericirea. Că Domnul pe tine\nTe binecuvântă, făcând tot pentru-a ta pace.` },
            332: { title: "Sfânt, sfânt, sfânt", text: `1. Sfânt, sfânt, sfânt, sfânt, sfânt ești, Doamne, Iehova!\nÎn zori de dimineaţă Îţi cântăm lauda!\nSfânt, sfânt, sfânt, sfânt, sfânt, milostiv puternic,\nMaiestate ceresc și Domn veșnic!\n\n2. Sfânt, sfânt, sfânt, sfânt, sfânt ești! Sfinţii cu harfă,\nPe malul mării ‘nfocate, așa-Ţi cântă!\nŢie Ţi se-nchină heruvimi, serafimi!\nDomn ai fost! Ești! Vei fi fără margini!\n\n3. Sfânt, sfânt, sfânt, sfânt, sfânt ești! Norii Te ascund!\nOchiul păcătos mărirea Ta n-o vede!\nNumai Tu ești sfânt! Dumnezeu, în Tine e\nDreptate și curată iubire!\n\n4. Sfânt, sfânt, sfânt, sfânt, sfânt ești, Dumnezeu tare!\nFăptura-Ţi Te laudă-n cer, pământ și-n mare!\nSfânt, sfânt, sfânt, sfânt, sfânt ești! Plăcut și îndurat!\nPrin Fiul Tău să fii mult adorat!` },
            333: { title: "Păstorul meu", text: `1. Păstorul meu Domnul este. Nu mai am nici o grijă.\nDe-ale Lui oi se îngrijește. Pe slabe le ia-n braţe.\nDar eu nu voi murmura. În El mă încred numai!\nCă cine-i sub ocrotirea Sa, nu simţește lipsa.\nCă de cine El poartă grijă, nicicând nu duce lipsă. \n\n2. Ca martor pentru Iehova pe El în corp Îl servesc.\nSolia mântuirii vestesc, mângâind pe întristaţi.\nPenele-I mă acopăr’, și aripa-I mi-e locaș.\nPe câmpii verzi mă conduce și pe cărări sigure.\nPe câmpii verzi mă paște și pe căi bune mă duce.\n\n3. Îngrijirea Lui plăcută-i. Sfatu-I ce bun și drept e!\nNu o poate exprima limba, cuvântu-I cum mângâie!\nZel de-ar arde în mine a-I urma poruncile,\nȘi până pribegia-mi ţine să port vestea bună,\nȘi să vestesc vestea bună până pribegia-mi ţine!` },
            334: { title: "Cântarea miresei", text: `1. Domnul a venit! Grăind, ne cheamă. Iubita Mea, scoală și-Mi urmează!\nNeagră-i noaptea. Aproape-i furtuna, ce naţiuni mândre umili-va.\n\nRefren:\nIubita Mea, vino de-aici! Soaţă-Mi vei fi în patria Mea,\nStând cu Mine pe tronul Tatălui, fiindcă tu Mi-ai fost credincioasă!\n‘Naintea Tatălui te recunosc, o, scumpa Mea mireasă!\n\n2. Vine Împărăţia! Voia Sa, când se va arăta ziua, fie!\nCurând soarta ta grea se va sfârși. Pentru credinţă, coroana-i primi.\n\n3. Ce între popor ţi-a vestit buzele, pe-al Meu cap a fost scumpă ungere.\nInima-ţi e ca un câmp înflorit, de unde curge al vieţii râu.\n\n4. Locul e gata. Ora a sosit, ca să fii în locașul Meu plăcut.\nOchii-ţi frumoși M-au ‘ncântat pe Mine. O, vino, dar, ca să fiu cu tine!` },
            335: { title: "Sunt Dumnezeu!", text: `1. Falnicul faraon din Egipt, neslobozind pe Israel,\nZicând: “Pe Iehova nu-L cunosc. Ce-i de astfel pretinde El?”\nA cui a fost puterea ce l-a zdrobit? Cu oastea lui în mare-a pierit.\nAl cui braţ a ‘liberat poporul Său, recâștigând Sieși mare nume?\n\nRefren:\nDumnezeu sunt! Altul nu este! Domn sunt Eu! Iehova Mi-e Numele!\nRegele Meu uns în Sion tronează! Om și popor pe El Îl adoră!\n\n2. Mândrul rege al Asiriei, hulind pe Domnul evreilor:\n“Iehova pe tin’ nu te-a scăpa! Mie îmi vei fi servitor!”\nAl cui a fost braţul cel ce a ucis oastea acestui rege mândru?\nCine a scăpat poporul de dușman, câștigând mărire numelui Său?\n\n3. Și-acum puterea răutăţii iese la luptă cu Christos.\nDar o groază o va apuca. Poporul e mult apăsat.\nCine va zdrobi pe cel apăsător? Cine va strica acest jug greu?\nCine aduce dreptate la popor, și în locul necazului bine?` },
            336: { title: "Christos – Regele pământului", text: `1. O, vezi pe vârful munţilor vedenie măreaţă?\nVine oastea lui Iehova cu toată armătura!\nCoiful la toţi înspre cer stă! Raza-I eroare alungă!\nToţi cu vocea tare strigă că Christos e Regele! \n\nRefren:\nSărutaţi pe Fiul ca să nu mergeţi în pierzare!\nFericiţi sunt car’ în El cred, cu ascultare!\n\n2. Dreptate și brâu lucitor pe ei sunt, și pavăză. \nPlatoșa credinţei pe braţ, huliri să nu-i jignească.\nToţi se ‘mpărtășesc din luptă. De pericol ei n-au frică.\nDeplin ai Vizirului sunt, al Său exemplu văzând.\n\n3. Regele lor e ‘nainte, pe car’ vesel urmează,\nAșa ‘mplinind ce ordonă, precum de la El vine.\nSabia lor e Cuvântul. Vestea bună în gura lor,\nNumai Cuvântul Domnului e, la ce ei se uită.\n\n4. Că va sosi sfârșitul și chiar ziua răsplătirii,\nCând Christos de la Dumnezeu mărirea o va primi.\nRidicând braţul El strigă: “Va pieri cin’ se opune!”\nVoi mari, înţelepţiţi-vă, primind a Sa domnie!` },
            337: { title: "Ascultă al Împărăţiei anunţ!", text: `1. Ascultă al Împărăţiei anunţ! Christos e Domn pe ape și pământ!\nAcum leagă pe Satan, pe șarpele vechi, pe dragonul car’ pe om l-a chemat la rău.\n\nRefren:\nPăcătosul părăsească-și calea! Nelegiuitul schimbe-și cugetarea!\nÎntoarcă-se la Domnul din inimă și îi va da iertarea!\n\n2. Acum vestesc martorii lui Iehova că pe cel zdrobit El va alina,\nCă Christos pe pământ Rege va rămâne pân’ rău, păcat, prin domnia-I vor dispare.\n\n3. Fericit e omul care-L ascultă, și ca să-L servească la El vine!\nIehova pe cel credincios îl păzește, ce la popoare mântuirea vestește.` }
        };


        // --- МАГІЧНИЙ СКРИПТ ---
        // Цей скрипт автоматично пройдеться по існуючому масиву SONGS

            arrowLeft: `<svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>`,
            sun: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`,
            moon: `<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`,
            type: `<svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>`,
            globe: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`,
            book: `<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`
        };

        // --- APP STATE ---
        let state = {
            view: 'list', 
            activeSongId: null,
            searchQuery: '',
            settings: {
                appLang: 'ua', // ua, ru, ro
                songLang: 'ua', // ua, ru, ro
                theme: 'light',
                selectedBook: 'all',
                sortBy: 'number',
                fontSize: 18
            }
        };

        // --- FUNCTIONS ---
        function saveState() { localStorage.setItem('spivannyk-v2', JSON.stringify(state.settings)); }
        function loadState() {
            const saved = localStorage.getItem('spivannyk-v2');
            if (saved) state.settings = { ...state.settings, ...JSON.parse(saved) };
            applyTheme();
        }
        function applyTheme() {
            if (state.settings.theme === 'dark') document.body.classList.add('dark');
            else document.body.classList.remove('dark');
        }

        function getFilteredSongs() {
            // 1. Filter songs that exist in current Song Language
            let result = SONGS.filter(s => s.versions[state.settings.songLang]);

            // 2. Filter by Book
            if (state.settings.selectedBook !== 'all') {
                result = result.filter(s => s.versions[state.settings.songLang].book === state.settings.selectedBook);
            }

            // 3. Search (Title, Text, Number)
            if (state.searchQuery.trim()) {
                const q = state.searchQuery.toLowerCase();
                result = result.filter(s => {
                    const ver = s.versions[state.settings.songLang];
                    return ver.title.toLowerCase().includes(q) || 
                           ver.text.toLowerCase().includes(q) || 
                           s.number.toString().includes(q);
                });
            }

            // 4. Sort
            result.sort((a, b) => {
                if (state.settings.sortBy === 'number') return a.number - b.number;
                const tA = a.versions[state.settings.songLang].title.toLowerCase();
                const tB = b.versions[state.settings.songLang].title.toLowerCase();
                return tA.localeCompare(tB);
            });
            return result;
        }

        // Helper to get unique books for current song language
        function getAvailableBooks() {
            const currentLang = state.settings.songLang;
            const books = new Set();
            SONGS.forEach(s => {
                if (s.versions[currentLang]) {
                    books.add(s.versions[currentLang].book);
                }
            });
            return Array.from(books);
        }

        // --- RENDER ---
        const app = document.getElementById('app');

        function render() {
            // Очищуємо екран тільки якщо ми не в режимі списку, 
            // або якщо це перше завантаження списку
            if (state.view !== 'list' || !document.getElementById('searchInput')) {
                app.innerHTML = '';
            }
            
            if (state.view === 'list') renderList();
            else if (state.view === 'song') renderSong();
            else if (state.view === 'settings') renderSettings();
        }

        function renderList() {
            const t = UI[state.settings.appLang];
            const songs = getFilteredSongs();

            // 1. Перевіряємо, чи вже створена "шапка" і пошук
            // Якщо ні - створюємо. Якщо так - пропускаємо цей крок, щоб не збивати курсор.
            let listContainer = document.getElementById('song-list-container');
            
            if (!listContainer) {
                const header = document.createElement('header');
                header.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; align-items:center; gap:10px; font-weight:bold; font-size:20px;">
                            ${ICONS.music} ${t.appTitle}
                        </div>
                        <button class="icon-btn" onclick="setView('settings')">${ICONS.settings}</button>
                    </div>
                    <div class="search-bar">
                        <div class="search-icon">${ICONS.search}</div>
                        <input type="text" id="searchInput" class="search-input" placeholder="${t.search}" 
                               value="${state.searchQuery}" oninput="handleSearch(this.value)">
                        <div id="clearBtn" class="clear-icon" style="display:none" onclick="handleSearch('')">${ICONS.x}</div>
                    </div>
                `;
                app.appendChild(header);

                listContainer = document.createElement('div');
                listContainer.id = 'song-list-container';
                listContainer.className = 'song-list';
                app.appendChild(listContainer);
            }

            // Оновлюємо кнопку очищення
            const clearBtn = document.getElementById('clearBtn');
            if (clearBtn) clearBtn.style.display = state.searchQuery ? 'block' : 'none';

            // 2. Завжди оновлюємо САМЕ СПИСОК пісень
            if (songs.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-sec);">${t.noRes}</div>`;
            } else {
                listContainer.innerHTML = ''; // Очищаємо старий список
                songs.forEach(song => {
                    const ver = song.versions[state.settings.songLang];
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    card.innerHTML = `
                        <div class="song-number">${song.number}</div>
                        <div class="song-info">
                            <h3>${ver.title}</h3>
                            <p>${ver.book} • ${ver.text.substring(0, 30).replace(/\n/g, ' ')}...</p>
                        </div>
                    `;
                    card.onclick = () => openSong(song.id);
                    listContainer.appendChild(card);
                });
            }
        }
        

        function renderSong() {
            const song = SONGS.find(s => s.id === state.activeSongId);
            const ver = song.versions[state.settings.songLang];
            
            // Якщо пісні немає вибраною мовою, показуємо фолбек
            const displayVer = ver || Object.values(song.versions)[0];

            const header = document.createElement('header');
            header.style.backgroundColor = state.settings.theme === 'dark' ? '#1e293b' : '#ffffff';
            header.style.color = state.settings.theme === 'dark' ? '#fff' : '#000';
            header.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <button class="icon-btn" onclick="setView('list')">${ICONS.arrowLeft}</button>
                    <div style="text-align:center;">
                        <div style="font-weight:bold; font-size:18px;">#${song.number}</div>
                        <div style="font-size:12px; color:var(--text-sec);">${displayVer.book}</div>
                    </div>
                    <button class="icon-btn" onclick="changeFontSize()">${ICONS.type}</button>
                </div>
            `;
            app.appendChild(header);

            const content = document.createElement('div');
            content.className = 'song-view';
            content.innerHTML = `
                <h2 class="song-title">${displayVer.title}</h2>
                <div class="song-text" style="font-size: ${state.settings.fontSize}px;">${displayVer.text}</div>
            `;
            app.appendChild(content);
        }

        function renderSettings() {
            const t = UI[state.settings.appLang];
            const books = getAvailableBooks();

            const header = document.createElement('header');
            header.style.backgroundColor = state.settings.theme === 'dark' ? '#1e293b' : '#ffffff';
            header.style.color = state.settings.theme === 'dark' ? '#fff' : '#000';
            header.innerHTML = `
                <div style="display:flex; align-items:center;">
                    <button class="icon-btn" onclick="setView('list')">${ICONS.arrowLeft}</button>
                    <span style="font-weight:bold; margin-left:10px;">${t.settings}</span>
                </div>
            `;
            app.appendChild(header);

            const container = document.createElement('div');
            container.className = 'settings-view';

            const createRow = (icon, label, content) => {
                const row = document.createElement('div');
                row.className = 'setting-row';
                row.innerHTML = `<div class="setting-label">${icon} ${label}</div>`;
                row.appendChild(content);
                return row;
            };

            // Theme
            const themeDiv = document.createElement('div');
            themeDiv.className = 'toggle-group';
            themeDiv.innerHTML = `
                <button class="toggle-btn ${state.settings.theme === 'light' ? 'active' : ''}" onclick="updateSetting('theme', 'light')">${t.light}</button>
                <button class="toggle-btn ${state.settings.theme === 'dark' ? 'active' : ''}" onclick="updateSetting('theme', 'dark')">${t.dark}</button>
            `;
            container.appendChild(createRow(ICONS.sun, t.appearance, themeDiv));

            // Font Size
            const fontDiv = document.createElement('div');
            fontDiv.innerHTML = `<input type="range" min="12" max="32" step="2" value="${state.settings.fontSize}" oninput="updateSetting('fontSize', this.value)">`;
            container.appendChild(createRow(ICONS.type, `${t.size}: ${state.settings.fontSize}px`, fontDiv));

            // Languages
            const langDiv = document.createElement('div');
            langDiv.style.display = 'flex'; langDiv.style.flexDirection = 'column'; langDiv.style.gap = '10px';
            
            // Helper for select
            const createLangSelect = (settingKey) => `
                <select onchange="updateSetting('${settingKey}', this.value)" style="width:130px;">
                    <option value="ua" ${state.settings[settingKey] === 'ua' ? 'selected' : ''}>Українська</option>
                    <option value="ru" ${state.settings[settingKey] === 'ru' ? 'selected' : ''}>Русский</option>
                    <option value="ro" ${state.settings[settingKey] === 'ro' ? 'selected' : ''}>Română</option>
                </select>
            `;

            langDiv.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${t.appLang}</span>
                    ${createLangSelect('appLang')}
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${t.songLang}</span>
                    ${createLangSelect('songLang')}
                </div>
            `;
            container.appendChild(createRow(ICONS.globe, t.lang, langDiv));

            // Book & Sort
            const bookDiv = document.createElement('div');
            bookDiv.style.display = 'flex'; bookDiv.style.flexDirection = 'column'; bookDiv.style.gap = '10px';
            
            let bookOptions = `<option value="all" ${state.settings.selectedBook === 'all' ? 'selected' : ''}>${t.allBooks}</option>`;
            books.forEach(b => {
                bookOptions += `<option value="${b}" ${state.settings.selectedBook === b ? 'selected' : ''}>${b}</option>`;
            });

            bookDiv.innerHTML = `
                <select onchange="updateSetting('selectedBook', this.value)">${bookOptions}</select>
                <div class="toggle-group">
                    <button class="toggle-btn ${state.settings.sortBy === 'number' ? 'active' : ''}" onclick="updateSetting('sortBy', 'number')">${t.sortNumber}</button>
                    <button class="toggle-btn ${state.settings.sortBy === 'title' ? 'active' : ''}" onclick="updateSetting('sortBy', 'title')">${t.sortTitle}</button>
                </div>
            `;
            container.appendChild(createRow(ICONS.book, t.content, bookDiv));

            app.appendChild(container);
        }

        // --- ACTIONS ---
        function setView(v) { state.view = v; render(); }
        function openSong(id) { state.activeSongId = id; setView('song'); }
        function handleSearch(val) { state.searchQuery = val; renderList(); }
        function updateSetting(key, val) {
            state.settings[key] = (key === 'fontSize') ? parseInt(val) : val;
            
            // Якщо змінюємо мову пісень, скидаємо фільтр книги на "Всі"
            if (key === 'songLang') {
                state.settings.selectedBook = 'all';
            }
            
            saveState();
            if (key === 'theme') applyTheme();
            render();
        }
        function changeFontSize() {
            let s = state.settings.fontSize;
            s = s < 30 ? s + 2 : 14;
            updateSetting('fontSize', s);
        }

        // --- INIT ---
        loadState();
        render();
