                ru: { book: "Песни Восхваления", title: "Святый, Святый, Святый!", text: `1. Святый, Святый, Святый!\nБог Всемогущий!\nРано утром песни\nмы вознесём Тебе.\nСвятый, Святый, Святый\nМилостивый, Сильный!\nБог наш великий, блажен в небесах.\n\n2. Святый, Святый, Святый!\nСлавен Ты в небе;\nПеред Тобой святые венцы повергают,\nХерувимы славные Тебя прославляют,\nТы всегда был и будешь на веки.\n\n3. Святый, Святый, Святый!\nХоть тьма скрывает,\nХоть не может грешный\nглаз на Тебя взирать.\nНет подобного Тебе только Ты один свят,\nПолный во славе, в любви совершён.\n\n4. Святый, Святый, Святый!\nБог Всемогущий.\nСлавят все Тебя: небо, море и земля.\nСвятый, Святый, Святый\nМилостивый, Сильный\nБог наш великий, блажен в небесах.` }
            }},
            { id: "s333", number: 333, versions: {
                ua: { book: "Пісні Хвали", title: "Знаю, що Господь Пастир мій", text: `1. Знаю, що Господь Пастир мій,\nЧому ж мені журитись?\nБо Той, що пасе стадо своє,\nВін і мене пильнує.\nТо-ж я на Нього вповаю\nЧому ж мені лякатись?\nII: Той, що про птиці усе дбає\nВін й за мя памятає. :ІІ\n\n2. Я свідок Бога Єгови,\nОдітий в земне шатро,\nЩоб голосити вість о царстві\nІ рік примиря Його.\nВін від зла мене хоронить\nПід крилами мя держить,\nII: І на пасовиськах зелених,\nЗі стадом мене кормить. :ІІ` },
                ru: { book: "Песни Восхваления", title: "Я знаю, Пастырь мой Господь", text: `1. Я знаю, Пастырь мой Господь,\nС Ним нужды не знаю я:\nТот, Кто нежно всех овец ведёт\nНе забудет и меня.\nВерю, что Ты со мною,\nСердцем я не убоюсь,\n// Хоть и хил и слаб я порою\nСловом Твоим подкреплюсь.//\n\n2. Я свидетель Иеговы,\nДолиной смерти брожу,\nВесть о царстве Божьем повсюду\nЯ народам разношу.\nОн меня подкрепляет,\nПо Своим ведёт стезям:\n// Он мой путь в пажить направляет\nВедёт к тихим водам. //\n\n3. О, как радостное дивно\nПод Твоим покровом жить,\nНи пером, а ни словом живым\nНевозможно изъяснить.\nЯ сердечно внимаю\nКаждый день Твоим Словам\n// И весть благую всем вещаю,\nЧто придёт конец грехам.//` }
            }},
            { id: "s334", number: 334, versions: {
                ua: { book: "Пісні Хвали", title: "Господь вже прийшов і кличе тебе", text: `1. Господь вже прийшов і кличе тебе:\n“Вставай моя мила, слухай мене!\nХоч ніч ще темна і хмари густі,\nСкоро люд взнає силу Єгови”.\n\nПРИСПІВ:\nВиходь прекрасна, ти моя\nДо краю де є вічне щастя;\nІ сядь зі мною на престолі Отця,\nБо ти одна мені вірна була;\nПеред Отцем взнаю Твоє ім’я,\nО люба, мила моя!\n\n2. Вже царство прийшло лучі його,\nМов світло сонця розганяє тьму;\nТернистий шлях і труди скінчились.\nЗамість плачу вінець слави приймеш.` },
                ru: { book: "Песни Восхваления", title: "Спаситель пришёл и зовёт Он тебя", text: `1. Спаситель пришёл и зовёт Он тебя:\nВставай! невеста возлюбленная,\nТьма ночи прошла и день уж настал,\nНародам Господь сигнал уж подал.\n\nПрипев:\nВставай! готовься в путь идти\nК той стране, где вечный мир царит,\nСо Мной на трон воссядешь в той стране,\nИбо верна была во всём ты Мне.\nБогу Отцу Я представлю тебя\nВозлюбленная Моя.\n\n2. Уж скоро придёт Царство Божие к вам,\nИ будут со Мной все верные там:\nВедь вашим слезам положу конец\nИ дам в награду вам славный венец.\n\n3. Тебя ожидает Спаситель давно\nИ жаждет с Тобою слиться в одно.\nИди! о невеста, на брачный пир\nИ найдёшь там радость и вечный мир.\n\n4. Уж место готово и время пришло,\nСкоро сойдусь Я с тобою в одно.\nИди невеста возлюбленная,\nПримет Господь твой в обитель тебя.` }
            }},
            { id: "s335", number: 335, versions: {
                ua: { book: "Пісні Хвали", title: "Гордо і зухвало Фараон", text: `1. Гордо і зухвало Фараон,\nВідказавсь Жидів звільнити:\n“Хто ж Єгова, щоби я мав Його нарід\nвідпустити?”\nНо хто-ж се був, що військо його знищив,\nХвилями червоного моря?\nІ хто визволив свій нарід на волю,\nПривівши й’го в обіцяну землю?\n\nПРИСПІВ:\nЯ — Господь, і іншого нема\nЯ — Господь, котрого ймя Єгова;\nНа троні я посадив свого Царя.\nПіддайтесь Йому; Він зачав правління.\n\n2. Глянь як Ассирийський володар,\nЗневажає ім’я Боже!\n— “Не спасе вас Господь зрук моїх,\nМені ви всі честь віддайте!”\nНо чия рука поразила військо,\nСього зухвалого монарха?\nХто спас свій нарід з рук безбожників,\nІ прославив своє святе ім’я?` },
                ru: { book: "Песни Восхваления", title: "Гордый царь Египта Фараон", text: `1. Гордый царь Египта Фараон\nНе отпускал Евреев он:\nИеговы ведь не знаю я,\nНе отпущу Израиля.\nЧья ж была там сила, что всех всадников\nПоразила в глубине морской ?\nЧья рука спасла Евреев от врагов\nИ так народ освободила Свой?\n\nПрипев:\nЯ - Господь, Бог! и нет другого,\nЯ - Бог, Мое имя - Иегова.\nНа святой горе\nЯ царство укрепил\nИ в нём Христа Царем\nЯ утвердил.\n\n2. И надменный царь Сенахирим\nХотел взять Иерусалим.\nИ Бога поносил, говоря: ”Господь твой не спасёт тебя.”\nЧья ж рука там поразила их мечом\nИ в землю возвратила свою?\nКто Израиля избавил от врагов\nИ власть народам показал Свою?\n\n3. И вот, теперь земные власти\nВосстали на Царя Христа,\nНа святых слагают напасти\nБедных притесняют всегда,\nКто ж теперь порвёт все цепи крепкие\nДаст свободу кротким на земле?\nКто пути покажет справедливые\nИ вечный мир дарует всей стране?` }
            }},
            { id: "s336", number: 336, versions: {
                ua: { book: "Пісні Хвали", title: "На Сіоні, Божій горі", text: `1. На Сіоні, Божій горі\nТам похід виступає,\nУ кождого меч при боці,\nМов те військо-грізноє!\nПеред ними тьма зникає,\nІ облуда геть щезає;\nВоєнний клич все голосять:\n“Хай Цар Христос царює!”\n\nПРИСПІВ:\nПрославляйте, люди, Царя\nЩоб не прогнівився;\nБлаженний той, що завчасу,\nЗ Ним примириться!\n\n2. У “щит віри” одягнені,\nІдуть до бою сміло;\nРозпалені стріли злого\nВідбивають уміло.\nЗа Гетьманом йдуть в слід\nСтяг Царя несуть високо;\nПіснь співають усі хором,\nЩоб їх чути далеко.` },
                ru: { book: "Песни Восхваления", title: "На вершине озарённой", text: `1. На вершине озарённой\nСтоит избранный народ,\nБожиим светом освещённый,\nПродвигается вперёд.\nКаждый воин облечённый\nВ броню правды непорочной\nИ кричит средь тьмы греховной:\nЛикуй земля! Царь царит.\n\nПрипев:\n”Почтите Сына на земле,\nЧтоб не сгинуть вам в пути:\nБлажен тот, кто соблюдает все слова Мои”.\n\n2. Они подняли ”Веры щит”\nСмело и с дерзновеньем,\nОн вражьи стрелы отразит\nСвятым благословеньем.\nИдут вперёд все за Христом,\nЧтобы сражаться со врагом,\nСо всем оружьем и щитом\nИдут с благоговеньем.\n\n3. Сам Царь ведёт народ Свой в бой,\nОни идут с Ним смело:\nЕму предавшись всей душой,\nЧтоб делать Божье дело.\nОни подняли меч святой,\nИ взявши в руки посох свой,\nЧтоб на пути во тьме ночной\nСлужить Ему всецело.\n\n4. Теперь настал великий час\nХристу царить во славе,\nОн победит врагов за нас\nИ свергнет с нас оковы.\nВнимайте, вы, цари земли\nИ вразумитесь все судьи!\nГосподь, живущий в небеси,\nВзывает к вам во гневе.` }
            }},
            { id: "s337", number: 337, versions: {
                ua: { book: "Пісні Хвали", title: "Слухай вість о царстві", text: `1. Слухай вість о царстві,\nЩо днесь гомонить,\nІсус на землі,\nУже бере власть!\nВін звяже і прожене ворога твого.\nПід покров Його ти втікай від злого!\n\nПРИСПІВ:\nХай безбожник путь свою покине,\nІ думки погані відкине геть!\nХай серце своє к Богу наверне,\nВсі гріхи Бог щедро простить.\n\n2. Через свідків своїх Бог кличе нині:\nСумні, прибиті, Станьте веселі!\nХристос, Господь царює,\nІ вже не спічне,\nПоки біль і смуток з землі не прожене.` },
                ru: { book: "Песни Восхваления", title: "Грешники! вам радостную весть с небес", text: `1. Грешники! вам радостную весть с небес\nНаш Спаситель днесь\nО Царстве принёс.\nХочет всех людей Господь днесь благословить,\nО Царстве весть благую в сердце всем вложить.\n\nПрипев:\nДа оставит нечестивый путь свой\nИ беззаконник - все помыслы свои:\nДа обратится к Богу - Он благой\nИ Он помилует его.\n\n2. К грешникам сегодня Божий глас звучит: ”Если вы в беде,\nПридите ко Мне\nХристос пришёл царить и вас освободить,\nПечаль, порок и грех с земли искоренить.”\n\n3. Блажен тот, кто днесь принимает Христа,\nЧья вера проста и чисты уста\nГосподь сбережёт ему жизнь здесь на земле\nИ будет он в радости жить в чудной стране` }
            }}
        ];
        
        // --- РУМУНСЬКІ ТЕКСТИ ---
        const RO_SONGS_1_337 = {
            1: { title: "Duhul Sfânt – porumbel ceresc", text: `1. Părintele nostru din cer, aici pe pământ condu-ne!\nDă lumina cea cerească! În tot pasul păzește-ne!\n\n2. Lumina dreptăţii dă-ne, sigur să-Ţi umblăm căile!\nZel fierbinte în noi pune, dor pământesc nu ne-nvingă!\n\n3. ‘N sfinţenie condu calea ce la Dumnezeu ne duce!\nPe urmele Lui paște-ne, nimic nu ne rătăcească!\n\n4. În rug’ a veghea ne-nvaţă, până când ora sosește!\nCând va veni, dă-ne parte din biruinţă măreaţă!\n\n5. Pe pământ, orice făptură pe Dumnezeu să-L laude!\nSă-L servească cu temere! Pe Fiul Său să-L adore!` },
            2: { title: "Aducere aminte", text: `1. După al Tău cuvânt de dar, eu, cu umilinţă,\nDe-ale Tale dureri, din nou, îmi-aduc aminte.\n\n2. Al Tău corp sfânt, frânt pentru noi, ca pâine îl primesc.\nȘi al Tău pahar, golind eu, de Tine ‘mi-amintesc.\n\n3. Și când la Golgota privesc, pătruns eu lăcrimez.\nMielul sfânt al lui Dumnezeu, de Tine ‘mi-amintesc!\n\n4. Iubirea-Ţi, de admirare, neîncetat simţesc.\nCând la rănile-Ţi mă cuget, de Tine ‘mi-amintesc!\n\n5. Când peste tot Tu vei domni, ca veșnic Împărat,\nVoi gusta harul Tău, știind că nu voi fi uitat.` },
            3: { title: "Vino la mine!", text: `1. Inima mea-i apăsată, mâhnită, tristă.\nEl zice: Vino și te vei odihni!\n\n2. Avut-a El diademă pe al Său cap fin?\nAvea coroană frumoasă, dar de spin.\n\n3. De Îl aflu, și-i urmez Lui, răsplata ce e?\nSuferinţi cu lacrimi multe, tristeţe.\n\n4. Dacă rămân credincios Lui, spune-mi ce-mi va da?\nM-a învia, și de gânduri voi scăpa.\n\n5. Dacă rămân credincios Lui, ce voi câștiga?\nDincolo de Iordan, cu El, voi cânta!` },
            4: { title: "Turma mică", text: `1. Turmă mică te numește, car’ te-a răscumpărat.\nDe lumea nu te cunoaște, dar El te iubește.\n\n2. Turmă mică te numește Biserică a Sa.\nSă nu-ţi fie rușine, dar, numele a-I purta!\n\n3. Înţelepţi, puternici nu-s mulţi în turma Sa mică.\nTotuși vor fi regi și preoţi, că Lui îi urmează.\n\n4. Dar când păstorul cel mare, în ziua deplină,\nPe vecie va ‘mpărăţi, și voi cu El veţi fi.` },
            5: { title: "O, a sângerat Domnul meu?", text: `1. O, a sângerat Domnul meu, murind pe cruce El?\nPentru noi niște viermuleţi, așa jertfă făcând?\n\nRefren:\nȘi pentru mine, dar și pentru tine,\nA murit Isus pentru toţi, ca să ne mântuie.\n\n2. Pentru c-am fost de moarte demn, din marea-i iubire,\nA suferit El chin pe lemn. A mea fericire!\n\n3. Soarele se întunecă, raza lui s’ ascunde,\nPentru Isus când suferea, murind El pe cruce.\n\n4. Și a Lui cruce grea de chin, ducând grea sarcină,\nCăzând ‘naintea-I mă închin, și ochii-mi lacrimă.\n\n5. Dar cu plânsul nu pot plăti iubirea Lui mare.\nDoamne, al Tău urmaș voi fi Ţie ‘n consacrare!` },
            6: { title: "S-a ‘ntronat El!", text: `1. Să laude toţi pe Isus! ‘Nainte îngerii!\n‘Nainte îngerii! Puneţi-I pe cap coroana!\n\nRefren:\nCă s-a ‘ntronat, ‘ntronat, ‘ntronat, ‘ntronat.\nCă El s-a întronat.\n\n2. Poporul lui Israel, din păcat răscumpărat,\nPăcat răscumpărat, o, salută-ţi Regele tău!\n\n3. Voi sfinţi, a căror tristeţe nu se poate uita,\nNu se poate uita, cânt de biruinţă cântaţi!\n\n4. Orice neam, popor, ce este de pământ suportat,\nDe pământ suportat, adorând, să vă închinaţi!` },
            7: { title: "Voi, popoare de pe pământ", text: `1. Voi, popoare de pe pământ, veniţi! Lui să vă închinaţi!\nSă-L laude gura voastră! În al Său servici’ să intraţi!\n\n2. Domnul nostru Dumnezeu e. Prin El existăm și trăim.\nCa pe turma Sa ne paște. Prin El credem, nădăjduim.\n\n3. Treci în curtea Lui bucuros, pentru-al Său nume merituos!\nLui Dumnezeu dă-I laudă! Toată cinstea El merită.\n\n4. De ce? Că ni-e bun Părinte. Ce a promis nu se schimbă.\nDreptatea-I pe veci străluce. Harul Său margini nu are.` },
            8: { title: "Mântuitorul mă duce", text: `1. Mântuitorul mă duce. Ce altceva să cer eu?\nSă nu fie bun cu mine cel ce m-a condus mereu?\nPace, bucurie ne dă, și avem credinţă-n El.\n|: Știm că toate sunt spre bine, dacă cu noi este El. :|\n\n2. Mântuitorul mă duce peste multe primejdii.\nMă ajută în ispite. Îmi dă pâinea vieţii.\nDacă-mi slăbesc picioarele, și puterile îmi scad,\n|: Iată, că din stânca vie, murmură pârâu curat. :|\n\n3. Mântuitorul mă duce. Harul Său ce scump ne e!\nOdihna-mi va fi deplină, când la Tatăl m-a duce.\nAtunci nemurirea va fi fericită răsplată.\n|: Voi cânta în veci că Isus, pe cale, El, m-a condus. :|` },
            9: { title: "Dumnezeu ne este armă", text: `1. Dumnezeu ne este armă, cetate puternică.\nȘi-acum ne este de-ajutor, când suntem în pericol.\nCă dușmanul cel vechi ni-e încă ‘mpotrivă.\nRău și violenţă, ne-aduce ‘nainte,\nCe nu-i pe pământ altul.\n\n2. Dacă El nu ne-ar ajuta, în curând toţi am cădea.\nPuternică mâna-I cu noi. Spre El să privim numai!\nTu întrebi că cine-i cel drept și credincios?\nMarele Puternic, singur Isus Christos!\nEl va fi biruitor.\n\n3. Dacă lumea-i plină de rău, poate să ne înghită?\nNu, că Domnul biruiește. La acest scop ţintește!\nDumnezeul lumii, cât de viclean va fi,\nNu ne poate strica, ci noi l-om judeca.\nCade chiar printr-un cuvânt.` },
            10: { title: "Sus, sfântul lui Dumnezeu!", text: `1. Sus, sfântul lui Dumnezeu! Sus! Încinge-ţi arma ta!\nOra luptei aproape-i, ce la fapt teren ne dă,\n‘Nainte Domnul ca vizir, conducând tabăra.\nStai dar în șirul Său și fii plin de îndrăzneală!\n\n2. Să Îl urmăm bucuroși când sună chemarea Sa!\nCă spiritu-I ne pătrunde, și ne dă putere.\nÎn ziua puterii Sale Îi servim cauza,\nFăcând precum ne ordonă, împrăștiind ceaţa.\n\n3. Mai mult neactivi nu vom sta. Mergem sus la luptă.\nN-avem frică de nimenea. Harul ni-e puterea.\nFolosește-ne, Doamne, și ia-ne sub scutul Tău!\nSucces nu pentru noi dă-ne! Tu ai învingerea!` },
            11: { title: "Scoală în Sion, Iehova!", text: `1. Scoală în Sion, Iehova, unde ai odihnă!\nSfinţii, bucuroși, tresalte și pompă să-mbrace!\n\n2. Ţie în Sion ne-nchinăm, cu toţii Te lăudăm.\nDă din belșug, casei Tale, pâinea cea cerească!\n\n3. Domnească Fiul lui David, pe car’ l-a denumit!\nEl e adevărat Rege. Primiţi a Lui lege!\n\n4. I-ai dat tron sigur și vază, cu-a dreptăţii bază.\nDomnia-I crește ne’ncetat, șterge orice păcat.` },
            12: { title: "Scoală, braţul lui Iehova!", text: `1. Scoală, braţul lui Iehova! Acum îmbracă-Ţi puterea!\nOrice popor să vadă că Dumnezeu acum tronează.\n\n2. Vocea Ta toţi să audă că ”Dumnezeu singur El e.”\nRuine cuvântul Tău, tot ce e privit ca Dumnezeu.\n\n3. Dă Sionului mărire, lui Israel rezidire!\nSă vedem, cu bucurie, a Christosului domnie.\n\n4. Cei din Sion poartă veste, pe-ntreg pământ răspândește.\nPe contrari să-i strâmtoreze, ca lui Christos să se-aplece.` },
            13: { title: "Veste bună", text: `1. Pe când oamenii odihneau, noaptea în somn liniștit,\nLa păstori s-a înfăţișat înger ceresc, strălucit.\n\n2. Zicând: “V-aduc bună veste, și pentru oameni pace.\nAcel Fiu acum s-a născut, ce încă-i necunoscut”.\n\n3. “Salvatorul vost’ El va fi.” Să vestească martorii!\n“Domnului, în cer, mărire, și jos, pe pământ, pace!”\n\n4. Să ne unim și noi cu ei, acest cântec răsunând.\n“Laudă și mulţumire, scump Mielul nost’ să-Ţi fie!”` },
            14: { title: "Cântarea lui Moise și a Mielului", text: `1. Sculaţi! Cântaţi cântul de Moise și Mielul!\nVoi, limbi și inimi, vă sculaţi! Pe Domnul lăudaţi!\n\n2. Cine în Sion e, bucuros să cânte!\nChristos ne e bucuria. El ia ’Mpărăţia.\n\n3. Nu peste mult toţi cei ce văd mântuirea,\nCânt’ lui Moise și-al Mielului, pe veci, vor răsuna.` },
            15: { title: "Scoală sus, Ierusalime!", text: `1. Scoală sus, Ierusalime! Locu-ţi în praf mai mult nu e.\nIa-ţi veșmântul mântuirii, frumuseţe și putere!\n\n2. Aruncă-ţi praful din ochi, ce a mărginit vederea ta!\nVoios salută lucirea, ce Mântuitorul îţi dă!\n\n3. Scutură și lanţurile! Robia-ţi grea s-a terminat.\nPrivește la Dumnezeu și fii cu bucurii îmbrăcat!\n\n4. Voi vase a harului Său, curăţiţi de orice pată,\nServind cu credincioșie, primiţi sfaturile Sale!` },
            16: { title: "Suflet, scoală! Ia-ţi noi puteri!", text: `1. Suflet, scoală! Ia-ţi noi puteri! Voios înainte!\nRăsplata e nemurire. |: Cu zel te silește! :|\n\n2. În juru-ţi e nor de martiri, care-ţi ţin privirea.\nTrecutul să-l dai uitării! |: Și fugi la ţinta ta! :|\n\n3. Domnul care dă viaţă, de sus, El te cheamă.\nÎn mâna Lui e răsplata, |: ce-o dorești atâta. :|\n\n4. Din acest preţ nemăsurat, parte noi vom avea,\nCând renumele celor mari |: deplin s-a spulbera. :|\n\n5. Mântuitor, cum Tu ne-ai spus, în curs vom alerga.\nȘi-ncununaţi cu-nvingerea, |: pe Tin’ Te-om adora! :|` },
            17: { title: "Inima Sa bună", text: `1. Scoală, suflet, la vesel cânt, și laudă pe Domnul sfânt!\nI se cuvine lauda, că mare e graţia Sa.\nInima Sa scumpă este, că mare e graţia Sa.\n\n2. Am fost căzut și depravat, dar El la min’ s-a aplecat.\nM-a scăpat prin al Său sânge. Inima Sa nobilă e.\nInima Sa, inima Sa, inima Sa nobilă e.\n\n3. Deși dușmani tari, numeroși, opun drumul dificultos,\nEl conduce biserica, că ne-ajută iubirea Sa.\nInima Sa scumpă este, că ne-ajută iubirea Sa.\n\n4. De nori grei cresc neîncetat, vânt și vifor sălbatic bat,\nCa pază stă de-a dreapta mea, că bună e inima Sa.\nInima sa scumpă este, că bună e inima Sa.\n\n5. A sosit ca Rege mare, să ia pe ai Săi la sine.\nCând faţa-I sfântă voi vedea, eu pe veci Îl voi lăuda.\nVoi lăuda. Voi lăuda. Pe El în veci să-L lăudaţi!` },
            18: { title: "Har minunat", text: `1. O, ce milă mare, Domnul ne cinstește!\nCă pe neamul căzut uman, de fii, îl primește.\n\n2. De Fiul mântuiţi, prin milă curăţiţi,\nȘi-apoi mireasa lui Christos, va fi numele nost’.\n\n3. Ce stare vom avea, nu cuprinde mintea.\nCând Christos se va completa, vom fi asemenea.\n\n4. Părintele iubit, El de fii ne-a primit.\nDe sus, peste cei credincioși, toarnă al Lui spirit.` },
            19: { title: "Scriptura – cuvânt slăvit", text: `1. Scriptura – cuvânt slăvit – ce dar minunat și sfânt!\nHrană din cer trimisă, sune pentru ea laudă!\n\n2. E o rază de soare, ce negura străbate.\nDiademi, mărgăritari nu au luciri așa mari.\n\n3. Izvor plin de daruri e, din care pace curge,\nȘi viaţă acolo unde-i numai oftare.\n\n4. Mai adânc ca fântâna ce omul poate săpa,\nOricât de afund săpăm, de mai mari izvoare dăm.` },
            20: { title: "Legătura frăţească", text: `1. Sfânt e legământul, ce-n Christos ne leagă,\nCopcia frăţească între inimi credincioase!\n\n2. Pe ai păcii copii, un simţ îi conduce,\nO speranţă, o credinţă, și-o ţintă în cale.\n\n3. La-l Tatălui nost’ tron, una ne e ruga,\nUna în mâhniri, bucurii, și un dor în inimi.\n\n4. Sarcina ne-mpărţim. Necazul ni-e comun.\nToţi împreună lăcrimăm, că toţi un corp suntem.\n\n5. Pe al luptei teren, când noi ne înșirăm,\nPuteri simţim prin unire. Scumpă amintire!\n\n6. Speranţa măreaţă ne dă voioșie,\nCa noi curajoși să umblăm pe calea cerească.` },
            21: { title: "Mileniul", text: `1. Răsune trâmbiţa, și glasu-i tresalte,\nGol și teren umplând, peste întreg pământ!\n\nRefren:\nMia cea de ani a sosit, |: când omul va fi mântuit! :|\n\n2. Scoală și fii voios, cel ce ești disperat!\nEste ispășire – jertfă – pentru păcat.\n\n3. A șaptea trâmbiţă puternic răsună.\nCaută-L dar pe Domnul, că a sosit timpul!` },
            22: { title: "Nădejde împlinită", text: `1. Tu, mireasă a Mielului, de ce să plângi acum?\nChristos, mirele-ţi, a sosit. Răul are sfârșit.\n\n2. Că inima-I credincioasă, nu putea suporta\nCa să vadă în mâhnire pe a Sa mireasă.\n\n3. Pământul, locul tristeţii, ce-i gol pentru tine,\nVa vedea că Regele cum domnește cu tine.\n\n4. Va șterge mâna-I miloasă, din ochi, lacrimile.\nSuferinţi, necazuri, dureri, și moartea vor trece.` },
            23: { title: "Iehova este Mântuitor", text: `1. Iehova e Mântuitor. Stai sub ocrotirea Lui!\nDe ești sub umbra mâinii Lui, rău nu te va atinge.\n\n2. Inundaţii nu te-or răni. Nu-ţi va strica nici-un laţ.\nDe apăsare n-ai frică! Te păzește al Său braţ.\n\n3. A ordonat îngerilor în drum să te păzească,\nDacă umbli între dușmani sau ești în mare deșert.\n\n4. Când ai necaz, cheamă-L pe El! El te-ascultă, te-ajută.\nCa răsplată, tu, vei primi a vieţii cunună.` },
            24: { title: "Veselie", text: `1. Regele ceresc cu noi! Cântul vesel răsune!\nE demn ca Lui să-I cântăm. Faptele-I sunt măreţe.\n\n2. Drumul nost’ la Dumnezeu, sus, în cer, ne conduce.\nȘi când neguri s-adună, privim ale Lui urme.\n\n3. Fraţilor, nu vă temeţi! Pășiţi cu bucurie!\nIsus ne-a anunţat că altfel nu e ‘nvingere.\n\n4. Cu inima supusă, le vom face noi toate\nCe vizirul ordonă, pân’ scopul vom ajunge.` },
            25: { title: "Dăruire", text: `1. Christos jertfă a dat sângele Său vărsat,\nCa să fiu fericit, și din morţi mântuit.\n|: El și-a jertfit viaţa Sa. Laude-L inima! :|\n\n2. Locașul Tatălui și tronul Său ceresc\nLe-a lăsat și-a venit, ca să fiu mântuit.\n|: Pentru mine toate-a lăsat, dar eu Lui ce i-am dat? :|\n\n3. El mai mult suferi decât eu pot a ști.\nÎn luptă, cu chin greu, goli paharul Său.\n|: Toate pentru min’ le-a primit, dar eu ce-am suferit? :|\n\n4. Pe urma muncii Lui, izvorăsc mari daruri,\nDeplină iertare, de moarte scăpare.\n|: Și ajungând la ţinta mea, glorie voi avea. :|` },
            26: { title: "Zorii se arată", text: `1. Creștine, asupra-ţi vin zorile! Fugi-va toată umbra grea.\nIar cerul preamărit și-n pace, deasupra ta, va lumina.\nScoală! Scoală! Că ziua vine, cu vești bune asupra ta.\nÎn scurt, tu vei avea mărire, și pe tron cu Domnul vei sta.\n\n2. Ridică-ţi capul! Ziu’-a sosit, și-al tău drum îl lumineză.\nDin cer lumina a strălucit. Sunt zorii zilei măreţe.\nSăltaţi! Săltaţi, de speranţă plini! Că toate alte-s deșarte.\nSă știe aceasta cei nobili. Duceţi la toţi astă veste!` },
            27: { title: "Christos este aici!", text: `1. Christos e-aici! O, ce veste! Inima bucure-se!\nAstă veste de graţie, credinţă, speranţă dă.\n\nRefren:\n|: Christos e de faţă! El e al păcii Rege. :|\n\n2. Lumea poate numai citi, c-a suferit și-a murit.\nDar în curând, cu toţi vor ști, că spre-a domni a venit.\n\n3. Exilaţii mult au răbdat prigoniri, suferinţe.\nÎnsă nu peste mult toţi vor fi părtași în mărire.\n\n4. Din coardele harfei cerești se ‘nalţă pe aripi vești,\nCar’ pe toţi cei răscumpăraţi îi îndeamnă la cântat.` },
            28: { title: "Cântă osana lui Iehova!", text: `1. Pe care Dumnezeu L-a pus ca temelie scumpă,\nEl s-a făcut piatră de unghi în biserica sfântă.\nTărie-n Sion e Christos. În El să se-ncreadă toţi!\n\nRefren:\nLaudă lui Dumnezeu să cânţi, în numele lui Isus!\n\n2. Sion, sfântă cetate, pe car’ Domnul o iubește,\nCu bucurii ‘nălţătoare să cântaţi Lui din inimi!\nCu a lui Dumnezeu nume, tot terenul îl umple.\n\n3. În templu, unde Te mărim, lasă pe veci ca să fim!\nCu umbra mâinii Tale, pe credincioși acopere!\nPăzește-i pân’ a Ta cauză o ţin drept cea mai scumpă!` },
            29: { title: "O, ce vedenie măreaţă!", text: `1. Pe muntele ‘nalt veniţi, voi sfinţi! Vedeţi patria peste râu?\nÎn mileniul Canaanului, nu peste mult, toţi vom cânta.\nIată tronul alb ca zăpada! Cel sfânt coroană primi-va.\nÎn Regat părtași vor fi acei car’ pe Christos L-au așteptat.\n\nRefren:\nO, ce vedenie mărită! Acum secerători grăbiţi,\nNe-așteaptă patria promisă, că dimineaţa-i de faţă.\n\n2. De-acolo vine primăvara. Toate s-acopere cu flori.\nVedem vedenie mărită – domnia mare a Regilor.\nLuptele acolo se sfârșesc. N-a mai fi necaz, ispită.\nVa fi popoarelor, acel ceas, biruinţă pe vecie.\n\n3. Acel râu, care izvorăște chiar de lângă tron, strălucind,\nCel ce repaus la Domnul caută, viaţă din El primi-va.\nPe malul lui, între pomi umblând, numai prieteni vor fi cu el.\nȘi mergând după noul guvern, cântă cântări de bucurii!` },
            30: { title: "Învierea lui Christos", text: `1. Christos din morţi a-nviat. Om, îngeri în știre-au dat.\nȘi noi, cu bucurie, cântăm asta cu voie.\n\n2. Iubirea ne-a mântuit. Lupta deja s-a sfârșit.\nEl s-a sculat din mormânt, și nu mai moare nicicând.\n\n3. Piatră, sigil și soldat, toate, le-a înlăturat.\nChristos e vizirul nost’. El ne deschide cerul.\n\n4. Christos e viu ca Rege. Boldul, moarte, unde ţi-e?\nPentru noi plăti jertfa, câștigând mântuirea.` },
            31: { title: "Mereu dăruitoare", text: `1. Venim noi cu toţi, și drumul nostru, să-ncepem din nou! Să nu stăm până nu va zice Domnul!\nCe El voiește, facem repede. Mâini credincioase să ne înmulţească talentele.\n\n2. Viaţa noastră ca un vis trece, și timpul zboară. Făr’ de fructe să n-o lăsăm să treacă!\nLucră în pripă, noaptea să treacă! Că ziua plină de bucurie este de faţă.\n\n3. O, dacă ‘n sfârșitul zilei noastre am putea zice: Doamne, lucrul meu și calea-mi sunt gata!\nDe-ar auzi toţi: Serv bun, credincios, intră-n bucurii! Că tu vei domni cu Mine pe tron.` },
            32: { title: "Aproape de El, prin rugăciune", text: `1. Suflete-al meu, să adori pe Tatăl sfânt din ceruri!\nÎn rugă fii fierbinte! El nu te va respinge.\n\n2. Mergi ‘naintea Regelui și predă-I inima Lui!\nÎn îndurări e bogat, și ţie-ţi va fi ‘ndurat.\n\n3. Doamne, Tu-mi ia sarcina! Mă-ncred în puterea Ta!\nM-a scăpat al Tău sânge. Eu n-am altă nădejde.\n\n4. Pe cei ce plâng Tu-i mângâi. Prin graţie, pace dai.\nToate tainele le știi. O, dar, preamărit să fii!` },
            33: { title: "Mântuire deplină", text: `1. Veniţi să cântăm vești bune, de bucurie plini!\nȘi al jubileului an fie vestit lumii!\n\nRefren:\nSalvare, salvare, ce Dumnezeu ne dă,\nPrin a Domnului Christos Împărăţie!\n\n2. Voi cei triști, acum fiţi veseli! Popoare, priviţi-L!\nPe cei robi îi face liberi. Pe El preamăriţi-L!\n\n3. Cântarea din nou răsune că “pe pământ pace,\nMilă oamenilor și lui Dumnezeu mărire”!` },
            34: { title: "Răsune lauda!", text: `1. Răsune lauda pe întreg pământul!\nIehova e Dumnezeu și El e Rege singur.\n\n2. A creat pământul, și toate apele.\nA Lui e viaţa mării, și ‘ntregul univers.\n\n3. Făpturile-I suntem. “Cuvântul” ne-a creat.\nÎnchine-se la tronul Său, să fie adorat!\n\n4. Ascultă-I cuvântul fără zguduire!\nCa și poporul Său ales, și tu să îl primești!` },
            35: { title: "Mântuire fără asemănare", text: `1. Vino-al fericirii izvor, din suflet să-mi scoţi cântec!\nAl graţiei râu undător cere cântec sfânt cu foc.\nO, ‘nvaţă-mă să cânt frumos, intonând cu glas duios!\nBunătatea Ta s-o laud, care nu-i asemenea.\n\n2. Nu-i destul că m-ai mântuit cu sângele lui Christos,\nȘi m-ai ‘cercat când, de turmă, sufletu-mi departe-a fost?\nMai presus de mântuire, încă și-alt dar mi-a adus.\nChemare cerească să văd, faţa Ta acolo sus.\n\n3. Din zi în zi tot mai dator mă face graţia Ta.\nCa și-un lanţ strânge sufletul, Doamne, bunătatea Ta.\nȘi eu umblu pe drumul Tău, fie oricât de spinos.\nFericit sunt că pot păși pe urmele lui Christos!` },
            36: { title: "Veniţi voi, nemângâiaţilor!", text: `1. Veniţi voi, nemângâiaţilor! Veniţi la acest tron de har! Plecaţi-vă!\nInima rănită aici aduceţi! Că nu-i necaz ce El nu vindecă.\n\n2. Suferinzilor disperaţi le zice, blând, gentil, ca ei să nu se teamă.\nNu-i pe pământ necaz așa de mare, care El momentan nu-l vindecă.\n\n3. Priviţi râul, cel ce de la tron curge și a vieţii pâine primește!\nNu-i pe pământ necaz așa de mare, ce Domnul n-ar putea să-l vindece.` },
            37: { title: "Dumnezeu este iubirea", text: `1. Cel ce cunoști pe Dumnezeu și iubești cauza Sa,\nGura-ţi peste tot răsune că “El e iubirea!”\n\n2. Ce Cuvântul Său ne spune, și-a Lui toată fapta,\nE ce Isus ne-a arătat, că “El e iubirea!”\n\n3. Îndelung rabdă El pe cei ce hulesc credinţa.\nDar în curând vor ști cu toţi că “El e iubirea!”` },
            38: { title: "Veniţi să-L lăudăm!", text: `1. Car’ pe Domnul iubiţi, despre El să vorbiţi!\nA Domnului laudă dreaptă peste voi străluce.\n\n2. Pe cerescul Rege, ai Săi, să Îl laude!\nPeste tot locul ei grăiesc, că Lui Îi mulţumesc.\n\n3. Al Tău scop, o, Doamne, nimic nu-l întrece!\nCă nici pe noi nu ne uită, ne-a dat nouă-n știre.\n\n4. Milostiv Dumnezeu, al nost’ bun Părinte,\nCa să ajungem la scop, El din cer ne ajută.\n\n5. Și nu peste mult, noi, Îl vom vedea cum e.\nMăreţia Îi vom privi în a Sa lucrare.` },
            39: { title: "Fiica Sionului, din necaz scoală!", text: `1. Fiica Sionului, din necaz scoală! Că vrăjmașii tăi mai mult nu te-apasă.\nSteaua bucuriei în zori străluce. Noaptea de plânset s-a dus. Fii veselă!\n\nRefren:\nFiica Sionului, din necaz scoală!\nCă vrăjmașii tăi mai mult nu te-apasă.\n\n2. Deși au fost tari, ai tăi semeţi dușmani, dar mai tare-i mâna care-i învinse.\nFalși le-au fost caii și carul de război. Deci, ca pleava vântul, așa-i răpiră.\n\n3. Fiica Sionului, pe-al Tău Salvator, în harfe și timpane preamărește-L!\nFii veselă! E ‘nvins cel ce te-a robit. Sionul are ‘nvingere cu totul.` },
            40: { title: "Ridică-ţi capul vesel!", text: `1. Ridică-ţi capul vesel sus, fiica Sionului!\nMântuitorul te cheamă. Urmează-L credincios!\n\n2. Din mormânt trezește-te cu puterea-ţi măreaţă!\nZiua Ta de mântuire, deja, e de faţă.\n\n3. Clădește-ţi iar ruinele, trimiţând soli mulţi, car’\nL-amiază să zică: “slobozi” și norod “nu reţinea”!\n\n4. Și vin aliaţii Tăi, toţi, acas’ prin bucurii,\nPeste tot locul răsunând cuvântul chemării.\n\n5. Deși ruină Dumnezeu lumea aceasta rea,\nBucurie veșnică va fi pentru cei scăpaţi.` },
            41: { title: "Lupta", text: `1. La război fii gata, și-nvaţă a lupta!\nPregătește-mi mintea, Doamne, ca să fiu bun ostaș!\n\n2. Neobosind eu să-Ţi vestesc scopurile,\nMărturisind marea-Ţi milă, ce viaţă ne dă.\n\n3. O, dacă ar vesti lauda Ta faptele,\nCa și orbul să vadă al Tău sfânt măreţ nume!\n\n4. Învaţă-ne ca să alungăm eroarea!\nCa orice minte realul să-l poată cunoaște.\n\n5. De a mea inimă, Tu să dispui, Doamne!\nCa să pot sta cu succes în judecata-Ţi dreaptă.` },
            42: { title: "Vestiţi bunătatea Lui!", text: `1. Etern Domn și Rege ceresc, numele-Ţi fie prea’nălţat!\nCând cete-n cer Te preamăresc, sfinţii, jos, iubirea-Ţi vestesc.\n\n2. În Tine am eu odihnă, purtând a Ta veste bună.\nCânt despre a Ta iubire. Făr’ de Tine nu-i speranţă.\n\n3. Neîncetat cântaţi, buze, că zorile sunt de faţă! \nImbold în inimă-mi fie la cântări de veselie! \n\n4. Cu cei ce posed harul Tău, mulţumire îţi ridic eu.\nTot pământul să audă, și Ţie să-Ţi dea laudă!` },
            43: { title: "Lauda lui Iehova", text: `1. Doamne, a Ta bunătate va străluci pe vecie\nÎn făpturile pe care le conduci la perfecţie!\nTe mărim, Doamne, drept Cauză, care-ai creat făpturile!\nTotul depinde de Tine. Numai Tu poţi da viaţă.\n\n2. Sus, stele nenumărate laudă a Ta maiestate.\nDeși sunt la număr mare, toate le pui în mișcare.\nMâna-Ţi peste tot ajunge, ascunzând comori mai multe.\nHaru-Ţi din belșug împarte bunătăţi nemăsurate.\n\n3. Peste veacuri nesfârșite se vor vedea minuni multe.\nDar va fi o presimţire din marea Sa veșnicie.\nDacă Tu, Doamne, prin Christos, pe om vei binecuvânta,\nTe-a lăuda pe vecie întreagă familia Ta.` },
            44: { title: "Ziua dreptăţii", text: `1. Soare veșnic al dreptăţii, vino cu raza Ta!\nArată-Ţi mărirea, să ne pătrundă inima!\n\n2. O, dă-ne a Ta lumină! Arată-ne milă,\nVindecând și înviorând inima zdrobită!\n\n3. Arată-Ţi faţa senină, să vadă oricine\nPe Dumnezeu împăcat, car’ la pace ne-a chemat!\n\n4. Dă pace în inimă, să fie fericită!\nUmple tot cu gloria Ta, o, Tu, soare dulce!` },
            45: { title: "Arvuna consacrării noastre", text: `1. Doamne, noi pe Tin’ te urmăm, nu siliţi, ci cu plăcere!\nȘi aici ne-am adunat ca să-Ţi împlinim poruncile!\n\n2. Săvârșirea ritului nost’, semnul consacrării este,\nȘi ca simbol al credinţei să preluăm al Său nume.\n\n3. Fiind noi morţi păcatului, cu Christos ne înmormântăm.\nDar din nou vom învia noi. Viaţa Domnului predăm.\n\n4. Păcat, egoism nu vor mai domni peste corpul nostru.\nȘi din zi în zi biruind, în Christos vom avea locul.` },
            46: { title: "Încearcă-mă!", text: `1. Încearcă-mi, Doamne, inima! Chiar și rărunchii mei!\nHarul Tău e ‘naintea mea. Eu umblu cu Tine.\nÎn nevinovăţie, eu, spălat mă curăţesc.\nAltarul Tău exercitând, lucrul Lui Îl sfârșesc.\n\n2. Cu răsunet să Te măresc! Numele să-Ţi vestesc,\nLucrurile-Ţi minunate și cauza-Ţi măreaţă!\nA locui în casa Ta, din inimă doresc,\nMărirea-Ţi unde se află, acolo să trăiesc.` },
            47: { title: "Părinte, ascultă-ne ruga!", text: `1. Bun Părinte, ascultă-ne! Nu cerem bună stare.\nÎn luptă bună să-nvingem! Pentru aceea ne rugăm.\n\n2. De clătind noi ne poticnim, fii Tu al nostru sprijin!\nCalea și viaţa noastră de Tin’ fie condusă!\n\n3. În tristeţe sau bucurii să petrecem viaţa!\nNumai în a Ta cauză, să ne fie cererea!` },
            48: { title: "Preamărirea lui Dumnezeu", text: `1. Venind iarăși ‘naintea Ta, Doamne, împreună lăudând al Tău nume,\nNe-am adunat să ne-nchinăm Ţie, să Te ascultăm cu umilinţă.\nDă harul Tău să fim în liniște, toată clipa să ţi-o trăim Ţie!\nDă-ne iubirea dreaptă-n inimă, ca numele-Ţi templul Tău să umple!\n\n2. Te rugăm ca noaptea ‘ntunecată, fă-ne-o nouă, Doamne, luminată!\nPăzește pe copilul Tău care, în cauza Ta, cu Tin’ lucrează!\nPân’ pe pământ umblăm, haru-Ţi dă-ne! Că e balsam și loc de scutire.\nCând finea lucrului vom ajunge, Tu să ne chemi în veșnica pace!` },
            49: { title: "Fie voia Ta!", text: `1. Tată ceresc, pân’ cu lacrimi privim ce a smuls moartea,\nLiniștiţi noi zicem totuși: Fie-n toate voia Ta!\n\n2. Deși e dureros cazul, nu ne-nfrânge credinţa.\nTu ni L-ai dat și L-ai luat. Fie-n toate voia Ta!\n\n3. Chiar de jale ne-mpresoară, la tronul Tău har este.\nLa zâmbetul ei noi cântăm: A Ta voie să fie!\n\n4. Numai al Tău Ţi l-ai luat, ce ne-a dat a Ta mână.\nAl cer’ și pământului Domn, a Ta voie să fie!` },
            50: { title: "Cuvântul lui Dumnezeu", text: `1. Milos Dumnezeu, cuvântu-Ţi glorios străluce!\nCel ce l-ai dat, al Tău nume, adorat să fie!\n\n2. Glasul păcii, al cerului, din el cum răsună\nViaţa și bucuria în timpuri eterne!\n\n3. Eu pururea mă desfătez în cuvântul ceresc.\nA-i vedea lumina crescând eu mai mult o doresc.\n\n4. O, fii, Doamne, totdeauna al meu Învăţător,\nCa mai mult să pot vedea în cuvântu-Ţi protector!` },
            51: { title: "Consacrare", text: `1. Tată, orice bun pământesc aici îl voi pierde.\nCu îndurare ascultă-mi cererile mele!\n\n2. Inimă mulţumitoare, scutită de plângere,\nSă-mi dai mie și ajută-mi să Îţi trăiesc Ţie!\n\n3. Inima mea fie plină cu a Ta fiinţă!\nLas’ să pribegesc cu Tine, Tu să-mi dai liniște!` },
            52: { title: "Nu te teme, turmă mică!", text: `1. Nu te teme, ceată mică, deși groaznic te atacă\nNemernicul dușman! Ce-ţi strică voia când și când,\nCă vezi sfinţii pierzând, ce e numai aparenţă.\n\n2. Fii vesel! A ta cauză chiar Domnul o va suporta.\nDin necaz te scapă. Urechea credinţei bine\nAude cum goarna sună pentru Armaghedon.\n\n3. Cel ce asculţi rugăciunea, o, arată-Ţi, Doamne, mâna\nPentru numele Tău! Tu ești cu noi. Ai Tăi suntem.\nToţi contrarii pierduţi vor fi. Teren n-or mai avea.` },
            53: { title: "O, umple-mi, Doamne, viaţa!", text: `1. O, umple-mi, Doamne, viaţa cu sfânt numele Tău!\nToată viaţa mea fie martor pentru Tine!\nȘi că nu numai inima, și gura-mi Te laudă!\nO, dă-mi, Doamne, o viaţă pe Tin’ lăudătoare!\n\n2. Fie-mi viaţa deplină laudei predată,\nVestind iubirea Ta sfântă, și cuvintele vii,\nChiar dacă și eu slab fiind, Te servesc pe Tine,\nÎncepând pe acest pământ cântarea cea nouă!` },
            54: { title: "Ocrotirea lui Dumnezeu pentru noi", text: `1. Aruncă-ţi vântului tortura gândului!\nDumnezeu necazu-ţi știe și-ţi dă bucurie.\n\n2. Din furtuni, nori, apă, El ușor te scapă.\nAșteaptă dar cu răbdare! El soare-ţi răsare.\n\n3. Inima-ţi slăbită, de gânduri muncită?\nAruncă-ţi dar sarcina grea, și departă frica!\n\n4. Toată îndrumarea las’ de tot El să-ţi dea!\nMergi vesel pe a Lui cale, condus de braţ tare!\n\n5. Mai mult ‘cât ai crede, de soarta-ţi grijește.\nAcum munca-ţi isprăvește, ce mult gând sporește!` },
            55: { title: "Faceţi totul spre lauda lui Dumnezeu!", text: `1. În numele Tău, o, Doamne, mă scol la lucrul meu din nou!\nOrice cuget, cuvânt, faptă numai pe Tine Te privește.\n\n2. Ce mi-a-ncredinţat mâna Ta, las’ să fac vesel, credincios!\nCredinţa mea bine vede oriunde a Ta prezenţă.\n\n3. Doamne, Tu îmi vezi inima! O, fii Tu tot în dreapta mea!\nTot pasul meu al Tău fie! Eu împlinesc porunca Ta.\n\n4. În serviciul Tău, toate ce Tu mi-ai dat, eu le consacrez.\nUmblând calea Ta bucuros, ce către cer mă conduce.` },
            56: { title: "Tronu-Ţi regesc", text: `1. Tronu-Ţi regesc, Dumnezeu, pe vecie va sta!\nDreptatea-i temeiul și sceptrul justiţia.\nCă ai iubit binele, rău și păcat urând,\nTe-a uns cu bucurie, cinste mare primind.\n\n2. La dreapta-Ţi stă Regina, în plină frumuseţe,\nȘi în haine brodate, deplin aurite,\nÎn patria cerească, în jurul Reginei,\nO ceată de fecioare fiind în bucurii.\n\n3. Folosul muncii Tale, Tu vei putea vedea.\nȘi câștig mult vei avea, din belșug, sămânţa.\nBogat haru-Ţi așteaptă. Ţie comori ţi-aduce.\nÎn restatornicire, mireasa-Ţi ajută.` },
            57: { title: "A fi tot cu Domnul", text: `1. “A fi tot cu Domnul”. Fie cu noi așa!\nNouă ‘nseamnă înviere, viaţă veșnică.\nDeși drumul duce prin noaptea groaznică,\nMergem noi că vom ajunge-n patrie frumoasă.\n\n2. “A fi tot cu Domnul”. A Lui să putem fi.\nCe El dorește să facem, voim a împlini.\nA mărturisi că singur ești Dumnezeu,\nȘi ca să urmăm credincioși, dă-ne putere Tu!\n\n3. Când ne vine moartea, perdeaua se rupe,\nȘi vom fi cu Domnul în veci, El în cer ne duce,\nCa să fim noi cu El, în veci pe tronul Său,\nDe unde lauda noastră peste tot străbate.` },
            58: { title: "Parola este “Înainte!”", text: `1. Parola ne este “Cu toţi, ‘nainte!”. Cu ochii noștri numai ţinta vedem.\nIsus ne conduce. ‘Napoi noi nu dăm. El stâlp de foc este ‘naintea noastră.\nServindu-L credincios, prin noapte trecem. Noi a Sionului lumină vedem.\n\n2. Cu curaj ‘nainte, “turma cea mică”! Pân’ a lui Dumnezeu scop se ‘mplinește.\nTristul mângâiere, orbul lumină dorește. Du-le dar vestea cea bună! Ceaţa rătăcirii noi să alungăm! Cu arma Scripturii s-o împrăștiem!\n\n3. Pe geana câmpului, o, vezi patria, unde înfocat ne trage inima?\nAcolo-i pomul și apa vieţii. Cei ce cred, gratuit vor putea primi.\nCu al Domnului ajutor să mergem! Înainte, dar, fraţi, ca să ajungem!` },
            59: { title: "În veci", text: `1. Liberi de păcat, ce simţ fericit! Prin al lui Isus sânge-s mântuit.\nDe sub blestem, a Sa graţie, pentru etern, ne mântuie.\n\nRefren:\nÎn veci aceasta noi o credem! Da, că în cale nimic n-avem.\nDin păcat ne-a scăpat jertfa Sa. Numai la El e odihna.\n\n2. Christos ne-a mântuit. Liberi suntem. Salvare deplină prin El avem.\nA venit El ca să troneze, să ne binecuvânteze.\n\n3. O, ce măreţ e fiul Lui a fi! De căderi harul Său îl va scuti.\nDin moarte la viaţă trece. A fi-n veci cu Părintele!` },
            60: { title: "Să laude pe Domnul!", text: `1. Toţi car’ locuiesc pământul, să-L preamărească pe Domnul!\nO, lăudaţi pe Creator orice limbi, ţară și popor!\n\n2. Mila Lui margini nu are. Cuvântul Lui e dreptate.\nMărirea Lui, ca și zborul, dintr-un timp străbate-n altul.\n\n3. Lăudaţi-L voi muritori, și preamăriţi-L în cântări\nPe cel ce ne-a răscumpărat! Numele Lui fie-adorat!\n\n4. Toată lumea să-L laude! Că cu drept I se cuvine.\nNumele Lui și gloria să le știe toată lumea!` },
            61: { title: "Tronul harului", text: `1. Când bate vântul cu vifor, și valurile cu zgomot,\nFii liniștit la adăpost, sub scutul Domnului milos!\n\n2. Acesta-i loc de liniște. Capul cu ulei ţi-l unge.\nAcest loc ţi l-a câștigat sângele lui Isus curat.\n\n3. Când aproape să disperăm, noi, oare unde să mergem?\nDe-am găsi loc de liniște, dușmanii noșt’i n-or învinge.\n\n4. Pe aripi de vultur plutim. Păcat, lume noi nu servim.\nNe uităm la cele de sus, unde e ‘ncununat Isus.` },
            62: { title: "Dumnezeu este iubire", text: `1. A lui Dumnezeu iubire, ce drumul ne luminezi,\nTot pasul ia mărturie! El e ‘nţelept, iubire.\n\n2. Până schimbări și mistuiri peste-acest pământ domnesc,\nMila-I făr’ de încetare. El e ‘nţelept, iubire.\n\n3. Chiar clipa întunecată e drum spre bunătate.\nDin ceaţă varsă lucire. El e ‘nţelept, iubire.\n\n4. El mângâie, dă nădejde, și, între gânduri grele,\nIubirea-I ne dă lucire. El e ‘nţelept, iubire.` },
            63: { title: "Laudă pe Iehova!", text: `1. Laudă pe Iehova! Nimic nu-i al tău.\nLaudă, ‘nchinăciune Lui se cuvine.\nDe la tin’ nu-i nimic. Toate El le dă.\nLui să-I dai mulţumiri! Cinste merită.\n\n2. Tot la El să privești, și nu spre tine!\nDomnul cerului îţi va fi mărire.\nDă-I întâietate, tot cu El umblând!\nCere-I sfaturile, drumu-ţi conducând!\n\n3. Spune mângâierea Părintelui sfânt!\nDacă-ţi dă ocazii, mulţumește-I Lui!\nLaudă pe Iehova și ‘Mpărăţia,\nPână orice popor nu-I dă temerea!` },
            64: { title: "Nădejdea măreaţă a Sionului", text: `1. Lucruri mari stau despre Tine, cetatea lui Dumnezeu!\nCel ce cuvântul își ţine, te-a făcut locașul Său.\nPe “stânca vârstelor” zidit, nimic nu te va clăti.\nCu zidul salvării ‘ngrădit, iar dușmanii-ţi vor pieri.\n\n2. Zidit ferm pe acest temei, te vei scula-n mărire.\nTe vei numi “mântuire”, porţile Tale “laudă”.\nÎn Tine, cei răscumpăraţi, vor umbla-n bucurie,\nȘi de suferinţă scăpaţi, vor cânta-n veselie.\n\n3. Atunci, a vieţii apă, din belșug va izbucni.\nTemerile vor trece și grijurile vieţii.\nCine va fi slab sau bolnav când râuri curg cu-așa leac,\nHar, ce-i ca Domnul care-l dă, izvorând din veac în veac?\n\n4. Cine poate fi inactiv, când așa lucruri vede,\nDeși starea lui acuma tocmai fericită nu-i?\nNu privi dar în jurul tău, și nicicând ‘napoia ta!\nInima-ţi veselă numai scopul măreţ să vadă!` },
            65: { title: "Pe Mielul lăudaţi în veci!", text: `1. Mărire Domnului! Cerul și pământul Îl laudă,\nCei de blestem scăpaţi, fiind răscumpăraţi.\nPe mielul lăudaţi în vecie!\n\n2. Cetele cerului răsunând, mulţumiri Îl laudă,\nPe acel ce pace ne-a adus prin Sânge.\nMielul să-L lăudaţi în tot locul!\n\n3. Voi oameni, pământul un loc sfânt faceţi-l, pe El lăudând!\nCu bucurii sunaţi! Că voia Celui ‘Nalt\nL-a uns de Rege pe Christos, Domnul.\n\n4. N-a fi chin viaţa, că pe tron e cel ce mântuiește.\nEl binecuvântă. Dar cântarea sune!\n“Fii mărit car’ ești al păcii Rege!”` },
            66: { title: "Îngroapă-ţi jalea ta!", text: `1. Îngroapă-ţi jalea ta, ce îţi dă lumea!\nAfund o îngroapă! Vântului o dă!\nNesocotește-o chiar de vine noaptea!\nÎncredinţează-ţi lui Iehova soarta!\n\n2. Vino la Iehova, că El te știe!\nPrin Isus roagă-L, că nu vei fi-n lipsă!\nMergi! Adună raze, ce de sus varsă!\nUșurare-ţi face. Griji împrăștie.\n\n3. De răul acesta, inimi se surpă.\nCu toţi cei întristaţi mângâiere cer.\nÎngropându-ţi jalea, voios ‘nainte!\nDu raze soarelui! Și pace-i găsi.` },
            67: { title: "Domnul vă binecuvânteze!", text: `1. Domnul vă binecuvânteze! În sfatul Lui să vă ţină!\nÎn turma Lui să puteţi sta! Domnul vă binecuvânteze!\n\nRefren:\nPână când ne-om vedea, și ‘naintea Lui vom sta,\nEl cu noi să fie, până iarăși ne-om putea vedea!\n\n2. Domnul vă binecuvânteze! Sub aripa Lui vă poarte!\nPâinea vieţii să vi-o dea! Domnul vă binecuvânteze!\n\n3. Domnul vă binecuvânteze! Nori grei dacă se ridică,\nBraţul Lui să vă scutească! Domnul vă binecuvânteze!\n\n4. Domnul vă binecuvânteze! În iubirea Lui vă ţină!\nÎn moarte cu voi să fie! Domnul vă binecuvânteze!` },
            68: { title: "Zel", text: `1. Dumnezeu a zis să fie lumină, ceaţa împrăștiind, răul arătând.\nDin biserica Sa, fulgeri trimite, ca să ne conducă lumina sfântă.\n\n2. A Împărăţiei veste noi purtăm, aducând speranţă inimii triste.\nLa acest lucru El ne dă putere, arătându-ne ce ni-e datoria.\n\n3. Iubirea și zelul, care în noi sunt, în al Tău serviciu sfânt folosește-le!\nLas’ să vestim noi, al Tău popor ales, lumina numelui Tău și puterea-Ţi!` },
            69: { title: "Ce dulce unire!", text: `1. Domnul a promis o scumpă zi, ce privim că acum e-aproape.\nMântuitorul o va-ncepe, când s-a vedea a Sa mărire.\n\nRefren:\nCe dulce unire! Mai mult noi nu ne vom despărţi.\nCe dulce unire! Pe malul veșnic ne-om întâlni.\n\n2. Atunci cei morţi înviaţi vor fi, și cei vii puteri noi vor primi.\nCeaţă și necaz vor dispărea. Domnul le va cinsti viaţa.\n\n3. Atunci drum sigur s-a deschide. Piciorul n-a mai da în piedici.\nSminteli nu ne vor scandaliza, și leul în drum nu va mai sta.\n\n4. Nici-o vătămare n-a mai fi, pentru că cel rău se va stârpi.\nPace-a fi și dreptul va-nflori, că Christos cu drept va ‘mpărăţi.\n\n5. Din ochi El șterge lacrimile. Harul Său ne dă mângâiere.\nPeste noi soarele străluce. Vom avea viaţă și pace!` },
            70: { title: "Domnul mi-e mântuirea!", text: `1. Domnul mi-e mântuirea! El Mi-e și cântarea,\nA mea cetate tare, stâncă de scăpare!\nDe-i și crâncenă lupta, eu totuși o susţin.\nCe mă poate ‘nspăimânta, când El e cu mine?\n\n2. Crezând numai în Domnul, suflete-mi fii erou!\nCând puterea-ţi slăbește, tot la El privește!\nBucuria Lui dulce inima aprinde.\nFaptele Lui credinţă și pace-ţi câștigă.` },
            71: { title: "Domnul este cetatea noastră", text: `1. Domnul e cetatea noastră când vremuri grele vâjâie.\nOcrotirea e sigură. Neschimbat, El ne promite.\n\n2. Este-un râu care nutrește a lui Dumnezeu cetate,\nȘi în probele mari de azi ne dă pace, bucurie.\n\n3. Acest râu sfânt e-al Său cuvânt, ce cu putere ne umple.\nUrle marea, nu ne-nfrică, sau cer, pământ de s-ar rupe.\n\n4. Sion Regelui de-i place, de la El ajutor vine.\nTemeiul Lui nu se mișcă, că Christos e. Încrede-te!` },
            72: { title: "Iubire minunată", text: `1. Dumnezeu din simţ a iubit rasa omenească,\nFamiliei depravate câștigând scăpare.\n\nRefren:\nO, ce mare iubire Tatăl ne-a arătat!\nPe Fiul Său jos L-a trimis. El ne-a răscumpărat.\n\n2. Acum eu Îl reclam de-al meu, pe Fiul Său mărit.\nMoartea Lui m-a răscumpărat și sângele jertfit.\n\n3. Ce a hotărât Dumnezeu, le v-a ‘mplini toate,\nPrin iubirea Sa aducând deplină mărire.\n\n4. Sfinţii, prin credinţă, primesc iertarea de păcat.\nȘi prin ea, lor, o speranţă glorioasă le-a dat.\n\n5. Mântuiţii răsune, dar, cântul biruinţei,\nȘi să zdrobească prin Christos puterea lui Satan!` },
            73: { title: "El descoperă tainele", text: `1. Dumnezeu pe căi ascunse, când mari minuni face,\nUmblând pe mare, prin furtuni și pe nori aleargă.\n\n2. În adâncimi mari, unde nici mintea nu ajunge,\nScopurile Își lucrează, cu-a Sa ‘nţelepciune.\n\n3. Voi sfinţi fricoși, vă-ncurajaţi! Norii ce vă-nfrică\nSunt pentru voi de dar umpluţi, ce peste voi varsă.\n\n4. Nu judecaţi pe Domnul slab, ci vă-ncredinţaţi Lui!\nSub nori negri își ascunde faţa dragostei Lui.\n\n5. În curând floarea scopului Său se va deschide.\nMugurul poate fi amar, dar fructul e dulce.\n\n6. Cel făr’ de credinţă e orb. Tot în zadar umblă.\nDumnezeu, tainele Sale, singur descoperă.` },
            74: { title: "Dumnezeul milei", text: `1. Dumnezeul milei mari, trimite-ne lumină!\nAl nost’ “soare” răsare, dând binecuvântare.\nLumina-Ţi revarsă, ce tot pământul vindecă!\n\n2. Las’ Ţie să se închine pe pământ ce există!\nPământul să-L laude pe Regele Iehova!\nSupune-te adorând! Fie El Domn pe pământ!\n\n3. Numai pe El să-L laude cine-n ţara Lui trece!\nCă acest Rege mare aduce bunăstare.\nAtunci orice “viaţă” va trăi în unire.` },
            75: { title: "Dumnezeul meu", text: `1. În fiecare zi, Doamne, pe buze lauda-Ţi sună!\nÎn zori cântecul așteaptă, |: car’ pân’ seara nu-ncetează. :|\n\n2. Dacă mai mult din timpul nost’ cerului l-am preda zeloși,\nMai des am putea noi zice: |: O, vezi Domnul cum ajută? :|\n\n3. Da, Domnul meu mă ajută. A Sa-nţelepciune îmi dă\nÎn tot pasul. De aceea, |: cu laudă ‘Ţi-aduc jertfă! :|` },
            76: { title: "La școală", text: `1. Mâna Domnului e aspră, lovind de multe ori.\nDeși scopu-i bun, dar frica mereu “Destul!” strigă.\n\n2. Piatra de Templu, ‘n lucrare, geme sub mâna Sa.\nDar lovește din nou, nu stă, până-și face munca.\n\n3. Piatra, prin multe lovituri, formă nobilă-și ia.\nȘi, frumoasă prin lustruiri, va trăi pururea.\n\n4. Din strugurii zdrobiţi și storși vinul plăcut curge.\nDacă sunt părtaș cu Domnul, soarta așa-mi fie!\n\n5. Cuptorul e alb, fierbinte, dar rugină mâncă.\nDoamne, a Ta judecată cu mine-așa facă!` },
            77: { title: "Dumnezeu, a Ta milă", text: `1. Dumnezeu, a Ta milă la toţi se revarsă!\nPeste bun și peste rău, reverși ploaie pârâu.\nCelor din închisoare, din a morţii umbre,\nZice: “Veniţi afară, la rază curată!”\n\n2. Sunt plăcuţi ‘naintea Lui, cei ce se tem de El,\nȘi bazaţi pe-a Lui milă, lui Christos urmează.\nMila-I fără margini la toţi cei prinși se-ntoarce.\nTe lăudăm, Doamne Mare, pentru a Ta ‘ndurare!\n\n3. Lăudăm bunătatea Ta, ce ne-o arăţi nouă,\nCă ne-ai făcut cunoscut a’ Tale mari taine!\nCa stânca de tari îţi sunt promisiunile!\nIubirea și mila Ta nicicând margini nu au!` },
            78: { title: "Slujbă înălţătoare", text: `1. Mergem să servim vesel pe Regele! Toate puterile Lui fie date!\nChiar deși e puţin ce noi făptuim, servi credincioși altfel nu putem să fim.\n\n2. Lucrul lui Dumnezeu la fapt ne cheamă. Această chemare toţi să audă!\nSfântă-i misiunea ce Domnul ne-a dat, prin care mult vom fi binecuvântaţi.\n\n3. Fii părtaș în servici’ cu bucurie, ducând vestea cu mai mare ‘ndrăzneală!\nAcest har măreţ ne umple inima, că nouă Domnul așa lucru ne-a dat!` },
            79: { title: "Har", text: `1. Har, glas dulce, plăcut, plin de bucurie,\nCerul, pământul, cu ecou, aceasta răsune!\n\n2. Harul drum a găsit, pe om să-l mântuie.\nScopurile lui Dumnezeu El le împlinește.\n\n3. Harul m-a învăţat să merg pe drum ceresc.\nToată ora mă ajută, în scop să mă silesc.\n\n4. Harul va termina, în veci, orice muncă.\nCer și pământ să-L laude, că I se cuvine!` },
            80: { title: "Puternic, mare ești, Doamne!", text: `1. Puternic, mare ești, Doamne! Iar noi ce mici suntem!\nA noii creaturi membre pe Tine Te laude,\nCe ‘nainte de cer, pământ, deja tronul având!\nDe toţi oamenii ar muri, Tu totuși viu rămâi.\n\n2. Pân’ viaţa ni-e pribeagă, de multe griji plină,\nScopul Tău, mereu la ţintă, ne’ncetat se-avântă.\nDoamne, puternic, mare ești, ce mintea o uimești!\nToate făpturile Tale pe Tine Te laude!` },
            81: { title: "În Dumnezeu", text: `1. Mare Dumnezeu, permite-mi ca să-mi aflu toate-n Tine!\nTu să-mi fii scop și speranţă! Ochii mei pe Tin’ Te vadă!\n\n2. Mare ești, bun, drept și-nţelept! Tu ești Tatăl și Domnul meu!\nEu sunt al Tău prin sânge sfânt, răscumpărat fiu, serv al Tău.\n\n3. Viaţa, făr’ iubirea Ta, valoare nu poate avea.\nE-o sarcină, chinuire, de-aș fi respins de la Tine.\n\n4. Mâini și glas ridic la Tine! Te laud pân’ am suflarea!\nLucrul Tău sfânt mă bucure, cât zilele-mi vor mai ţinea!` },
            82: { title: "Seceriș", text: `1. Doamne, după porunca Ta, sfinţii ‘ncepur’ a semăna,\nȘi ei ascultând chemarea, făr’ de-a mai pofti altceva.\n\n2. Prin anii triști, de dureri plini, au semănat vărsând lacrimi,\nȘi având credinţă tare, că vin vremi de secerare.\n\n3. Sfinţii nu vor mai suferi, și lacrimi nu vor mai vărsa,\nCă cel ce pe ei i-a chemat, a început la secerat.\n\n4. Acuma, prin îngeri, Domnul, în grânar, adună grâul.\nAi Săi, deci, în cântec saltă, sunând cânt de biruinţă.` },
            83: { title: "Sosirea Mântuitorului", text: `1. Ce cânt plăcut! El a venit, Mântuitor promis.\nInimi, Lui tron să-I pregătiţi, și-n cântec să-L măriţi!\n\n2. Vine “Soarele Dreptăţii”, s-alunge nori, ceaţă,\nPe pământ să dea viaţă și-n noapte lumină.\n\n3. El vine să ‘libereze pe cei prinși de Satan.\nVa distruge-a morţii poartă, și pe toţi dușmanii.\n\n4. Prin “Osana” să vestim că Regele-i de faţă!\nFirmamentul cu ecou să sune vestea bună!` },
            84: { title: "Condu-mă!", text: `1. Condu-mă, mare Iehova, pe pământul acesta!\nEu sunt slab, dar Tu ești tare. Mâna Ta m-asigură.\nPâine din cer, pâine din cer, pâine din cer, nutrește pân’ e lipsă!\n\n2. E deschis izvor de cristal, izbucnind apă vie.\nNorul de foc al prezenţei Tale să mă conducă!\nMântuitor, mântuitor, mântuitor, cetate, pavăză-mi ești!\n\n3. Precum cresc necazurile, întărește-mi credinţa!\nÎn liniște, o, ţine-mă, chiar dacă mii vor cădea!\nScăparea mea, scăparea mea, scăparea mea, m-ai luat sub paza Ta!` },
            85: { title: "Salutaţi dimineaţa Sionului!", text: `1. Salutaţi dimineaţa Sionului! Ochii multora văd mari bucurii.\nOrice strigăt amarnic sfârșească-se, că “naţiunea nouă” tronează!\n\n2. Salutaţi dimineaţa Sionului, de care toţi profeţii au vorbit!\nIată, oamenii cum vin din tot locul! Vezi popoare cum caută pe Domnul?\n\n3. Vezi pustietatea? Reînviază. Izbucnind râuri, totul adapă.\nÎn deșerturi viaţa înflorește. Glas de bucurii pământul umple.\n\n4. Vezi, pământ, mare morţii cum sloboade? Mărire lui Iehova să fie!\nGlas de triumf tremură tot văzduhul! E rupt arcul și carul de luptă.` },
            86: { title: "Domnia măreaţă a lui Christos", text: `1. Daţi mărire Celui Uns, al lui Iehova Fiu!\nSăltaţi! Timpul I-a ajuns. De Stăpân toţi Îl știu.\nVine să rupă lanţul, pe robi să-i dezlege,\nSă ridice păcatul, ‘n drept să guverneze.\n\n2. Vine ca un ajutor, robia să strice.\nSalvând pe săraci din praf, bogaţi umilește.\nCânt să dea-n loc de suspin și noaptea lumină,\nCelor slabi și-n ruină, dragi Lui, din inimă.\n\n3. Să-L mărim necontenit, și zilnic Lui cântând!\nDomnia-I e deplină, sfârșit n-are nicicând.\nIar acest sfânt legământ nicicând nu s-a schimba,\nVestind că Dumnezeu e veșnica iubire.` },
            87: { title: "Înţelepciune dumnezeiască", text: `1. E fericit omul cel ce drumul Domnului cunoaște.\nVa putea el învăţa că inima Lui mult iubește.\n\n2. Ce scumpă înţelepciune, ce cerul ne dăruiește!\nAur, argint fie, orice ‘naintea-i valoare n-are.\n\n3. Are mâini pline de zile, preţ bogat de nemurire.\nCăile Îi sunt plăcute, către pace sunt făcute.\n\n4. Fericit cel ce-o câștigă, și-n toate I se obligă!\nChristos e înţelepciunea. Ce har a fi cu El una!` },
            88: { title: "Vedere cerească", text: `1. Auzi vocea ce vine de la tronul cel alb,\nUnde, ‘naintea Celui ce șade, harfe sună?\n“Laudă, cinste, mărire!” Auzi armonia?\nSus, mulţimi de harfiști cerești răsună cântarea.\n\n2. Din orice limbi și popor acasă sosește,\nÎn mare marș de-nvingere, ceata credincioasă.\nO, auzi pe sfinţii mulţi, car’ în cer învie?\nLăudând, mărind pe Dumnezeu, biruinţă-I cântă.\n\n3. Și vezi cetatea sfântă, care se coboară,\nPe Ierusalimul cel nou, locașul de pace?\nŢâșnesc râuri de cristal, neîncetat din ea.\nȘi în ea, orice popor, pe Christos va adora.\n\n4. Acolo soare nu e, și nici noaptea lună,\nCă luminează Dumnezeu, și chiar Mielul în ea.\nPoporul probat al Său mereu Îl servește,\nTronând cu Christos și-aducând fericiri veșnice.` },
            89: { title: "Auzi cântul jubiliar?", text: `1. Auzi cântul jubiliar, vocea ca și tunetul,\nSau cum marea vuiește, când fluxul bate malul?\nAceluia pe pământ, că Domnul e Împărat,\nCântarea bucuriei, să umple tot terenul!\n\n2. Aleluia! Cântare din adânc până la cer!\nA’ făpturilor buze se ‘nalţă spre laudă,\nFiindc’ a lui Iehova sabie s-a răzbunat,\nȘi-a pământului neamuri lui Christos I le-a predat.\n\n3. Peste întregul pământ va fi Domn nemărginit,\nCând acest pământ și cer, ca un tui s-or prăbuși,\nCând vrăjmașul, în sfârșit, deplin va fi distrus,\nȘi va fi aleluia Dumnezeu întru toate.` },
            90: { title: "Auzi cântecul harfelor?", text: `1. Auzi cântecul harfelor cu ce măresc pe Domnul\nCei ce pe Miel urmează și pe muntele sfânt petrec?\nPe El cu mâinile-L laudă, răsunându-I cântare,\nPentru că din cuvântul Său izvorăște lumină.\n\n2. Este scris pe frunţile lor al Tatălui sfânt nume.\nEste plină inima lor de-a lui Dumnezeu milă.\nCe lucru de admirare, curat și fără pată,\nLa ce numai scumpul sânge și silinţa ne-ajută!\n\n3. O, ce cântec măreţ cântă! Inima o răpește.\nSfinţii pot numai intona, de e bună inima.\nMare Rege al sfinţilor, mulţumire să-Ţi fie!\nAuzind vocea harfelor, și pământul Te laudă!` },
            91: { title: "Cu Christos", text: `1. Suflete trist, sus, sus! Griji nu avea!\nPe vrăjmași ruga ta-i va învinge.\nIsus ‘naintea ta, rău nu te va strica.\nSuportă paguba El cu milă.\n\n2. Cu toţi la serbare, dar nu în gol!\nCa sfinţi oaspeţi să fiţi! Isus e-aici!\nImnul biruinţei, sfinţi, voi să-l ridicaţi!\nVirgine, farmecul vi-l îmbrăcaţi!\n\n3. Pe capul nost’ cununi Isus pune.\nPe-al Său tron loc ne dă, de soţi ne ia.\nSlabi, car’ bine speraţi, pribegi, car’ suspinaţi,\nCu El în mărire, vă bucuraţi!\n\n4. Car’ umblă încă jos, atenţi fie!\nPe Dumnezeu laude în tot locul,\nCar’ e-n a Lui casă! Pe a Lui cărare,\nFulgeri luminează. Isus e-aici!` },
            92: { title: "Înainte!", text: `1. Să sfârșim grabnic lucrul, ce Domnul ne-a croit,\nCa al Lui popor sfinţit zi, noapte folosind!\nSabia sus ridicând, să mergem la luptă!\nUnșii credincioșia așa vor arăta.\n\n2. Să unim puterile, ridicând drapelul,\nCă în lucrul unitar este rezultatul!\nSă lăudăm toţi pe Domnul, în mod necontenit,\nPân’ a lui Satan hoardă va fi nimicită!\n\n3. Orice ostaș e dator credincios să lupte.\nDar și noi credincios să luptăm pân’ la moarte!\nFie semnul “‘Nainte!” după Conducător,\nPână cauza sfântă la ‘nvingere-ajunge!` },
            93: { title: "Promisiuni minunate", text: `1. Ascultă! Dumnezeu zice: O, tu, poporul meu trist,\nNemângâiat și alungat, îţi zidesc locaș mărit.\nN-or mai fi nori de mâhnire, car’ drumul întunecă.\nZidul va fi “Mântuire” și porţile “Laudă”.\n\n2. Acolo ca râu de apă, care-adapă grădina,\nTot plăceri ce nu se gată vor desfăta inima.\nToate-acestea de la Domnul sunt răsplata credinţei.\nVa domni adevăr, pace. N-a mai fi războire.\n\n3. Luna ta nu va mai scădea. Al tău soare sus va sta.\nNecaz nu-i mai avea, fiind Dumnezeu lumina ta.\nNoaptea ta s-a schimba-n ziuă, suspinul în laudă.\nDomnul va fi gloria ta și lumina veșnică.` },
            94: { title: "Haina de mireasă", text: `1. În haină de nuntă, o, Părinte, îmbracă-mă!\nTu la acel’ întinzi ce Ţie îţi este copil.\n\n2. De murdară, spală-mă! Și-n cea albă ‘mbracă-mă!\nDe al Tău cuvânt sfinţit las’ să fiu împodobit’!\n\n3. Lasă numai să port eu ce mi-a cinstit Domnul meu,\nPrins de-al Lui braţ, ne‘ncetat, să umblu eu nepătat!` },
            95: { title: "Pe Tine Te serbăm, Doamne!", text: `1. Pe Tin’ Te serbăm, Doamne! Mila-Ţi margini nu are!\nMărim numele-Ţi mare, bunătatea-Ţi cerească!\n\n2. Deși nevrednici suntem, ascultă-ne Te rugăm!\nȘi apoi la dreapta Ta, mai frumos Te-om lăuda.\n\n3. Cât mai stăm pe-acest pământ, condu-ne pe-al Tău drum sfânt,\nLa Tine să ajungem, gloria Ta s-o vedem!\n\n4. Atunci, în veșnicie, vom vedea bogăţie.\nDin marea Ta graţie vom avea desfătare.` },
            96: { title: "Cuvânt de rămas bun", text: `1. Binecuvântă-ne, Doamne, înainte de-a pleca!\nFii Tu ‘grijitorul nostru! Dă-ne apărarea Ta!\n\nRefren:\nBinecuvântă ce-am vorbit, și ne-ascultă cererea!\nTrimite-ne semnul Tău, că pe noi nu ne vei lăsa!\n\n2. Prin cuvântul Tău fii cu noi! Mângâie, ‘ntărește-ne!\nPentru toate ce am primit, Ţie-Ţi fie mărire!\n\n3. Spiritul Tău fie cu noi! Templul Tău așa vom fi,\nCălătorind spre mărire, când cu dreapta Ta ne ţii.` },
            97: { title: "Înviorează-ne!", text: `1. Tată ceresc, noi, ai Tăi fii, în jurul Domnului stăm.\nTe rugăm dă ‘mprospătare cuvântu-Ţi sfânt pe cale!\n\nRefren:\nO, dă-ne înviorare, cu prezenţa Ta, Doamne,\nS-ajungem la ‘mprospătare pe-a cuvântului cale!\n\n2. Al cerului dar, vânt gentil, ne ‘mparte al Lui spirit,\nPloaie-n plin, înviorare, cuvântu-Ţi sfânt pe cale.\n\n3. Dacă în luptă vom slăbi, și-n atac ne moleșim,\nCuraj ne dă, ‘nviorare, cuvântu-Ţi sfânt pe cale.\n\n4. Ne fii vizir, ne păzește, prin spiritul Tău, Doamne!\nTe rugăm dă-ne putere, cuvântu-Ţi sfânt pe cale!` },
            98: { title: "Prinoștirile cerului", text: `1. Oștirile cerului sunt pentru ajutor\nLa cei ce onorează, servind pe Dumnezeu.\nChiar de se războiește balaurul cu ei,\nSub umbra lui Iehova sunt în siguranţă.\n\n2. Lucrarea lui Elisei e atac curajos.\nVorbind noi cuvântul Său, o plagă grea suntem.\n“Martorul drept, credincios” ne conduce ceata.\nPurtând “haina dreptăţii”, noi, cu El atacăm.\n\n3. Prin oastea cea cerească Iehova va ‘nvinge,\nÎn care și noi luptăm, nimic nu ne-atinge.\nÎndoială nu este că El va birui,\nȘi, statornicul erou, mărire va primi.` },
            99: { title: "Domnul ne conduce", text: `1. El conduce. O, ce cuget! Ce repaus ceresc îmi dă!\nOriunde sunt, orice-aș face, mă conduce cu-a Lui mână.\n\nRefren:\nMă conduce. Mă conduce, credincios, Domnul pe mine.\nTe voi urma, o, Domnul meu, numai Tu condu-mă mereu!\n\n2. Când prin noaptea ‘ntunecoasă, când prin raze luminoase,\nPeste valuri, prin furtună, mă conduce cu-a Lui mână.\n\n3. Dă-mi, Doamne, dar, a Ta mână, și ce dorești, eu voi face!\nOdihnit voi fi-n soarta mea, dacă Tu mă conduci mereu.\n\n4. Și sfârșindu-mi aici lupta, și-având aproape ‘nvingerea,\nNu m-a-nfrica moartea rece. Domnul prin Iordan m-a trece.` },
            100: { title: "Aici nu am patrie", text: `1. Eu sunt străin aici pe-acest pământ, și sunt pe drum necontenit.\nȘi ca pribeag mergând singur pe drum, aici nu am patrie.\nMă uit unde răsare soarele, unde se nimicesc păcatele.\nEdenul iar se va realiza. Acolo am patria.\n\n2. Aici ispita mă împresoară, și sunt pe drum necontenit.\nȘi, vrășmașul deși mă chinuie, sunt fericit, fericit.\nVrășmașii las’ batjocorească-mă! Cei răi arunce-asupra mea hulă!\nDin cale nu mă-ntorc niciodată. Voi odihni liniștit. \n\n3. Sufăr aici chinurile probei, și sunt pe drum necontenit.\nDeși mă despart de prietenii mei, sunt fericit, fericit. \nCe ne-a promis, ne-aduce pacea El. Ferice de cel ce moare cu El!\nCă acela de păcate-i liber. Voi odihni liniștit.\n\n4. Lumea gândurilor e pustie, și sunt pe drum necontenit.\nDeși mă lupt aici cu mulţi pizmași, sunt fericit, fericit.\nPuterea lui Satan mult nu va fi. Domnul în bucurii mă va primi.\nȘi cel ostenit fericit va fi. Voi odihni, odihni.` },
            101: { title: "Toţi cei credincioși", text: `1. Toţi cei credincioși și toţi cei zeloși nu tremură, nu se tem.\nMântuirea strigă cu voce tare, pân’ bucuria vine.\n\nRefren:\nSă plecăm, dar, înainte! Cuvântul ne conduce.\nZice Iehova: “Eu te voi ajuta! Ridică-ţi, dară, mâna!”\n\n2. Credinţa dă putere la lucru, car’ iubește, servește.\nZel îndeamnă acum pe cei credincioși. Egoismul loc n-are.\n\n3. Vezi în mijlocul pericolului ceata credinioșilor?\nGroaza luptei pe ei nu se observă. Feţele lor strălucesc. \n\n4. Lupta aceasta-i a lui Iehova. Ne-ndeamnă să fim zeloși.\nBiruitor El e. Lumea aceasta are sfârșit dureros.` },
            102: { title: "Bunătatea lui Dumnezeu", text: `1. Doamne, mila-Ţi cerul umple! Credincioșia-Ţi străbate\nNorii, car’ Ţi-au acoperit Cuvântul și scopu-Ţi mărit!\n\n2. Dreptatea Ta e veșnică. Așa ca munţii ‘ntărită.\nFaptele-Ţi sunt minunate. Judecăţile-Ţi sunt drepte.\n\n3. Grija-Ţi iubită și lată, spre om și vită se-mparte! \nGrijești toată creatura, dar pe-ai Tăi sfinţi pe deasupra.\n\n4. O, Doamne, mare-i mila Ta, de unde-i toată speranţa!\nPrin toate odihnim bine, sub aripa-Ţi de iubire.` },
            103: { title: "Izvorul mângâierii", text: `1. A adevărului raze ceaţa nopţii străbate.\nȘi ‘mprăștiind-o cu totul, lumină răspândește. \n\n2. Din înălţimi se coboară ploaia de dar bogată,\nComori ce-așteaptă inima, ce Domnul vrea să-mpartă. \n\n3. Autorul făpturii noi, dă putere, ungere!\nLocaș fie-Ţi inimile! Să Te laude buzele!\n\n4. Mult Te rugăm, ascultă-ne, Tu, al păcii Dumnezeu!\nFii cu noi întotdeauna! Dă din belșug harul Tău!` },
            104: { title: "La picioarele Domnului", text: `1. Plăcut e, retras aici, faţa Domnului a căuta!\nO, vino între noi, Doamne, cum ne-ai dat promisiunea!\n\n2. Lăsând necaz și griji lumești, grăbiţi fugim ‘naintea Ta!\nȘi ascultând al Tău Cuvânt, ne deschizi înspre cer calea. \n\n3. Mai mare între zeci de mii, vorbești să-Ţi auzim vocea!\nCă poporu-Ţi orfan nu-l lași, dând prin semne prezenţa Ta.` },
            105: { title: "Conducător credincios", text: `1. O, al nost’ Conducător, Te rugăm din inimă, \nPăzește-ne! Dă mâna, pân’ pribegim pe cale!\nInima reînvie de-al Tău glas de dragoste,\nCar’ blând șoptește: “Vino, pribeag, în cer te duc Eu!”\n\n2. Amic credincios cu noi, Cel ce ne-ajuţi în nevoi, \nNu ne lăsa să slăbim în groază de-ntunecimi!\nCând viscolul vâjâie și nădejdea ne scade, \nAtunci șoptește: “Vino, pribeag, în cer te duc Eu!”\n\n3. Când trec zilele luptei, și așteptăm odihna,\nTerminând pe-acest pământ vestea bună ‘mprăștiind,\nCând valul se-nfurie, nădejdea e-al Tău sânge!\nO, șoptește-atunci: “Vino, pribeag, în cer Te duc Eu!”` },
            106: { title: "Liniște în Dumnezeu", text: `1. Ce ‘nţelept e Domnul! Minunat e scopul.\nLui încredinţăm gândirea. El e îngrijirea. \n\n2. Al Domnului popor nu tremure deloc!\nEl de toate se ‘ngrijește. Pe ai Săi păzește. \n\n3. De ce ţi-ai încărca atât de mult mintea?\nGrăbește la al tău Tată! El te ușurează.\n\n4. Ziua, clipa, toate, mila Lui o vestesc.\nSpre El aruncăm sarcina, și Lui dăm mărirea.` },
            107: { title: "Ca și Christos", text: `1. Ce dulce și măreţ e a simţi ce din sigiliul iubirii izbucnește,\nCe Dumnezeu ca arvună ne-a întins, ca toate să le răbdăm, gata să fim!\nDoresc mult să fiu blând, simplu și umil, ca ‘Nvăţătorul meu, și ca un copil.\nDe aș fi credincios ca și Domnul meu, să am inima plină de rugăciuni!\n\n2. Vreau înţelepciune ce din cer vine, ce în pericole mă sfătuiește.\nSă fiu gentil cum a fost Domnul doresc, și credincios al Său cuvânt să-mplinesc,\nȘi să iau în deșert a’ lumii plăceri, comoară să-mi fie credinţa vie,\nA scutura jos lanţul păcatului, și să trăiesc numai spre plăcerea Lui.` },
            108: { title: "Temelia noastră tare", text: `1. A credinţei voastre bază, sfinţilor, are puterea-n Cuvântul Domnului.\nVoi, care la Christos v-aţi refugiat, |: ce mai aveţi de la El de așteptat? :|\n\n2. Să fii bolnav sau să trăiești chiar voios, să le ai toate sau să fii nevoios,\nAcasă, pe drum, pe apă sau uscat |: îţi duc soarta zilelor amăsurat. :|\n\n3. Dacă-ţi zic să vii pe ape-n afunzimi, valurile durerii nu te ating.\nPentru că Eu te voi binecuvânta |: și de gândurile grele te-oi scăpa. :|\n\n4. Când va fi să înduri probe grele, mari, te va ajuta al Meu puternic dar.\nFlacăra nu va ajunge la tine. |: Eu fac soarta la aur și rugină. :|\n\n5. Cel ce de la Isus cere ajutor, nu-l voi lăsa pe mâna vrășmașilor.\nVină contra lui vrăjmașii cu suta, |: niciodată Eu pe el nu-l voi uita. :|` },
            109: { title: "Ce minunat este Numele Tău!", text: `1. Iehova pe-ntreg pământul, mare-i al Tău Nume,\nDeși Prea Înălţimea Ta în ceruri tronează!\n\n2. Dacă văd, privind sus la cer, lucrul mâinii Tale,\nLuna și stelele în foc de tot minunate.\n\n3. Uimit eu atunci așa zic: “Dar omul ce este,\nDe la fiul omului Tu privești cu plăcere?”\n\n4. Mai prejos decât îngerii, Isus s-a prefăcut,\nCa să guste moartea pentru neamul de om căzut.\n\n5. Toate lucrurile Tale sub El le-ai rânduit. \nNumele-Ţi pe-ntreg pământul este de tot uimit.` },
            110: { title: "Calea Domnului mai bună", text: `1. Calea Domnului mai bună e dreaptă, repaus aduce.\nȘtiind că orice se-ntâmplă, pentru credincios e bine.\n\nRefren:\nCum Domnul vrea, e mai bine. Acest cuget dă liniște.\nȘtiind că orice se-ntâmplă, mie Dumnezeu ‘mi-ajută.\n\n2. O, cum ajută a umbla, și chiar chinuri mari a răbda!\nȘi noaptea cea mai groaznică o va încălzi lumina. \n\n3. Cine umblă cum Domnul vrea, pace perfectă va afla,\nȘi har din belșug va primi, calea să și-o poată sfârși.\n\n4. Inima de ce tremură? Să n-o mai umple tristeţea!\nCi ridicându-ne capul, să mergem tot după Domnul!` },
            111: { title: "Mare-i lucru-Ţi, Atotputernice!", text: `1. Mare-i lucru-Ţi, Atotputernice! Toate căile Tale sunt drepte!\nDoamne, cine ar fi să nu Te laude? Singur, numai Tu ești sfânt peste toate!\n\n2. Toţi păgânii vor veni la Tine, aducându-Ţi onoare și cinste,\nCă Îţi vor cunoaște judecăţile, și Te vor adora naţiunile.` },
            112: { title: "Eu sunt ușa!", text: `1. “Eu sunt ușa!” Intră! Intră, lăsând păcatul și frica!\nFurtuna sălbatic bate. |: O, intră, dar, lăsând toate! :|\n\n2. “Eu sunt ușa!” cu sigur zar. De orice dușman te apăr.\nAici inimi au liniștea, |: care simt frigul și noaptea. :|\n\n3. “Eu sunt ușa!” Fii bucuros! Aici e-al tău loc de-adăpost.\nAici tezaur vei avea, |: cumpărat cu viaţa Mea. :|\n\n4. “Eu sunt ușa!” și Tatăl vrea să-I fii fiu, s-ai moștenirea.\nIntră, dar, cântând laude, |: umblând drum ce la cer duce! :|` },
            113: { title: "Asemenea-Ţi fiind ca Tine", text: `1. Când mă voi trezi, Doamne, asemenea-Ţi fiind ca Tine, alb, curat,\nȘi din acest corp fiind eliberat, mare-a fi bucuria mea!\n\n2. Știu că inima spălată trebuie, și-a Tale trăsături scrise.\nȘtiu că-mi trebuie nopţi de întristare, pân’ zorile se revarsă.\n\n3. Dimineaţa mărită, iată, vine! Umbra trece de pe pământ.\nLas’ să fiu în mărire lângă Tine, Ţie, Doamne, asemănând!\n\n4. Și când îmi vei surâde faţă-n faţă, într-u’ al Tău sfânt adăpost,\nȘi braţul părintesc mă va ‘mbrăţișa, voi fi fericit peste tot!` },
            114: { title: "Vremuri mai bune", text: `1. Aștept, tot mereu aștept eu, să vin’ o zi mai bună\nPeste umbra-ntunecoasă ce calea-mi înconjoară,\nSoarele voios, de care pământul n-a mai văzut,\nCând Christos își ia puterea, stând pe tronul lui David.\n\n2. Toţi profeţii vechi au văzut, departe, lucirea ei.\nȘi-au vorbit în voci sublime, pacea și gloria ei,\nAdormind ei toţi prin văi verzi, obosiţi de-al lor drum greu.\nDar vor veni iarăși cântând ‘n muntele lui Dumnezeu.\n\n3. Lumea acum zace-n jale. N-auzi numai vaiete.\nDezastrele aduc în ochi izvoarele de lacrimi.\nE-o noapte neagră de plânset, triumful nedreptăţii.\nÎnsă eu, răbdând, tot aștept că zorile se ivesc.\n\n4. Eu aștept, sperând și-n rugă, domnia lui Mesia.\nȘtiu că El cu drept va domni, și dreptul va triumfa. \nDe plăceri lumești nu-mi pasă, că ziua Lui o-aștept eu.\nPompa lumii nu mă-ncearcă, luminând El drumul meu.` },
            115: { title: "Valea binecuvântărilor", text: `1. Intrând în valea binecuvântărilor, unde tot cu Isus să fiu,\nAl Său spirit și sânge putere-mi este! Al iubirii locaș este!\n\nRefren:\nÎn valea darurilor bucurii sunt, unde Isus ne mângâie.\nEl ni-e scăpare din tot necazul! Noi declarăm prin credinţă.\n\n2. În valea darurilor pace străluce, și pământu-n belșug ‘noată.\nSe vor odihni membrele obosite. Vor fi pline de bucurii.\n\n3. În valea darurilor laudă sună, ce virginele o cântă.\nȘi toate popoarele Lui se închină, ‘mplinind poruncile Sale.` },
            116: { title: "Încredere în Dumnezeu", text: `1. Când pe marea lină spre patrie plutim, \nDoamne, cu al milei Tale vânt, drumul ni-l sfârșim!\n\n2. De val se-nalţă și urletul nu-nceată,\nLas’ furtuna-nfuriată, să ajung acasă!\n\n3. În curând croiești Tu drum, hotar pentru ea.\nIubirea-Ţi alungă ceaţa, destramă frica mea.\n\n4. Ce tu voiești, Doamne, fie dorinţa mea,\nCa prin credinţă să umblu, pân’ faţa-Ţi voi vedea!` },
            117: { title: "Numai Dumnezeu știe", text: `1. Eu nu știu ce m-așteaptă. Domnul, din graţie,\nAceasta o ţine-n taină. Și, pân’ sfârșesc calea,\nScene noi îmi descoperă, care mă bucură.\n\nRefren:\nOriunde mă voi duce, făr’ de îngrijire,\n|: Îi voi încredinţa soarta. El știe ce vine. :|\nEl ști’, El ști’, El ști’.\n\n2. Dacă numai un pas văd, lumina-mi străluce.\nDacă zboară visul lumesc, drăgălaș îmi sună\nVocea-I blândă, care-mi zice: “Vino și-Mi urmează!”\n\n3. Ce bine că eu nu știu că ce am să petrec!\nAl Tău braţ mă ocrotește. Singur nu rătăcesc.\nCuvântul Său mă leagănă, repaus dulce îmi dă.\n\n4. Și merg tot înainte, neștiind ce vine,\nMai bine-i cu El în adânc, ca sus singur umblând,\nȘi în ceaţă, prin credinţă, ca-n orice lucire.` },
            118: { title: "Auzind vocea lui Isus", text: `1. Auzind vocea lui Isus: “Vino să odihnești!\nAruncând sarcina grijii, pe-al Meu sân repausezi!”,\nȘi eu am venit, cum eram, cu inima frântă,\nPrimind repaus fericit, sub ocrotirea Sa.\n\n2. Auzind vocea lui Isus: “Cine-i setos să bea!\nRăcoresc pe cei ‘năbușiţi, dându-le viaţă.”,\nDin apă eu am băut și cu puteri m-a umplut.\nM-a răcorit și viaţa acum în El aflu.\n\n3. Auzi vocea Lui: “Vino, că numai Eu sunt calea!\nÎn lumină vieţuiești, de pe ea vei umbla!”\nUrmând acum Îl salut ca “Soare al Dreptăţii”,\nCar’ peste toată făptura, curând va străluci.` },
            119: { title: "Făr’ de tin’ nu-i viaţă", text: `1. Făr’ de Tin’ nu-i viaţă! Tu o dai aceasta!\nȘi tot omul viaţă, prin Tine ‘a câștiga.\nDe moarte nu am frică. La Tine-am viaţa!\nPrin puterea Ta, Isus, eu mă voi bucura!\n\n2. De Tin’ nu mă desparte nici-o tulburare.\nNu mă rupe nici moartea. Tu-mi vei fi scăpare!\nTu mă știi că sunt al Tău, mântuitorul meu!\nCa orice domn pe pământ, mai bogat m-ai făcut.\n\n3. Și pân’ umblu pe pământ, de bucurii sunt plin.\nȘi, în această stare, am tezaur mare.\nDeci, eu voi umbla așa ca Domnului să-I plac.\nCe-mi spune al Lui Cuvânt, cred, și-I voi urma Lui.` },
            120: { title: "Mântuitorul meu trăiește", text: `1. Ce bucurie-mi dă mie, știind despre Domnul bine!\nC-a murit și iar trăiește. E-al nost’ cap și Domn a toate.\n\n2. Trăiește El, și pe mine m-a renăscut prin iubire.\nPrin sângele Lui m-a scăpat. Din toate El m-a ridicat.\n\n3. În toată ziua m-ajută. Îmi dă învingere-n luptă.\nNu peste mult, și moartea, eu voi învinge prin Domnul meu.` },
            121: { title: "Laudă, suflete, pe Domnul!", text: `1. Laudă, suflete, pe Domnul! Nu te poate scăpa altul.\nÎn oameni voi nu vă încredeţi, că-n curând praf se preface,\nȘi ce vrea se nimicește! Speranţa Domnul vă fie!\n\n2. Fericit e cine crede că ce a zis se ‘mplinește!\nDrept, Puternic Dumnezeu e, Cel ce cer, pământ a creat,\nLa făpturi viaţă a dat! Prin Cuvântul Său sunt toate.\n\n3. El aduce ‘liberare și la cei ce-s în prinsoare.\nEl deschide la orbi ochii. De sărac, orfan va ‘griji,\nDând mâncare și speranţă. Pe ‘ngâmfaţi în praf aruncă.` },
            122: { title: "Voinţa Ta, Doamne!", text: `1. Voinţa Ta, Doamne, o caut bucuros!\nÎn car’ inima-mi tulbure va găsi odihnă.\n\n2. Voinţa Ta, Doamne, plăcere îmi este,\nMă fericește în probe, dând viaţă scumpă!\n\n3. Voinţa Ta, Doamne, soarele și ploaia,\nViaţa îmi îndulcește chiar prin suferinţe!\n\n4. Voinţa Ta, precum sus în ceruri este,\nȘi în corpul meu muritor, Te rog ca să fie!` },
            123: { title: "Cugetare", text: `1. Îmi place seara-n liniște a fi retras singur,\n|: Și, scutit de grijuri lumești, :| a mă ruga cu dor.\n\n2. Doresc lacrimi tăcute a vărsa cu căinţă,\n|: Și multele promisiuni :| a pune-n inimă.\n\n3. Doresc cântec de mulţumiri Domnului a cânta,\n|: Când îmi aduc aminte de :| mila Lui bogată.\n\n4. Doresc să văd prin credinţă triumful viitor,\n|: Ce mă întoană să cânt cu :| cânt îmbucurător.\n\n5. Ceasul vârstei întunecat, iată, s-apropiat!\n|: Viforul ei pregătește :| senin pe vecie.` },
            124: { title: "Cuvânt bun, de demult", text: `1. Doresc a istorisi mila Ta cerească,\nCă Isus, prin moarte, e izvor de scăpare.\nDoresc a istorisi că e adevărat,\nȘi toată fericirea de El e-atârnată.\n\nRefren: \nAcest lucru vechi și bun a-l istorisi doresc,\nCe iubirea ne-ntinde, și harul Său ceresc.\n\n2. Doresc a istorisi că El e iubirea,\nIdealul cel mai frumos, de toate mai presus.\nDoresc a istorisi să ai bucurie.\nDe lucrul ce a făcut vreau să-ţi vorbesc ţie.\n\n3. Doresc a istorisi că tot mai frumoasă\nÎmi este, de o vorbesc, scumpa istorie.\nDoresc a istorisi că încă mulţi nu știu\nCă-n veci vor putea trăi, prin mila Domnului.\n\n4. Doresc a istorisi al Tău Cuvânt, Doamne,\nCă la flămânzi și setoși le dă ‘stâmpărare!\nȘi de-n patria de sus cântec nou voi cânta,\nVa fi vorbirea bună, ce iubea inima.` },
            125: { title: "Al Domnului Nume vestesc", text: `1. Al Domnului Nume vestesc. Eu nu mă rușinez.\nMă lupt lângă al Lui Cuvânt, și-a Lui cruce vestind.\n\n2. Numai în Isus mă încred, de pericol vine.\nNu mă lasă în rușine, speranţa-mi rămâne.\n\n3. Cuvântul Lui ca tronu-I stă, neschimbat în totul.\nCe-n mâna-I am încredinţat, îmi va păstra Domnul.\n\n4. În faţa Tatălui Isus mă va mărturisi,\nȘi în noul Ierusalim, cu El, voi locui.` },
            126: { title: "Te doresc neîncetat", text: `1. Te doresc ne‘ncetat, o, Domnul meu!\nPacea cine altul o poate da?\n\nRefren:\nTe doresc! O, te doresc ne‘ncetat! Te doresc!\nBinecuvântă-mă și fii cu mine!\n\n2. Te doresc ne‘ncetat! Fii aproape!\nCel rău nu ‘nvinge când ești cu mine.\n\n3. Te doresc ne‘ncetat, în bine, ‘n rău!\nViaţa făr’ de Tin’ e în zadar.\n\n4. Te doresc ne‘ncetat! Du-mă-n calea-Ţi!\nPromisiunile împlinește!` },
            127: { title: "Cântare pentru cina Domnului", text: `1. În amintirea lui Isus, astă cină este,\nLa care toţi cei consacraţi sunt plăcuţii oaspeţi.\n\n2. În aceasta e-nchipuit a vieţii pâine.\nVinul, sângele Său vărsat ne închipuiește.\n\n3. Paharul ne amintește că ne-a răscumpărat,\nȘi că-n curând, la Tronul Său, din nou ne-om bucura.\n\n4. Din mărirea-Ţi ne-mpărtășești, pe veci cu Tin’ să fim.\nDumnezeu iar ne învie, dacă cu Tin’ murim.` },
            128: { title: "Sub aripa Lui", text: `1. Loc sigur și odihnă am sub scutul Celui Prea Înalt.\nUnde El ‘Și-ntinde mâna, sub umbra Lui voi rămâne.\n\nRefren:\nMare-i mângâierea, știind aceasta,\nCă sunt acoperit, sub aripa-I scutit!\n\n2. Iehova mi-e cetate, turn, care-i Dumnezeu și sprijin.\nÎn El am pus încrederea. El îmi ridică sarcina.\n\n3. De spaima nopţii n-am frică. Săgeata zilei nu-mi strică.\nRău nu mi se va întâmpla, vicleanul întindă-și cursa.\n\n4. Ciuma la mine n-ajunge, nici boala molipsitoare,\nCad’ o mie alăturea-mi, și zece mii la dreapta mea.\n\n5. Adevărul mi-e scutire, pavăză credinţa-n sânge.\nEu bine cunosc Numele celui ce-mi face scăpare.\n\n6. Nu mă va ajunge vreun rău. Sunt în mila lui Dumnezeu,\nCel ce capul sus mi-l ‘nalţă, și-mi dă mie-n veci viaţă.` },
            129: { title: "Domnul se-ngrijește", text: `1. Domnul se-ngrijește cum e mai bine,\nNici cum eu aș dori, nici precum tu ai vrea.\nDomnul cum voiește se îngrijește.\n\nRefren:\nDa, El poartă grijă, de-n El te încrezi.\nDomnul se-ngrijește, dar credem în El!\n\n2. În timpul potrivit El se-ngrijește,\nNu tocmai când eu cer, nici atunci când tu vrei,\nCi când se cuvine El se-ngrijește.\n\n3. Nu dispera mai mult! El se-ngrijește.\nSemnul sigur este: cuvântul nu-Și schimbă,\nLa toate gândește, El poartă grijă.` },
            130: { title: "Templul sfânt al lui Dumnezeu", text: `1. În Numele lui Iehova, zidește Biserica!\nNu peste mult, orice popor în ea se-ntoarce-a-L lăuda,\nÎn car’ Dumnezeu pe Christos, ca fundament, L-așezat,\nȘi-a ajuns piatră probată, chiar în unghi așezată.\n\n2. La această piatră scumpă, se mai zidesc pietre vii.\nȘi așa sunt încercate, cum Tatăl le descrie.\nAl’ dreptăţii plumb și sfoară, le croiește linia,\nPe care linii întinse zidește Biserica.\n\n3. Cel ce cer, pământ ai creat, Ţie-ţi fie lauda!\nÎn Tine va fi zidirea, întreg, frumos compusă.\nDumnezeu, fie-Ţi mărirea, că astfel ai hotărât,\nCa martori ai Tăi Te mărim, pân’ pe lume vieţuim!` },
