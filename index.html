            131: { title: "În sânul Stâncii", text: `1. În sânul Stâncii am numai liniștea, siguranţa,\nMânia orcanelor mari, în zadar, m-ar cerceta.\nPe stâncă eu liniștit stau, deși vin valuri urlând.\nNori grei de mă ameninţă, eu tot nu mă înspăimânt.\n\nRefren:\nÎn sânul Stâncii-i liniștea, venind val îngrozitor.\nÎn sânul Stâncii-i liniștea, și îmi e apărător.\n\n2. Am trecut prin multe valuri. Orcane m-au urmărit.\nȘi cu luntrea spartă, ruptă, am ajuns malul dorit.\nAcum am ajuns la liman și sunt de tot odihnit.\nSufletu-mi are adăpost, în sânul Stâncii mărit.` },
            132: { title: "În Christos", text: `1. Al credinţei braţ mă strânge. Doamne, mă-ncredinţez Ţie!\nMare Rege al măririi, ascultă a mea cerere! Din al Tău har, acum drept sunt, nimic nu mă osândește.\nMântuitor scump, cap al meu, deplin voi trăi în Tine!\n\n2. Vindecă-mă și mă condu! Harul Tău mă vieţuiască!\nLocuiască-n mine mila-Ţi! Alungă păcat și moarte!\nCuvântu-Ţi din belșug fie, cu a Ta pace în mine,\nCa voios să-Ţi umblu calea, pân’ haru-Ţi mă răsplătește!\n\n3. Deplin pe mine ‘ncinge-mă! Acoperă-mi slăbiciunea!\nÎntinde-mi spada ‘nvingător, și în luptă dă-mi pavăză!\nȘi din credinţă-n credinţă, Tu îmi dai putere, Doamne,\nCa să lupt cu îndrăzneală, pân’ la ţintă voi ajunge!` },
            133: { title: "Cetate-mi este El", text: `1. În Sion, pe stâncă stând, sun învingerea Lui.\nAscuns în al Său loc sfânt, cânt laudă Regelui.\n\nRefren:\nEl mi-e scutire, putere mare!\nCetate mare-mi este El! În El mă încred!\n\n2. Chiar de mugește marea, și nori grei se-adună,\nSunt ocrotit cu totul, cetatea-mi sigură.\n\n3. Turnul cetăţii mele nicicând nu se mișcă.\nÎnverșunatul Satan acolo nu intră.` },
            134: { title: "Regele păcii mele", text: `1. A cărui pace în inimă, fericită speranţă dă,\nPrivesc mila Lui mult admirat’, ca un potop nemăsurat’.\n\nRefren:\nCrucea-acoperă păcat, toate-n sângele vărsat.\nÎn El am eu încrederea, și vreau aceea ce El vrea.\n\n2. Pân’ cu Domnul am întâlnire, să am pace, mângâiere,\nSă fiu scăpat de blestem, păcat. Oare în zadar m-am luptat? \n\n3. Să ating poala hainei Sale. Inima-mi să ia putere.\nPunând mâna El îmi zice-așa: “Dacă crezi, te poţi vindeca.”\n\n4. Aud glasul Lui ce-mi zice-așa: “Ţie îţi dau Eu pacea Mea”.\nRegele păcii e de faţă. Peste cerul nou Se-așează.` },
            135: { title: "Mi-am găsit eu un drept amic", text: `1. Mi-am găsit eu un drept amic, necunoscut, drag, gentil.\nCu lanţul iubirii Sale legat, m-a tras la Sine.\nInima-mi strânge acest lanţ, deși e ușor legat,\nCă sunt al Lui și El al meu, în veci făr’ de schimbare.\n\n2. Mi-am găsit eu un drept amic, car’ viaţa Și-a jertfit.\nȘi ca să-mi dea viaţă El, pe a Sa și-o jertfi El.\nViaţa-mi nu mai e a mea, de El e legată ea.\nFiinţa Lui mi-e putere, în veci făr’ de schimbare.\n\n3. Mi-am găsit eu un drept amic, ce plăcut e și gentil,\nSfătuitor, sprijinitor, cu mâna-I ocrotitor.\nAșa, viaţă sau moarte de El nu mă desparte.\nSunt al cui m-a iubit tare, în veci făr’ de schimbare.` },
            136: { title: "Mântuitorul meu", text: `1. Despre Mântuitorul meu voi cânta, că m-a iubit.\nSă mă scape de păcate, pe cruce a pătimit.\n\nRefren: \nRăsune cântec! Răsune, de El, care pe cruce\nA pătimit, și de păcat cu sângele-I m-a spălat!\n\n2. Să audă toată lumea fapta asta de mărit,\nCă iubirea și mila Sa pe mine m-au mântuit!\n\n3. Preamăresc puterea mare a Mântuitorului,\nPentru care-a învins moartea. Mare-i biruinţa Lui!\n\n4. Despre Mântuitorul meu, și despre mărirea Sa,\nC-a adus viaţă din cer, să-I răsune cântarea!` },
            137: { title: "Lauda mea este crucea", text: `1. Crucea lui Christos, în care în tot timpul mă fălesc,\nPe marea vieţii mele, ca un far eu o privesc.\n\n2. De s-a ‘ntuneca viaţa, nori de gând, griji se ivesc,\nÎn pace și bucurie razele crucii sclipesc.\n\n3. De-i liniștit nivelul ei, atingând-o soarele,\nPacea-i cu mult mai frumoasă prin a crucii lumină.\n\n4. Blestem, chinuri și plăceri, le binecuvântă crucea.\nPace sfântă statornică primim ne‘ncetat prin ea.` },
            138: { title: "Slava lui Iehova", text: `1. Iehova, scopul Tău măreţ, mare ‘nţelepciune-Ţi vestesc!\nCer, pământ de ea vorbește, și universul cel mare.\nMărirea Ta-i peste toate! Timp și teren Te servește!\nŢie, ceata îngerească, Ţi se-nchină și Te laudă!\n\n2. Credincioșia-Ţi străluce! Dai ne‘ncetat mărturia\nLa-l Tău popor din timp în timp, puterea-Ţi mare arătând,\nCa să vadă oricine că viaţa-i de la Tine.\nBunătatea-Ţi nu înceată, ce mult ne binecuvântă!\n\n3. Mintea nu poate cuprinde toate scopurile Tale,\nSunând pe timp nemăsurat ce nicicând nu va fi știrbat!\nTot ce ordoni se ‘mplinește! Cine-n Tine se încrede,\nVa vedea bunătăţi cerești, ce Tu, Doamne, îi dăruiești.\n\n4. Inimă de carne vei da, când peste pământ s-a vedea\nAl Împărăţiei soare, când toţi Ţie se apleacă.\nȘi atunci, chiar din tot locul, sună “Aleluia!” corul,\nDe care n-a auzit om. Cer și pământ vor fi un ton.` },
            139: { title: "O, Isus, primind crucea Ta!", text: `1. O, Isus, primind crucea Ta, ca să Îţi calc urmele,\nChiar de slab sunt eu și sărman, pentru Tin’ lăsând toate! Deși dispar măreţii și scopurile pământești,\nPatria mea bogată e, pentru că Tu al meu ești.\n\n2. Chiar lumea să mă urască, te-a urât și pe Tine.\nO, ce dulce-i sarcina Ta, și jugu-Ţi ce ușor e!\nChiar să fiu de toţi pizmuit, Tu fierbinte mă iubești.\nO, ce parte fericită, ce prin har îmi dăruiești!\n\n3. Și răbdând suferinţi grele, la Tine m-apropie!\nȘtiu eu că, prin multe probe, scopul nost’ vom ajunge.\nMângâierea vorbei Tale, când sufăr mă întărești.\nPartea mea-i tot fericită, că e balsam la Tine!\n\n4. Lasă să port dar crucea Ta, scump Mântuitor al meu!\nChiar deși sunt de mulţi urât, purtând rușine, hulă,\nÎn suferinţi și prigoniri, soarta-mi cu Tine ‘mpărţesc.\nPartea mea ce bogată e! O, ce cuget fericit!` },
            140: { title: "Ţine-mă lângă cruce!", text: `1. Ţine-mă lângă cruce, la scumpul Tău izvor,\nUnde-i apa vieţii! Ea vindecă pe toţi.\n\nRefren:\nCrucea, numai crucea, fie lauda mea,\nPână de ceea parte ţinta voi ajunge!\n\n3. M-a tras la a Lui cruce inima-I miloasă.\nAle zorilor raze aici îmi strălucesc.\n\n4. Eu la cruce rezistând, luptând și mult sperând,\nPân’ voi ajunge-n sfârșit, la limanul dorit.` },
            141: { title: "Loc de scăpare", text: `1. Pe marea viforoasă, Isus, Tu-mi ești adăpost!\nFug, Doamne, la pieptul Tău până-i timpul viforos!\nAscunde-mă pe mine până necazul ţine!\nÎntinde-Ţi, Doamne, mâna s-am adăpost la Tine! \n\n2. Alt loc eu nu pot găsi unde să pot odihni.\nRog să nu mă părăsești! Puterea-mi numai Tu ești!\nNumai în Tine mă-ncred! Toată nădejdea îmi ești!\nDeschide-Ţi aripile, sub ele să odihnesc!\n\n3. O, Christos, Tu al meu Domn, pofta, voia mea Tu ești!\nMă ridici când stau să cad. Acum văd cu ochii tot.\nDin belșug să mă nutrești! Izvor de viaţă ești,\nCe curge în inimă. Scop’, așa, voi ajunge.` },
            142: { title: "Domnia lui Christos", text: `1. Christos va fi Domn peste tot unde soarele străbate.\nDomnia-I tot va cuprinde, că Dumnezeu prin El lucră.\n\n2. Popoarele din sud și nord la piciorul Lui se-nchină.\nFie neam cult sau sălbatic Îi ascultă poruncile.\n\n3. Pe El triști, sărmani Îl laudă, că ajutor lor El le dă.\nCapăt făcând apăsării, la popor El dă viaţă.\n\n4. Domnia Sa mult rod duce, și cel credincios va spori.\nÎl vor lăuda popoarele, răsunând cânt de mulţumiri.` },
            143: { title: "Fiţi veseli!", text: `1. Fiţi veseli! Domnul a venit! Sus! La cântare, sfinţi!\nLa a Lui mireasă vine, |: s-o-mbrace-n străluciri. :|\nDa, da, s-o-mbrace-n străluciri.\n\n2. Descurajaţi, vă bucuraţi! Semne s-au arătat,\nCă s-a arătat Mesia, |: și-ncepe domnia. :|\nDa, da, și-ncepe domnia.\n\n3. Bucuraţi-vă de veste, inimi suferinde!\nLibertate, alinare|: El la toţi aduce. :|\nDa, da, El la toţi aduce. \n\n4. Orice popor bucure-se! E prezent Regele!\nÎn Numele lui Iehova, |: înalţă dreptatea. :|\nDa, da, înalţă dreptatea.` },
            144: { title: "Calea îmi arată!", text: `1. Calea îmi arată, pe care să urmez!\nDoamne, condu-mă pe mine, să nu mă depărtez!\n\n2. O, dă-mi mâna, Doamne! Singur nu mă lăsa!\nFăr’ de Tin’ mă descurajez, valul mă-nmormântă.\n\n3. Dă ca bucuria puterea să-mi fie!\nLauda mea ‘ntotdeauna harul Tău să fie!\n\n4. La Tine m-a atras mila Ta cea mare.\nDă-mi harul Tău, să pot umbla pe-a sfinţilor cale!\n\n5. Doamne, eu Te ascult! Să fie voia Ta!\nDar las’ să simţesc harul Tău! Și n-a fi grea lupta.` },
            145: { title: "Christos – viaţa noastră", text: `1. Obosindu-ne în luptă, noi, puteri din nou dorim.\nNutrește-ne “pâine din cer”! De nu, avem să pierim.\n\n2. Cel topit izvor dorește, de car’ se va răcori.\n“Apa vieţii”, Tu poţi să ne dăruiești bucurii!\n\n3. Pe acest pământ neguros, unde nu e vedere,\nO, Tu, “lumina vieţii”, dă-ne nouă lumină!\n\n4. Prin harul Tău vieţuim noi, și Tu ne dai viaţa.\nDeși zilnic murim, totuși vieţuim noi cu Tine.` },
            146: { title: "Cântare de laudă", text: `1. Cer, pământ să laude pe marele Rege,\nÎn care cel pierdut află împăcare!\nLaudă Numele Mielului! |: Viaţă a dat pentru noi. :|\n\n2. Alt nume nu este care să ne scape,\nDecât al lui Isus. El ni-e mântuire,\nCare-a venit jos din cer, să |: ne răscumpere prin sânge. :|\n\n3. Domnul e de faţă! Trâmbiţa răsună!\nPrimească-L toţi pe El, pe Regele din cer!\nCel ce pentru om a murit, |: pentru salvare a sosit. :|` },
            147: { title: "La masa Domnului", text: `1. Las’ tot omul să audă chemarea Domnului!\nȘi la masă bogată cu drag primește omul.\n\n2. Marea Sa înţelepciune masă a întins, ce\nE plină de mâncare, ce deplin veselește.\n\n3. Voi, car’ doriţi apa vie, o, aici să veniţi,\nLa al vieţii izvor scump, ce nicicând nu scade!\n\n4. În a Sa ospătare e bucurie mare,\nCă potop de lapte și vin varsă, mântuire.\n\n5. Harul Său e larg deschis și car’ cere, primește.\nPopoarele pământului, o, veniţi la masă!` },
            148: { title: "Psalmii 68", text: `1. Scoală, Dumnezeu, la luptă! Dușmanii-mprăștie!\nNimicească-se toţi cei ce Îi urăsc Numele!\n\n2. Precum se topește ceara și dispare fumul,\nAșa piară toţi contrarii, sămânţa lui Satan!\n\n3. Bucure-se credinciosul în faţa Domnului!\nEl va scăpa prizonierii, mângâie orfanul.\n\n4. Despre Numele Lui cântaţi, și-I pregătiţi cale!\nEl luptă, și un viitor măreţ ne arată.` },
            149: { title: "Trimite lumina!", text: `1. O, trimite-Ţi lumina și cuvântul dreptăţii, Doamne,\nCa pe min’ să mă conducă pân’ ajung la locuinţă!\n\n2. Să ajung la altarul Tău, Dumnezeul fericirii,\nUnde, cu harfa mea, Ţie îţi voi cânta preamărire.\n\n3. Să nu fii trist și disperat! Inima mea, încrede-te!\nÎncă vei lăuda pe Domnul. Nici o lipsă nu vei duce.` },
            150: { title: "Psalmii 136", text: `1. Pe Dumnezeu laudă, că El ne dă tot binele!\n\nRefren: \nCă harul Său e mare. Pe vecie rămâne.\n\n2. Să purtăm noi vestea Lui, lăudând Domnul cerului!\n\n3. Pe oricine nutrește, dar de noi poartă grijă.\n\n4. Poporul Său va primi a dreptăţii mantie.` },
            151: { title: "În har", text: `1. Fiii lumii, toţi, aleargă după plăceri lumești.\nPe mine nu mă mai leagă, că sunt eu liber de toate,\nEfect nu mai are.\n\n2. Nu-mi trebuie plăceri lumești. Nu mă mulţumește.\nAșa ceva nu mai doresc. Am tezaur cu mult mai scump,\nCe e veșnic și drept.\n\n3. Cum lumina stelelor pier’ de faţa soarelui,\nAșa trec plăcerile, când Christos va fi descoperit,\nÎn faza cerească.\n\n4. Închinarea făpturilor pe min’ nu mă leagă.\nIubirea Domnului dreaptă și lauda Domnului e ce\nInima-mi dorește.` },
            152: { title: "Dimineaţa Mileniului", text: `1. Pământ, cântă de bucurie, vesel, ridicând sus glasul!\nIată, că ţi-a sosit Regele! Salută-L cu bucurie!\n\nRefren: \nScoală-n veșnică tinereţe! E ziuă. Regele-a sosit!\nVârstă fericită zâmbește spre tin’, ce necaz alungă.\n\n2. Pân’ lupta egoistă curge, și dreptatea e călcată,\nE-aici al pământului Rege. Domnia Lui e de faţă.\n\n3. Apleacă-te! Deschide-I poarta! Recunoaște pe Regele!\nEl este Regele Regilor, Cel ce te binecuvântă.\n\n4. Pământ închină-te dară Lui! Sângele-I te-a răscumpărat.\nEl este lumina lumii și-al lui Dumnezeu scop va sfârși.` },
            153: { title: "Om iudean", text: `1. Sus cu capul, pribeag disperat! Frica ta împrăștie-se!\nChristos a sosit să domnească o mie de ani, ca Rege.\n\nRefren:\nMia de ani, o, ce timp măreţ, de car’ profeţii au vorbit!\nZiua Sionului strălucit ei așa de mult au privit.\n\n2. Sună vestea la toată lumea! Spune-le cu bucurie,\nCă e al eliberării an, ce o mie de ani ţine!\n\n3. Ce strică de bolta cerului, în zori acoperă norii.\nDar răsare soarele curând, o mie de ani strălucind.\n\n4. Pământ, timpu-ţi măreţ a sosit, când te umple bucuria.\nO, de și eu în mia de ani aș putea cu El a trona!` },
            154: { title: "Scăparea este aproape", text: `1. Ridică-ţi sus capul, și în jur privește!\nSemnele se-nmulţesc pentru ‘liberare.\nSe-mplinește ce-i scris. “Smochinu ‘nflorește.”\nPrimăvara vine. Necazuri sfârșește.\n\n2. Ridică-ţi sus capul, și vezi ‘liberarea,\nÎn cer și pe pământ semne ca văpaia! Că a venit Domnul în a Sa mărire,\nCa să stabilească a păcii patrie.\n\n3. Ridică-ţi sus capul! A sosit Regele,\nSă piardă pe cei răi, poporul să-l scape!\nPrin a Lui fulgere, vezi a Sa prezenţă.\nRidică-ţi sus capul, privind ‘liberarea!` },
            155: { title: "Lumina lumii", text: `1. Lumina lumii, o, dă-ne nouă al Tău har sfânt!\nTu să ne fii învăţător la al Tău sfânt Cuvânt!\n\n2. Cum credincios ai învăţat pe ai Tăi în trecut,\nDoamne, ‘nvaţă-ne și pe noi, să-nvingem păcatul!\n\n3. În Cuvânt să-Ţi putem vedea harul nemăsurat,\nȘi, prin experienţă, să ne fie luminat!\n\n4. Învaţă-ne a ne iubi! Duhu-Ţi ne ‘ncălzească!\nAltoiește-n noi iubirea, și simţitori fă-ne!\n\n5. Dă Cuvântul Tău ca mai mult noi să îl preţuim,\nCa cercetând, prin el trăind, în chipul Tău să fim!` },
            156: { title: "Aleluia!", text: `1. Ca vuiet de ape multe, în decursul vârstelor\nIzbucnind, pătrunzând foarte, ca-n puternic cor cântă.\n\nRefren:\nAleluia! Aleluia! Anunţul ceresc sună.\nChristos, Mesia a sosit, șezând pe tron ca Rege!\n\n2. Iată steaua dimineţii, răspândind raza-n lume!\nEl e Alfa și Omega, cel dintâi și pe urmă.\n\n3. Doamne, nu tezaur’ scumpe strângem noi la tronul Tău!\nTot ce avem noi Îţi predăm! Inima Ţi-o consacrăm!` },
            157: { title: "Te servesc până trăiesc!", text: `1. Te servesc eu, până trăiesc pe muntele Sion,\nCă în lăudatul Domn îmi găsesc plăcerea eu!\nDescoperind fiinţa-Ţi, ești de mare mirare.\nLas’ să grăiesc către alţii de a Ta iubire!\n\n2. O, binecuvântă-mi gura! Dă-mi înţelepciune,\nCa să te pot vesti că ce Dumnezeu milos ești!\nLa ascultători, o, Doamne, urechea le desfă,\nCa să-Ţi cunoască Numele, și despre Tin’ cânte!` },
            158: { title: "La ivirea zorilor", text: `1. În lanţuri și-n întuneric așteptam lumina Ta.\nPurtam lanţul rătăcirii prin noaptea ‘ntunecată.\nAcum, în plină lumină, pace și fericire!\nDispar ale fricii umbre. Sună cântări de laudă.\n\n2. Izvorul nost’ de bucurii e, Doamne, că ai sosit.\nInima tresaltă văzând orizontul curăţit.\nCe frumos se-mplinește tot ce profeţii au vestit!\nE de faţă ‘Mpărăţia. Timpul croit a sosit.\n\n3. Inima cum ne dorește să răsară soarele,\nCând eroarea cea multă ca ceaţa se va-mprăștia!\nSion mult nu va aștepta după starea aceasta.\nÎn curând, ca învingător, pe tron regesc va ședea.\n\n4. Atunci Mire și Mireasă în glorie vor luci,\nȘi spre ei, popoarele, cu adorare vor privi.\nTimp plăcut de ‘mprospătare va apare de la ei,\nȘi domnind ei, pământul în Eden se va preface.` },
            159: { title: "Mărire Regelui", text: `1. Sfinţi, priviţi icoana ‘ceasta! Iată “omul de jale”,\nStând pe tronul lui Dumnezeu și pe dușman învinge! \n\nRefren:\nMărire să-Ţi fie, o, Rege mare!\nToată lumea vadă a Ta mărire!\n\n2. Salută-ţi Mântuitorul, pe Cucernic adorând!\nGloria Lui orice popor va cunoaște în curând.\n\n3. Odată I-au pus coroană și își băteau joc de El.\nAcum sfinţi cu cete de îngeri Îl măresc pe Rege.\n\n4. Auzi ce strigăt răsună, ca glas de biruinţă?\nIsus Christos pe tron stă, ca al pământului Rege.` },
            160: { title: "Lauda Regelui", text: `1. Las’ să plecăm cu darul Tău, și pacea ne-o păzește!\nNutrește-ne credinţa pân’ Cuvântu-Ţi ne conduce!\nMângâie-ne inimile, și noi, Doamne, Te mărim!\nCei mai vrednici, vom săvârși, când în patrie vom fi.` },
            161: { title: "Fii cu noi!", text: `1. Dăruiește-ne cu pace, acum, la despărţire!\nCu zel umple-ne inima! Fii cu noi totdeauna!\nNutrește-ne, ‘mprospătează, pân’ mai avem viaţă!\n\n2. Mulţumire îţi zicem, că ne-ai dat Evanghelia,\nPentru ca s-aducem fructe ce în noi ai semănat!\nFii Tu cu noi! Fii Tu cu noi, pân’ lucrul vom termina!` },
            162: { title: "În lumina Ta vedem lumina", text: `1. Lumina-Ţi dă-ne, Doamne, să-Ţi urmăm poruncile,\nCă-n lucrul Tău totdeauna drumul bun să lăudăm!\nCă fericire-i a urma sfaturile Tale,\nÎn lumină a umbla, pân’ va fi ziua plină.\n\n2. Trimite dar lumina Ta pentru lucru-Ţi, Doamne!\nPutere și minte dă-ne, scopul să-l ajungem! Pentru că lucrul e al Tău, har din belșug dă-ne!\nSă primim aprobarea Ta, Doamne, ajută-ne!` },
            163: { title: "Rugăciune", text: `1. Doamne, ascultă-ne ruga! Nicicând nu ne lăsa!\nPrivește la Unsul Tău sfânt! Fie-ne pavăză!\n\n2. O zi în curtea Ta a fi, ca-ntr-alt loc, zeci de mii.\nÎn pragul Tău e mai bine ca unde-i păcatul.\n\n3. Domnul ni-e soare, pavăză. Dă har și scăpare.\nCine la El cu zel vine, bunătăţi primește.\n\n4. Fericit e omul cel ce în Tine se-ncrede,\nCă, o, Doamne, credincios și mare Dumnezeu ești!` },
            164: { title: "Sunt al Tău!", text: `1. Numai Ţie-ţi trăiesc, Doamne! M-a cumpărat al Tău sânge.\nM-am făcut al Tău cu voia. Domnește, dar, asupra mea!\n\n2. Trăiesc și mor pentru Tine, și sunt al Tău pe vecie!\nMă ţin de făgăduinţă, și-i dau sigil cu credinţă.\n\n3. Doamne, la crucea Ta, unde s-a vărsat al Tău scump sânge,\nMă predau eu lui Dumnezeu! În mâna Lui e dreptul meu.\n\n4. Tu îl ajuţi pe cel slăbit să dea ce a făgăduit.\nHaru-Ţi este puterea ce acoperă slăbiciunea.` },
            165: { title: "În Tin' mă desfătez!", text: `1. În Tin’ mă desfătez! Tu îmi dai liniște!\nÎn Tin’ mă-ncred! Ești cel mai bun și credincios prieten!\n\n2. De toţi mă părăsesc, mila Ta-i cu mine.\nSunt eu deplin mulţumit de mă pot lăuda-n Tine.\n\n3. Cel ce mă asiguri, viaţa mi-o susţii,\nDe cădere mă ocrotești, ce mai mult să doresc?\n\n4. Grija-mi pe Tine-arunc! Speranţa mea Tu ești!\nUnicul scop îmi este, eu cu zel să Te servesc.` },
            166: { title: "Ora rugăciunii", text: `1. Oră dulce e care de Tin’ mă apropie,\nCar’ mult binecuvântă, deschizând inimile.\n\n2. Stând la tronul Tău, putem al Tău har să-l cunoaștem.\nNoi puteri și mângâieri numai acolo aflăm.\n\n3. Nu-i cuvânt să exprime ce simţim în inimă!\nAcol’ suntem acasă, chiar de toţi ne și lasă.\n\n4. Acolo inima-mi e scutită de temere.\nPrimind pacea cerească, umbra, îndoielile trec.\n\n5. Prilejul rugăciunii ce har mare e, Doamne!\nNu vom lăsa până când la scop noi vom ajunge.` },
            167: { title: "Prietenul celui părăsit", text: `1. Dumnezeu, pe Tine Te chem! Eu, zdrobit, la Tine suspin!\nO, nu mă lăsa pe mine când valuri mari m-ameninţă!\n\n2. La Tine mă întorc, Doamne, prietenul părăsitului!\n‘Stâmpărare, prigonitul din Cuvântul Tău primește.\n\n3. Sunt oare, care Te-au rugat, pe car’ Tu să-i fi refuzat?\nNu ajuţi Tu și-acum mereu celor ce caută scutul Tău?\n\n4. Toţi oamenii de m-ar lăsa, Christos nu mă părăsește.\nEl mă scapă de cădere, și viaţă îmi promite.` },
            168: { title: "Salutul Regelui", text: `1. Ziua de mult profeţită să vezi că e de faţă!\nÎmpărăţia a sosit, ce poporul a cerut.\nMunţi și câmpii tresalte, dar! S-a născut naţiunea,\nCe pe pământ va ‘ntemeia dreptatea și ordinea!\n\n2. Luptător groaznic e Domnul. Fuge de El dușmanul.\nStai hotărât, dar, lângă El, faţă de-adevăr cu zel!\nVino, de bucurii cântând, și pe Domnul salutând,\nCă biruitorul Rege Regatul Își primește! \n\n3. Pace El va întemeia. Pământ, dar, bucură-te!\nAduce viaţă la cei care doresc binele.\nTu, Rege nou al măririi, tronul Tău pe veci va sta!\n“Piatră” măreaţă în Sion, Tu meriţi toată cinstea!` },
            169: { title: "Auzi chemarea?", text: `1. A sosit ziua Domnului! Vezi departe raza ei?\nAl pământului prunc, vino! Fă-I Domnului închinări!\n\nRefren:\nAuzi chemarea? Ia-ţi arma ta – al Domnului sfânt Cuvânt!\nȘi, cu “coiful mântuirii” pe cap, ieși, pentru Domnul luptând!\n\n2. S-ai încredere în Isus! Crede și nădejde s-ai!\nEl te duce la izbândă. Crezând, frică să nu ai!\n\n3. Curajos sigur ‘nainte, călcând moarte și păcat!\nEl cu mila Sa-i cu tine, și vei fi încoronat.\n\n4. Și ridicând sfântul Său steag, să-l purtăm prin munţi și văi!\nSă vestim a Sa domnie la popoarele lumii!` },
            170: { title: "Iubire dumnezeiască", text: `1. Iubire dumnezeiască, vino din cer pe pământ!\nStrălucirea-ţi viaţă dă. Las’ să ne împărtășim!\nPărinte, ești plin de milă, iubire, nemărginit!\nNumele Tău ţi-L preamărim, pentru că ne-ai mântuit.\n\n2. Puternice Mântuitor, dă-ne din viaţa Ta!\nLocuiește pe veci cu noi! Nu-Ţi lăsa biserica!\nDorim numai plăcerea Ta, ca sincer să Te iubim!\nMărind al Tău nume mare, faptele-Ţi mari să vestim!\n\n3. Termină-Ţi biserica Ta, deplin să fie gata,\nCa să vină mântuire, ce doresc sufletele!\nDin mărire în mărire, până Te-om vedea, du-ne!\nȘi în veci noi te vom mări, o, cerească iubire! ` },
            171: { title: "Cel mai frumos", text: `1. Plăceri sublime strălucesc pe faţa Domnului.\nMărire-i pe cap și milă |: pe buze-i zâmbește. :|\n\n2. Între oameni nu e nimeni ca El, gentil, frumos.\nȘi nici chiar între cei cerești |: ca El de merituos. :|\n\n3. A văzut pe om ruinat. A venit pe pământ,\nMultă batjocură purtând, |: iertare aducând. :|\n\n4. Ce Domnul nouă ne-a promis, El ne asigură.\nStânca credinţei El este, |: care speranţă dă. :|\n\n5. Iubirea lui Dumnezeu, în Tine s-a întregit.\nO, scumpe Isus, urmele-Ţi |: a urma-s de dorit! :|` },
            172: { title: "Ce Mântuitor!", text: `1. Om al întristărilor s-a făcut numele Său.\nA venit să ne scape. Aleluia! Ce Salvator!\n\n2. Batjocorit, rușinat, pentru mine judecat,\nPrin sânge El m-a scăpat. Aleluia! Ce Salvator!\n\n3. Ca “Mielul lui Dumnezeu”, luând sarcina noastră,\nPlătind răscumpărare. Aleluia! Ce Salvator!\n\n4. A zis: “Toate s-au sfârșit!”, când Domnul nost’ a murit.\nEl e Mântuitorul. Aleluia! Ce Salvator!\n\n5. El sus în cer dus a fost, dar ca Rege s-a întors.\nDe aceea răsune: Aleluia! Ce Salvator!` },
            173: { title: "Înviere", text: `1. Mulţi sunt car’ dorm dar nu pe veci. Va fi o dimineaţă,\nRevedere fericită, în a zorilor rază.\nCei ce dorm în adâncime, în pustiu care-i ascuns,\nCar’ prin munţi și-n văi odihnesc, nouă viaţă primesc. \n\nRefren: \nMulţi sunt car’ dorm dar nu pe veci. Va fi o dimineaţă,\nRevedere fericită, în a zorilor rază.\n\n2. Dorm toţi, însă nu pe veci, că moartea se va termina,\nCă pe om, prin al Său sânge, din mormânt îl va scăpa.\nȘi când cu totul va trece a păcatului noapte,\nVa veni cu daruri vârsta a vieţii veșnice.` },
            174: { title: "Ce bine este acasă!", text: `1. Lumea zbată-se, dar nouă ni-e bine. Aripa lui Dumnezeu ne scutește.\nConsumând cu Domnul cina bogată, cunoscând datoria fericită,\nCe bine este, cunoscând datoria fericită!\n\n2. Bună ne este a Domnului pace, a simţi că la El avem patrie,\nCă nu ne mai temem nici în necaz noi. Nu ne atinge acolo pericol.\nCe bine este! Nu ne atinge acolo pericol.\n\n3. Ce bine-i a ști că ceata cerească pe cei credincioși cum îi ocrotește,\nCă avem sigur loc, odihnă dulce! A locui-n Sion bine ne este.\nCe bine este! A locui-n Sion bine ne este.` },
            175: { title: "De faţă-i Regele!", text: `1. Noi vedem că Christos a sosit ca să judece\nDeja, și călcând în teasc a pământului vie.\nFulgerul spadei Lui totul în genunchi silește.\nDe faţă-i Regele!\n\nRefren:\n|: Aleluia! Aleluia! :|\nAleluia! Aleluia!\nDe faţă-i Regele! \n\n2. Vedem că judecata Lui pătrunde pământul,\nZguduind tronuri și idoli răsturnând cu totul.\nFlacăra suflării Lui lumea rea o mistuie.\nDe faţă-i Regele!\n\n3. Vremile păgâne au trecut pentru vecie.\nUnsul va mătura cu ele și păcatele.\nȘi în curând vor vedea a Sa mare putere.\nDe faţă-i Regele!\n\n4. A șaptea trâmbiţă, sunând, în război ne cheamă.\nAcest semn e al Regelui, pentru biruinţă,\nCă el contra lui Satan intră-n luptă ultimă.\nDe faţă-i Regele!` },
            176: { title: "Cerere", text: `1. Al lui Dumnezeu Miel, cu a mea dorinţă \nVin la Tine! De păcat m-ai scăpat.\nRog să fiu ascultat! Te rog, primește-mă pentru Tine!\n\n2. Haru-Ţi vieţuitor, și zel înflăcărat,\nÎmi dă mie! Car’ Ţi-ai dat viaţa,\nMintea, inima mea, aprinde-o, să ardă iubirea mea!\n\n3. Pân’ ca pribeag umblu, între griji și gânduri,\nTu condu-mă! Noaptea-mi luminează!\nPericol departă! Mângâie ajutând, o, scump Girant!\n\n4. De calea-mi s-a sfârși, sângele-mi s-a răci,\nȘi voi muri, o, Prea Sfânt Domn ceresc,\nSă nu mă părăsești! Înalt ridică-mă în patrie!` },
            177: { title: "Doamne, darurile Tale!", text: `1. Doamne, darurile Tale sunt nenumărate!\nNu le aș putea înșira eu pe toate nicicând. \n\n2. Numai în vorba Ta mă-ncred! Dorinţa mea una,\nCă prin Christos, neîncetat, să-Ţi fac a Ta voie!\n\n3. O, dar, fă-mă capabil să îţi vestesc Numele!\nA fi mulţumitor copil, altfel nu se poate.\n\n4. Dumnezeu, Părinte milos, Tu să-mi fii cântarea!\nLegământul a-l împlini, Te rog, dă-mi mâna Ta!` },
            178: { title: "Fericirea mea", text: `1. Izvorul desfătării ești pentru mine, Doamne,\nȘi luciul zilelor mele, adăpost în noapte!\n\n2. Ceaţa cea mai groasă trece, de lumina-Ţi primesc!\nTu Luceafăr și-n răsărit, al meu Soare îmi ești!\n\n3. Larg îmi este cerul deschis, daruri multe văzând,\nÎn multele promisiuni și patria zărind.\n\n4. O, ţine-mă dar pe cale, pe urmele sfinte,\nCa să fiu martor credincios pentru al Tău Nume!` },
            179: { title: "Patria mea", text: `1. Aflai patria ce Tatăl mi-a dat,\nUnde soarele spre mine zâmbește.\n\nRefren: \nAleluia! Mulţumită! Am aflat patria,\nȘi harul Părintelui bun. În veci voi lăuda!\n\n2. Prin harul Său Eu aflai sângele\nCe s-a vărsat pentru păcat pe cruce.\n\n3. Ce plăcut este, și cum mângâie,\nA spune altora că tot drept este!\n\n4. Și noi vom vedea că acest lucru\nPe pământ toate va binecuvânta. ` },
            180: { title: "Poruncile Tale mă desfătează", text: `1. Doamne, Tu îmi permiţi mie ca eu să Îţi servesc Ţie!\nPorunca-Ţi mă-nveselește. A o urma e plăcere.\n\n2. A mea putere e mică. Nimic Ţie nu-Ţi ajută.\nNumai mila Ta este ce serviciul meu îl primește.\n\n3. Comori, renume nu-mi pasă. Dorinţa mea unică e,\nCa vestind laudele Tale, să-Ţi fiu martor, Doamne, Ţie!\n\n4. Numai Domnului meu trăiesc. Viaţa Sa m-a cumpărat.\nLumea așa favor n-are ca să fiu cu El înălţat.\n\n5. Când în curând El va fi Domn, ruinând casa lui Satan,\nȘi va vedea tot omul că orice genunchi Lui se-nchină.` },
            181: { title: "Stâncă tare", text: `1. Jertfa ce Isus a dat e temeiul speranţei mele.\nToate altele-s deșarte. Mă încred în al Său nume.\n\nRefren:\nStau pe colţ de stâncă tare.\n|: Nisip sunt altele toate. :|\n\n2. Faţa Lui, deși-i ascunsă, harul Său la mal mă duce.\nFurtuni nu m-or descuraja. În El arunc ancora mea.\n\n3. Jurământul și sângele la malul mării mă scapă.\nChiar de se nimicesc toate, va sta cel ce în El crede.` },
            182: { title: "Viaţa mea este cânt măreţ", text: `1. Viaţa mea e cânt mărit în al lumii zgomot surd.\nAud cânt dulce răsunând, al noii creaturi ce,\nPrin tot zgomotul luptelor, Îi răsună muzica.\nInima-mi sună cu ecou. Oare pot a nu cânta?\n\n2. Ruine-se plăceri lumești, trăind Mântuitorul!\nVină noaptea și durerea! Mă acoperă harul. \nEu nu am frică de vifor. El îmi dă apărarea.\nPuternic Domn e El. Dar să nu cânt și eu cântarea?\n\n3. Deasupra mea sunt norii grei, dar îmi surâde cerul.\nCă de când pe El Îl cunosc, împrăștie pericol.\nSimt Eu pârâul păcii Lui, curgând în inima mea.\nNu duc lipsă. Se poate să nu cânt și eu cântarea?` },
            183: { title: "Oriunde, cu El!", text: `1. Ce simţ fericit e, Doamne! Ducă-mă calea oriunde!\nÎn tot locul Tu prezent ești, în cer, pe pământ și-n mare!\n\n2. De ar alege inima, liniște nicicând n-ar afla.\nCu El orice loc ni-e casă, că harul Său ni-e patrie.\n\n3. Nu mai întreb când și unde, ci după cum El rânduie.\nTe servesc pe Tine, Doamne, că-n tot locul ești cu mine!\n\n4. Că îngrozitor ar fi de ceva de Tin’ m-ar despărţi.\nNu e teren și nici stare unde puterea Ta n-ar fi.` },
            184: { title: "Veghere", text: `1. Suflete, fii erou când păcat te-atacă!\nVrășmașii tăi sunt foarte tari, și-ţi răpesc răsplata.\n\n2. Veghează! Roagă-te! Lupta ta mai ţine.\nTreci fără teamă prin necaz, și cere ‘nvingere!\n\n3. Multă luptă mai ai. Nu-i timp de odihnă.\nPână nu primești coroana, deci, jos să nu te lași!` },
            185: { title: "Luptă cu curaj!", text: `1. Nu-ţi teme viaţa, ci spre cer privește!\nDragonul furios peste tin’ putere n-are.\n\n2. Rugând, veghează, și luptă făr’ de frică!\nLupta îţi ţine până ce noaptea va dispare.\n\n3. De vei sta cu curaj, lupta mult n-a ţine.\nDeși e tare dușmanul, sabia-l va tăia. \n\n4. Lupta-i a Domnului. Regele-o conduce,\nCu tin’ împărţind domnia, de lucru-ţi vei face.` },
            186: { title: "Laudă pe Dumnezeu!", text: `1. Inima-mi pe Domnul laudă cu zel și cu umilinţă.\nÎntrunește-ţi puterile să-L mărești cum El merită!\n\n2. Arată-I faptele Lui, că te-a condus în siguranţă!\nCând îndoieli te-au apăsat, ca bun Tată te-a îngrijit.\n\n3. Mi-a dat mie, El, ca să gust, că milos El mă iubește.\nȘi când harul l-am cerut eu, pacea Lui mi-a dat-o mie.` },
            187: { title: "În mâna lui Dumnezeu", text: `1. “Zilele-n mâna Ta” totdeauna, Doamne!\nTimpul și a mea putere, Doamne, condu-mi-le!\n\n2. “Zilele-n mâna Ta” în rău și în bine!\nDoamne, Tu le permiţi toate, și îmi sunt spre bine.\n\n3. “Zilele-n mâna Ta”! Nu m-a strica frica.\nCa Tată bun, rău nu permiţi, ce n-ar fi de lipsă.` },
            188: { title: "Mai aproape de Tine!", text: `1. Mai aproape, Doamne, către Tine!\nChiar de sarcina mai grea să-mi fie,\nDorul tot mă mână aproape de Tine.\nMai aproape, Doamne, către Tine!\n\n2. Ca pribeag să-mi petrec viaţa mea,\nȘi pe piatră să-mi plec capul noaptea,\nInima-mi dorește de Tin’ mai aproape.\nMai aproape, Doamne, către Tine!\n\n3. Cuvântu-Ţi cărarea-mi luminează,\nPe care credincios, Tu condu-mă!\nȘi merg mai departe, Doamne, tot cu Tine!\nMai aproape, Doamne, către Tine! \n\n4. Cum dorește cerbul râul curat,\nAșa doresc și eu să-Ţi văd faţa.\nȘi mai mult mă-ndeamnă către Tine, Doamne!\nMai aproape, Doamne, către Tine!` },
            189: { title: "Sânge scump", text: `1. Al juncilor sânge, pe altare vărsat,\nN-a putut rasa căzută s-o scape din păcat.\n\n2. Mielul din cer venit, murind pentru păcat,\nJertfa Lui e mai activă, sângele-I mai bogat.\n\n3. La acest scump preţ eu privesc cu credinţă,\nCe pentru noi, cei păcătoși, El, Isus câștigă.` },
            190: { title: "Viaţa noastră", text: `1. Nu trăim pentru corp, nici pentru-al nostru scop.\nÎmpărăţia ne va fi al nostru unic scop.\n\n2. Am servit noi cândva a’ corpului pofte.\nCalea lor ne-a cauzat însă pagube grozave.\n\n3. Lumea de astăzi e o deșertăciune.\nDorinţa corpului e tot numai o mândrie.\n\n4. Lumea rea și corpul nu ne mai înșală,\nCă ce dorim din inimă e o lume bună.\n\n5. Când cu Christos, și noi, împreună vom fi,\nPrimind mărirea, și în veci noi vom putea trăi.` },
            191: { title: "Privește spre cer!", text: `1. Inima-mi, spre cer uită-te! Comori lumești nu te-nșele!\nO, vezi locul măreţ care pe tine te-mbărbătează!\n\n2. Plăceri lumești nu te lege! Ce folos? Sunt trecătoare.\nSă te predai lui Dumnezeu, că numai El dă bucurii!\n\n3. Deși e ‘ngustă calea ce în starea cerească duce,\nTe conduce să-I vezi faţa, unde e plăcere a sta. \n\n4. Prinde dar ocaziile ce harul Său îţi dă ţie!\nServește-L pe calea ‘ngustă! El bogat te răsplătește.` },
            192: { title: "Meritul lui Christos", text: `1. De am vesti îndeajuns al Salvatorului merit,\nMăreţ cum străluce! Așa cânt măreţ să fie,\nCare-n cer, pământ răsune într-o armonie, într-o armonie!\n\n2. Muzica cerului sune, în scop cum a condus toate\nCe El a hotărât! Și pe pământ fericit să\nLaude harul Său mare! Mâna-I ce mântuie! Mâna-I ce mântuie!\n\n3. Orice creatură vadă că în El har și mărire, \nCum se întrunește! Cânt de mulţumiri să-I sune!\nEl puternic, dar și bun e. Laudă pe vecie! Laudă pe vecie!\n\n4. Sus, dar, la cânt! El a sosit și ne așteaptă-n mărire\nDe-acum înainte. Vestească tot credinciosul\nCă în Sion El tronează! Al Lui e pământul. Al Lui e pământul.` },
            193: { title: "Dăruire", text: `1. O, de-aș putea mai mult vesti, lauda Ta, Doamne,\nȘi să fiu ca un far unde Mielul mă conduce!\n\n2. Tot ce am mai scump și mai drag îl pun ‘naintea Ta!\nToată plăcerea îmi este, o, Doamne, a-Ţi urma!\n\n3. De suferinţe m-așteaptă, haru-Ţi mă conducă!\nFaptele mele Ţie să-Ţi aducă laudă!` },
            194: { title: "Credinţa biruitoare", text: `1. Fie credinţa mea tare! Și ‘ncercat de vrăjmaș,\nNu tremur eu în pericol, și nici într-un necaz.\n\n2. Și chiar biciuit de soartă, nu plâng niciodată.\nDomnul îmi este sprijinul, cel ce toate ‘ndreaptă. \n\n3. Să-mi strălucească credinţa când urlă viforul!\nSă nu cunoască negura a îndoielilor!\n\n4. Suporte-a lumii mânie și batjocura ei!\nSă n-o clătească ispita, nici furtuna mării!\n\n5. Să umblu până la sfârșit a credinţei cale,\nCare și pe patul morţii revarsă razele!\n\n6. Așa credinţă dă-mi, Doamne, la toate probele!\nCredinţă tare este, dar, liniște prin Tine!` },
            195: { title: "Dă-mi, Doamne, inimă dreaptă!", text: `1. Dă-mi, Doamne, inimă dreaptă, ce a Ta să fie!\nDe făţărie scutită, cuvântu-Ţi domneasc-o!\n\n2. Inimă blândă, umilă, ce se-apleacă Ţie,\nÎn care-al lui Christos spirit tot locul îl umple!\n\n3. O inimă credincioasă dă-mi mie, o, Doamne,\nCa să n-o poată despărţi a răului puteri!\n\n4. Dă-mi, Doamne, minte curată, și inimă nouă,\nCa să poată așa iubi cum Tu iubești, Doamne!` },
            196: { title: "Înainte!", text: `1. De groază te-nspăimântă, creștin zelos, ‘nainte!\nStai în faţa Lui luptând! |: Din cer primești nutremânt. :|\n\n2. Treci ‘nainte! Fii erou în faţa dușmanilor!\nDe ei de ce ai fugi? |: Christos ‘naintea-ţi, tu știi. :|\n\n3. Îmbracă-ţi, dar, arma ta, și fii vesel în toate!\nLupta-ţi nu va ţine mult. |: Dar zi cânt de ‘nvingere! :|\n\n4. Rezistă, dar, curajos! Cinstea ta sigură e.\nDeși e crud dușmanul, |: creștin zelos, ‘nainte! :|` },
            197: { title: "Nădejde măreaţă", text: `1. O, dragoste cerească ce cugetul în zbor răpește,\nPurtând ca un vultur! Mintea mea înalt tresaltă, \nDe unde văd eu aproape |: al cerului Canaan. :|\n\n2. De pe munte eu jos privind, cu ochii credinţei văzând\nVârsta glorioasă, când pustiul Eden va fi,\nȘi omul n-a mai rătăci, |: daruri el va primi. :|\n\n3. De aș fi deja acolo, unde mă cuget zi, noapte,\nÎn a mea patrie, să fiu cu Domnu-mpreună\nÎn al păcii locaș, unde |: repaus Dumnezeu dă! :|` },
            198: { title: "Tăria noastră", text: `1. Tu, car’ oricând ne-ai ajutat, ești speranţa noastră!\nOcrotirea Ta e cu noi, cetate în vifor.\n\n2. Sub a mâinii Tale umbră aflăm noi speranţă.\nChristos, în care ne-ai primit, ne e temelie.\n\n3. Când nici munţi încă nu erau, și pământul format,\nTu ai fost veșnic Dumnezeu, și vei fi perpetuu!\n\n4. Calea Ta e bună, dreaptă, deși nu-nţelegem,\nȘi chiar prin ceaţă de trece, în lumină duce.` },
            199: { title: "Cântec de laudă", text: `1. O, Doamne, tăria noastră, mulţumiri Ţi-aducem!\nŢie ne închinăm și cu gura Te lăudăm!\n\n2. Ne-ai primit ruga când eram noi în strâmtorare.\nNu ai permis Tu la cel rău crud să ne atace.\n\n3. Tu, Doamne bun, împlinești tot ce ne-ai promis nouă!\nAscultând al Tău sfânt cuvânt, facem a Ta voie.\n\n4. Lumina și harul Tău sfânt, neîncetat, dă-ne,\nCalea Ta să n-o părăsim prin idolatrie!\n\n5. O, Doamne, pe poporul Tău Tu condu-l credincios!\nDă-ne harul Tău cel bogat, ce ni-e mai preţios!` },
            200: { title: "Dumnezeul nostru", text: `1. Tu, Stâncă a vârstelor, Dumnezeu puternic,\nÎn orice pericole, locaș ne ești nouă!\nÎnainte de orice Tu erai, o, Doamne!\nVei fi Dumnezeu pe veci! Tu nu ai margine!\n\n2. Tu nu adormi! Lumina-Ţi nicicând nu slăbește!\nA ne număra anii Tu, pe noi, ne-nvaţă!\nCuvântu-Ţi ne nutrește și mila Ta-i cu noi.\nFericit e pe cine Tu-l binecuvântezi!\n\n3. Ne-mpodobească lucrul a Ta frumuseţe!\nHaru-Ţi bogat revarsă, pân’ la Tine-ajungem!\nCând faţa Ta vom vedea, dorinţa ni-e plină,\nPrin desfătări veșnice, noi vom fi cu Tine!` },
            201: { title: "Cu Domnul", text: `1. Fericit cel ce cunoaște scutul lui Iehova!\nTrăind din al Său Sfânt Cuvânt, El îl va apăra.\n\n2. Tronul de har este deschis pentru el orișicând.\nCererile îi ascultă. Milos îl ajută.\n\n3. Pe sfinţii Săi, care-au crezut, El i-a purtat mereu.\nȘi bunătatea Lui mare noi o simţim din nou.\n\n4. Gândurile ne-ndulcește, sarcina ușurând.\nCeaţa nopţii împrăștie prin al Său Sfânt cuvânt.\n\n5. De suferinţe ne-așteaptă, noi nu ne întristăm.\nUșoare vor fi, numai de Tine-aproape să stăm!` },
            202: { title: "Psalmii 145", text: `1. Doamne, Regele meu ceresc, numele-Ţi mare eu vestesc!\nZilnic te binecuvântez! Laudă veșnică Îţi cânt!\n\n2. Că El e Dumnezeu mare, și merită înălţare.\nPuterea Lui margini n-are. Mai Prea Înalt nimeni nu e.\n\n3. Din neam în neam se vorbește lucrurile ce le face.\nHarul Tău ne face bine! Mântuirea-i de la Tine!\n\n4. Da, Doamne! Eu mărturisesc despre Tine și Te măresc,\nCa pe acest pământ orice făptură să Te laude!` },
            203: { title: "O, dă-ne harul Tău promis!", text: `1. Doamne, dă-mi mila promisă, inima mea să o umple!\nToată pofta să îmi fie să-Ţi împlinesc poruncile.\n\n2. Fie-ţi veselă inima, până ‘n al Tău lucru lucrez,\nCa să-Ţi fiu eu plăcut Ţie, ca un fiu care Te-ascultă!\n\n3. Ochiul Tău toate le vede. Toată lumea o cuprinde.\nCu min’ orice să se-ntâmple, Tu ‘n tot locul ești cu mine.\n\n4. Să urăsc a lumii lucruri! Sub aripa-Ţi să m-acoperi!\nPofta inimii să-mi fie să Te văd eu pe vecie!` },
            204: { title: "Tu ești aproape!", text: `1. Iubire de sus venită, tu ne alungi durerile.\nTu ne preiei sarcinile. Nu e greu când ești aproape.\n\n2. De ni-e drumul obositor, și greutăţi întâmpinăm,\nNu ne-nfrică nici-o groază. Simţim că Tu ești aproape.\n\n3. Când bucuria ne scade, sau dureros ne înșelăm,\nPrimim din nou mângâiere, că și atunci ești aproape.\n\n4. Purtând Tu necazurile, harul Tău ne ‘mbrăţișează.\nTrăind, murind avem pace, că-n tot timpul ești aproape.` },
            205: { title: "Prietenul păcătoșilor", text: `1. Un prieten e singur care acest nume merită.\nDecât fraţii mai credincios El pe noi ne iubește.\n\n2. Să ne răscumpere, care prieten și-ar da sângele?\nIsus Christos jertfă S-a dat, ca să avem viaţă.\n\n3. Prietenul păcătoșilor L-au numit pe El, hulind.\nDar îl poartă El bucuros, deși grad înalt are.` },
            206: { title: "Lucrarea viitoare a bisericii", text: `1. Doamne, lumina-Ţi dă-ne! Și poporu-Ţi mărește!\nPe el lumina-Ţi fie, ce în Sion străluce!\nȘi naţiuni, popoare, cale sigură s-afle!\n\n2. Pământul, prin casa Ta, va fi binecuvântat.\nPace, viaţă va fi. Pe Tin’ toţi te vor mări!\nLa tronul Tău va suna cântec de Aleluia!` },
            207: { title: "Așteaptă! Așteaptă!", text: `1. Așteaptă! Așteaptă, până se vor vedea zorile!\nPână ce negura nopţii de pe pământ dispare.\nPână umbrele vor trece, și a soarelui raze,\nPunând capăt la negură, libertate revarsă.\n\n2. Așteaptă! Până răsare al dreptăţii soare, ce\nA neștiinţei negură, cu totul va risipi.\nPân’ cu glorie măreaţă mia de ani va intra,\nLegând pe răi și aducând raze vindecătoare.\n\n3. Așteaptă reașezarea ce Cuvântul ne-a promis,\nCând cu toţii vor fi siliţi la Domnul a se-ntoarce!\nCând rău n-a fi, și se cere unul pe-altul a iubi.\nÎn Christos contopindu-se, dreptul fericit va fi.` },
            208: { title: "Preţul curăţitor", text: `1. Acum văd eu marele preţ pe car’ Christos l-a dat.\nVărsând sângele pentru noi, iertare-a câștigat.\n\nRefren:\nVăd preţul curăţitor ce, prin credinţă, curăţește.\nAl Lui sânge m-a curăţit. Laudă Lui I se cuvine!\n\n2. Văd o nouă creatură din acest preţ venind,\nPrin acest sânge spălată, spre nouă viaţă.\n\n3. Vin iarăși ei la lumină, ca din păcat scăpaţi,\nCu Christos îmbrăcând ei, să fie nevinovaţi.\n\n4. Harul acest’ miraculos, ce constă în sânge,\nTatăl ne-a dat, ca Fiul Său să ne răscumpere.` },
            209: { title: "Marea izbăvire", text: `1. Pe vârf de munte apare purtător de vești bune.\nVeste bună pentru Sion: Sioane, bucură-te!\nDumnezeu vine la tine de doliu să te scape!\n\n2. Ai avut o noapte lungă? Toţi prietenii te-au lăsat?\nVrăjmașii tăi sunt îngâmfaţi? De lacrimi nu ţi-a păsat?\nSfârșească-se acum doliul! Nădejde ai căpătat!\n\n3. Dumnezeu te va înălţa. El îţi întinde mâna.\nVrăjmașii s-or da în lături, și-n contră nu-ţi vor mai sta.\nAl tău mare Crai din ceruri îţi trimite scăpare.\n\n4. Pace, bucurii te-așteaptă. Lupta este pe sfârșit.\nEl îţi va fi apărător, El care te-a mântuit.\nDe toate necazurile vei fi de-acum scutit.` },
            210: { title: "Psalmii 149", text: `1. Laudă pe Domnul între popoare! Fă-L cunoscut prin noua cântare!\nDe al Său Domn, Israel bucure-se Sion! Fii vesel! Regele-i de faţă!\n\n2. Fă de cunoscut măreţu-I nume! Înalţă-L cu harfe și-alăute!\nCând ai săi sunt veseli, Domnului place. Credinciosului Domnul dă mărire.\n\n3. Acum sfântul în scut bucure-se! Pe Domnul mărind, nu se clatine!\nAstfel, între popor răzbunări face. Pentru El, unealt’ a fi, e mărire.` },
            211: { title: "Laudă iubirea Domnului!", text: `1. Laudă iubirea Domnului, ce spre tin’ măreţ străluce!\nMila Lui nu scade nicicând. Arată-n șir vârste multe.\n\n2. E slabă a mea cântare a-nșira faptele Tale!\nToate vorbele-s puţine, de mărirea Lui nedemne.\n\n3. O, întinde haru-Ţi mare, ce Fiul Tău uns îl are!\nȘi când vii omul a-l salva, lasă să fiu de-a dreapta Ta!\n\n4. Fă-mă vrednic și pe mine, cu ai Tăi să am eu parte,\nCa să văd eu biruinţa, și strălucind domnia Ta!` },
            212: { title: "Adăpost în “Stâncă”", text: `1. Umbra e neagră când și când, și drumul duce repeziș.\nȘi-n suflet, ce-i plin de gând, viforul bate vâjâind.\n\nRefren:\n|: Atunci, mie – numai stânca – adăpost stânca-mi fie, numai! :|\n\n2. Ziua e lungă când și când. Piciorul nu poate de chin.\nDar am nădejde nouă-n drum, chemându-mă, stânca văzând.\n\n3. O, fie, Doamne, ‘n bine, ‘n rău stânca aproape de mine!\nDucă-mă calea peste munţi! Ducă-mă prin văi senine!` },
            213: { title: "Chemarea noastră", text: `1. Doamne, mare câștigător al mântuirii noastre,\nLa așa stare ne-ai chemat, la care noi n-am meritat!\n|: Să ‘mplinim credincioși, putere dă-ne! :|\n\n2. În ale Domnului urme dorim aici a merge.\nUra lumii pe noi, de El, ne-aduce mai aproape.\n|: El e stânca, izbucnind apă vie! :|\n\n3. Precum și El a făptuit, despre harul Său vorbim,\nCă pe păcătoși îi scapă de moarte și din mormânt.\n|: Fapta-i mare, ce har reoglindește! :|\n\n4. Când despre scopu-Ţi măreţ s-a pus bună mărturie,\nAduni pe poporul Tău ca a Mielului soţie.\n|: Bucurie e a vedea faţa Ta! :|\n\n5. Atunci cu El împărăţim, ‘liberând popoarele.\nDe se-ntoarce păcătosul, la viaţă ajunge.\n|: Toată limba Ţie-ţi cântă laude! :|` },
            214: { title: "Îngrijirea lui Iehova", text: `1. O, spune-mi iubitul meu, în care eu\nÎn tot timpul mă desfătez!\nZiua, noaptea cânt și mângâiere-mi ești!\nEu chiar numai în Tine sper!\n\n2. Unde-Ţi oprești turma, în timp de amiaz’,\nPe câmpii bogate păscând?\nPe munţi și-n văi, în deșert nu mă lăsa,\nȘi nici în pustii rătăcind!\n\n3. Știu că singur nu mă vei lăsa, și că\nNu flămânzesc car’ ai Tăi sunt.\nNu descoperi al Tău curat, sfânt cuvânt,\nMasă bogată întinzând?` },
            215: { title: "Locul de închinare", text: `1. Pe car’ cântăreţi din vechimi prin instrumente-L lăudau,\nCântece regești despre El profeţii din suflet cântau.\n\n2. Nu numa-n muntele Sion putem acum a ne-nchina,\nNici la fântâna lui Iacob, unde Fiul Tău odihnea.\n\n3. Sub cer, în orice loc, ruga zeloșilor se înalţă\nLa Tine, o, Doamne, unde o primești cu mare milă!\n\n4. Precum profeţii declară, prin preziceri inspirate,\nOrice suflet, în tot locul, Te laudă și se-nchină.` },
            216: { title: "Mângâierea noastră", text: `1. Făr’ de Tine, mângâietor, viaţa-i chin, moarte,\nDe n-ar afla a noastre răni ale Tale-ndurări!\n\n2. Tu vindeci inimi zdrobite ca ramura frântă,\nDin care miros plăcut și dulce, scump se scurge.\n\n3. Această viaţă noi nu am putea suporta,\nDe braţul Tău, prin mari furtuni, nu ne-ar încuraja.\n\n4. În jale vedem lumină, ca steaua în noapte,\nCare nicicând nu s-ar vedea, de ar fi tot soare.` },
            217: { title: "Salvare", text: `1. Tu, Car’ lucru-Ţi sfârșești bine, întinzi mâna-Ţi răsplătitor,\nCa să mături egoismul, care-Ţi ascunde Cuvântul!\nPrecum Israel a văzut lucrurile-Ţi minunate,\nPuterea Ta mare și-acum o vor vedea popoarele.\n\n2. Nu ai permis ca Faraon să se lupte cu rezultat.\nPrigonind pe poporul Tău, în apa mării s-a-nnecat.\nTu și acum Te vei scula, aducându-ne scăparea.\nApăsarea e groaznică, altul nimeni nu ajută.\n\n3. Iat’ a sosit timpul mare, când Iehova ‘nfăptuiește!\nÎncepând eliberarea, la ai Săi așa ordonă:\nLa popor un drum pregătiţi, și cale sigură croiţi,\nCa să iasă ei din Egipt! Pentru ei steag să fâlfâiţi!` },
            218: { title: "Iată Mirele!", text: `1. Candelele noastre ard, și haina ni-e albă.\nAșteptăm pe Mirele care vine-acasă.\nȘtim că noi nu suntem demni, trebuie să spunem.\nUlei, haine și candele, tot de la El le-avem.\n\nRefren:\nDe faţă e Mirele! Și toţi cu El intră.\nCăror’ arde candela, și haina e albă.\n\n2. În curând Îl vom vedea pe El în mărire.\nPrezenţa Lui străluce înaintea noastră.\nChemarea Lui auzind, ridicăm lămpile.\nUrmând, și cu gura cântând cânt de bucurie.\n\n3. A nunţii ușă pentru noi este deschisă.\nCar’ intră poate trăi-n veci în fericire.\nÎn curând se va-nchide. Dar noi să ne grăbim!\nCar’ n-au fost zeloși și ‘nţelepţi, toţi afară rămân.` },
            219: { title: "Ruga noastră", text: `1. Al nost’ prieten, bun Părinte, rugăciunea ascultă-ne!\nSemnul închinării noastre ca miros plăcut se ‘nalţă.\n\n2. Bun Păstor, ieși înainte! Unde Te duci, noi vom merge!\nÎnvăţând numele Tău sfânt, credinţa ne-o întărește!\n\n3. Dă, Doamne, la Sion pace! Dă-ne iubire în inimi!\nMărește-a Ta bunătate, cu-al Tău cuvânt de daruri plin!\n\n4. Ajută lucrul să ‘mplinim, ca Ţie noi plăcuţi să-Ţi fim,\nSă fim sfinţi noi într-adevăr, să urmăm lui Christos cu zel!\n\n5. Ca să putem, prin harul Tău, a sta tot înaintea Ta,\nȘi aici trecând noi toate, în cer să aflăm patria.` },
            220: { title: "Mângâiere în necaz", text: `1. La Tine strig eu, din al durerii adânc,\nDeși ceaţă mă ‘mpresoară, de Tine-aproape sunt.\n\n2. Privește-mi necazul! Ascultă-mi plângerea!\nPe cel trist înveselește-l, și pe slabi mângâie-i!\n\n3. Doamne, ‘liberarea aștept de la Tine!\nLumina mângâietoare, iată, se zărește!\n\n4. Ţie mulţumită! Inundarea scade.\nPorumbelul va aduce a păcii ramură.\n\n5. De ne ameninţă pe noi încă nori grei,\nDespre al Tău sfânt legământ arcu-Ţi ne-asigură.` },
            221: { title: "Umblând cu Domnul", text: `1. Umblând cu Domnul vei ști că repaus ceresc îţi dă,\nNetezindu-Ţi calea până va fi zi deplină.\nBucuria Lui ca roua te împrospătează.\nHarul Său se tot ‘nnoiește. Nicicând nu va trece.\n\n2. Umblând cu Domnul vei ști că locaș aici nu ai.\nPribeag ești tu pe pământ, și patrie în cer ai.\nPribeag ești până vei trece prin negura morţii.\nÎn Sion ai casă pe veci. Cu Christos vei trăi.\n\n3. Umblând cu Domnul vei ști că în lumină umbli,\nȘi îţi vei ajunge scopul, ce-i sigur, curat, sfânt.\nUmblând cu Domnul vei ști că ce frumoasă-i calea.\nUmblând pe ea cu credinţă, bucurii vei avea.` },
            222: { title: "Fii liniștită, inimă!", text: `1. Fii liniștită, inimă! Speră-n Dumnezeu și crede!\nAproape-i. El dă liniște. Ascultă-L! Lui încrede-te!\n\n2. Cer și pământ prin El este. El scăpare îţi trimite.\nCrezând, roagă-L! Că, prin Isus, îţi va da tot ce a promis.\n\n3. Deschide-ţi dar inima ta, și vei primi mângâiere!\nHarul Său în dar revarsă. Îţi dă fericita pace.\n\n4. În pericol fii liniștit! Necazul nu-ţi face nimic.\nToate vor fi spre-al tău bine. Din rău bine izbucnește.` },
            223: { title: "Lauda", text: `1. Pe pământ toată făptura pe Dumnezeu să-L laude!\nAdorând pe Fiul Său Sfânt, să-L servească cu temere!` },
            224: { title: "Psalmii 113", text: `1. Lăudaţi-L voi, servii Lui! Numele Domnului,\nDe acum și până în veci, |: vestiţi în tot locul! :|\n\n2. De la răsărit la apus, pe El să-L mărească,\nCă Și-a înălţat Numele |: mai presus de toate! :|\n\n3. E mai ‘nalt decât orice cer. Cel mai măreţ e El.\nAici jos pe pământ, totuși, |: cu milă privește. :|\n\n4. Pe săraci din noroi scapă, să fie preoţi, regi.\nN-a lăsa El văduvă pe |: a Sa biserică. :|` },
            225: { title: "Laudă, suflete, pe Împăratul cerului!", text: `1. Laudă, suflete al meu, Împăratul cerului!\nMântuindu-te și teafăr, cântă preamărirea Lui!\nAleluia! Aleluia! Cântă preamărirea Lui!\n\n2. Laudă-L pentru mila Sa, prin car’ lucrează în noi,\nCel ce-i târziu la pedeapsă, și-i iute la ajutor!\nAleluia! Aleluia! El e măreţ, credincios.\n\n3. Ni-e Părinte bun, cunoaște slăbiciunile noastre.\nGentil pe braţ ne poartă, și dușmani împrăștie.\nAleluia! Aleluia! Lucrează ‘nţelepţește.` },
            226: { title: "Lăudaţi-L pe El!", text: `1. Toţi, car’ în curtea Lui sunt, laude pe Domnul sfânt,\nPână ceata cerească cânt’ a Sa bunătate!\n\n2. Cer și pământ laude mărirea Sa, ce umple\nTimp, teren nemărginit! Lăudaţi pe El oricând!\n\n3. Pe Domnul să-L lăudaţi! Că pe Fiul Său ne-a dat,\nArătând mare milă, din cer coborându-se.\n\n4. Inimă, mâini și buze a-L lăuda fiţi gata!\nPe cel ce dă viaţă, tot sufletul să-L laude!` },
            227: { title: "Lăudaţi pe Dumnezeul nostru", text: `1. Pe-al nostru Dumnezeu lăudaţi! În cer, toţi îngerii sfinţi,\nLună, soare și voi stele, mărirea Lui amintiţi!\n\n2. Lăudaţi-L! Cuvântul Lui a făcut cer și pământ,\nȘi la tot ce există El lege dreaptă rânduind!\n\n3. Lăudaţi-L că stă la cuvânt, ce a promis împlinind,\nSă zdrobească lanţurile, pentru ai Săi făptuind!\n\n4. Să-L lăudaţi ca Mântuitor! El e al nost’ Salvator.\nCer și pământ pe deplin să răsune Lui laudă!` },
            228: { title: "Dreptate cerească", text: `1. Pe El, prin care părtașii dreptăţii am devenit,\nVeniţi ca să Îl lăudăm, |: ca să fie preamărit! :|\n\n2. Tezaur scump e dreptatea. O, învaţă-mă, Doamne!\nFără de Tine nu avem, |: noi, nici o bucurie. :|\n\n3. Cât am cunoscut noi din ea, așează-ne-o în inimi!\nȘi-n ziua domniei Tale, |: între ai Tăi las’ să fim! :|` },
            229: { title: "Psalmii 69", text: `1. În Sion primești laudă! Numai acolo-Ţi se-nchină!\nRugă dreaptă oricine de-acolo Îţi spune!\nFericit pe cine-l alegi ca membru în Christos!\nLui, în Templul Tău glorios, Îi vei da veșnic loc.\n\n2. Tu poţi să-ntărești munţii, și cuvântu-Ţi mări alină.\nPământul dă roadă, că Tu-l binecuvântezi.\nCu bunătăţi umple anul, și omul Te laudă,\nTu l-ai readus din mormânt, păcat, moarte călcând.` },
            230: { title: "Lauda lui Dumnezeu", text: `1. Toţi sfinţii ‘n jurul Său, laude pe Dumnezeu!\nIubirea Sa peste ceruri ‘nalţe!\nE Domnul Prea Înalt. A Sa bunătate mult se vede.\n\n2. Harfe și timpane în muzică sune\nCântec ceresc! Lauda lui Iehova \nS-o audă lumea! Ridică-ţi sus glasul pentru Domnul!\n\n3. În acest timp frumos servește credincios\nCauza sfântă! A dreptăţii raze \nFă ca să străbată! Vei primii răsplată glorioasă.` },
            231: { title: "Lăudaţi pe Dumnezeu!", text: `1. Să lăudăm pe Dumnezeu, că laudă merită!\nEste un lucru mult plăcut a-I cânta cântece.\n\n2. Că a rezidit Sionul, cetatea cea sfântă,\nLa cei exilaţi ai Săi din nou dând patrie.\n\n3. Inimi zdrobite vindecă și leagă rănile,\nPrea înţelept, El cunoscând chiar toate stelele.\n\n4. Sus ridică pe cel smerit, aruncând pe cel rău.\nSă-L lăudăm din inimă, pe sfântul Dumnezeu!` },
            232: { title: "Să ne rugăm neîncetat", text: `1. Să ne rugăm ne’ncetat, că daruri de sus ne aduce!\nOrice soartă ne-ar ajunge – bună, rea – să trăim prin ea.\n\n2. De te-apasă gânduri grele, sau vei avea suferinţe,\nDacă te-atinge crucea grea, spune ruga ta fierbinte!\n\n3. Deși suntem slabi în minte, în putere și cuvinte,\nAceea ne-mprospătează ce prin Isus putem zice.\n\n4. Crede în El și nu dai greș! Cere numai ce și El vrea!\nAșa lupta nu-ţi va fi grea. De ajutor nu duci lipsă.` },
            233: { title: "Clipă fericită", text: `1. Fericită clipă ce pot avea la al milei tron,\nUnde, mijlocind ruga mea, stă prietenul cel mai bun.\nBunătatea Ta, acolo, deplin o aflu, Doamne!\nAcolo mă-mpărtășești din însoţirea-Ţi promisă.\n\n2. Dincolo sună chemarea. Vino, obositule!\nCalcă-Mi urma și vei primi pace și mângâiere!\nIa crucea și jugul meu, că nu va fi greu! Vino, dar!\nLasă gânduri pământene! Vei primi pace dulce.\n\n3. Fii mărit pentru harul Tău, prin ce așa loc ne-ai dat!\nDe la Tine cu ‘ndrăzneală poate merge făptura.\nTu nu ne respingi cererea. Nu-Ţi suntem spre sarcină.\nÎn bucurii și tristeţe ne asculţi cu plăcere.` },
            234: { title: "Cu ochii Mei te sfătuiesc!", text: `1. Toţi car’ doresc, să vină, dar, în cer comori a strânge!\n“Cu ochii Mei Eu te conduc”! Astfel El ne promite.\n\nRefren:\n“Cu ochii Mei te sfătuiesc!” Eu, pe tine, te ‘ndrumez,\nArătându-ţi calea-n care să umbli îţi trebuie!\n\n2. De ispite te ‘mpresoară, neavând tu ajutor, \n“Cu ochii Mei Eu te conduc!” Zice Dumnezeul tău.\n\n3. De sperenţele-ţi frumoase anii mulţi le-nmormântă,\n“Cu ochii Mei te sfătuiesc!” Dumnezeu te îndeamnă.\n\n4. Când comoara cerească vei putea pe veci a primi, \nCă Dumnezeu te-a sfătuit, cu ochii tăi vei privi.` },
            235: { title: "Rege mare al păcii", text: `1. Rege mare al păcii, dă să am repausul Tău!\nÎntinde-mi a Ta pace ce e numai la Tine!\n\n2. Tu-mi ești în cer avocat. Apără-mă de păcat!\nM-a scăpat sângele Tău să servesc lui Dumnezeu.\n\n3. Fie numai ce Tu vrei, toată a mea dorinţă!\nSpală-mi inima, curat să fiu, de Tine legat!\n\n4. La picioru-Ţi mă prostern. Nu-i în alt loc speranţă.\nLas’ ca să fiu pe veci, eu, servul fericit al Tău!` },
            236: { title: "Să servim cu toţii veseli!", text: `1. Să servim cu toţii veseli! Cântec umple inima!\nPe Dumnezeu să Îl lăudăm! Mulţumire să-I cântăm!\nVestea bunătăţii, lăudând, să răspândim!\nMilos Dumnezeu e. El face scăpare.\nToţi Lui să se închine!\n\n2. Chemându-L pe El în lipsuri, ne ascultă cererea.\nNumai în El să ne ‘ncredem! Iubirea Sa ne va ţine.\nLui să-I dăm mulţumiri, vestind numele Său!\nSionul să sune cântec de-nvingere!\nToţi Lui să se închine!` },
            237: { title: "Fii fericit și bucură-te!", text: `1. Fii fericit că Domnul e de faţă!\nRecunoaște leagănul și crucea Lui!\n\nRefren:\nSpune cum a murit pentru scăparea noastră!\nZi vesel: El e viu și ne binecuvântă!\n\n2. Fii fericit că ne-a adus iertarea!\nLucrul jertfirii e deja și gata.\n\n3. Fii fericit că a biruit moartea!\nMielul jertfei din moarte a înviat.\n\n4. Fii fericit că Christos e de faţă,\nVenind El ca Rege al popoarelor!\n\n5. Fii fericit! El va binecuvânta,\nPeste dușmani secerând biruinţă.` },
            238: { title: "Bucură-te! Domnul este Rege!", text: `1. Domnul e Regele! Dar Lui supune-te!\nZi vesel cântarea despre învingere!\n\nRefren:\nCredincioși, bucuraţi-vă! Iar vă zic: Bucuraţi-vă!\n\n2. Isus este Rege – al păcii, iubirii!\nAl Lui e tron’ pe drept, în cer și pe pământ.\n\n3. Domnul, puterea Lui, și-a luat la mână.\nS-a sculat a domni. Mai mult nu așteaptă.\n\n4. Stă-n dreapta Tatălui, făcând ce-I ordonă,\nPână toţi dușmanii sub picioare-I pune.` },
            239: { title: "Mai spune-mi!", text: `1. Mai spune-mi despre harul ce Dumnezeu întinde!\nDoresc din nou a auzi ce-a făcut cu mine.\n\nRefren:\n|: N-ai spus jumătate! :|\nDin mila dumnezeiască, n-ai spus jumătate!\n\n2. Pace-am auzit-o numai, în mine neavând-o,\nPână mi-a-ncălzit inima îngerul ceresc, blând.\n\n3. N-am eu loc altunde’ decât l-a’ Tale picioare,\nȘi nici bucurie decât a-Ţi servi, o, Doamne!\n\n4. Voi avea mare plăcere când, cu cete cerești, \nPe veci voi putea vesti, eu, iubirea Ta mare!` },
            240: { title: "Liniștește-te! Zorile se arată.", text: `1. Odihnească mâna! Faţa ‘nsenineze!\nSă stea piciorul rănit, și lupta să încete!\n\n2. Odihnească cre’rii! Ochii se bucure!\nȘi căinţa de pe buze treacă pe vecie!\n\n3. Să nu fii disperat! Isus e de faţă.\nS-ai trezire zâmbitoare, plin’ de bucurie!\n\n4. Dintre nori mulţi de praf sună cântec vioi.\nDupă o iarnă crâncenă vor fi mai multe flori.\n\n5. Cei ce plângeţi, speraţi! Vedeţi raza de zori,\nCum ne salută ea zâmbind din vârful munţilor?` },
            241: { title: "Eroul lui Christos", text: `1. Eroul lui Christos, sus! Încinge-ţi arma!\nPrin a Domnului putere vei birui-n luptă!\n\n2. Puternic Dumnezeu El e. Încrede-te!\nA biruinţei mărire ţie-ţi va aduce.\n\n3. Intră dar în luptă! Spre Domnul privește!\nDar ia-ţi toată armătura! Rău nu te atinge.\n\n4. De toate vei face, și lupta-ţi s-a sfârși,\nVei vedea că, ţie, Christos ţi-a da biruinţă.` },
            242: { title: "Scoală, Sioane!", text: `1. Scoală, Sioane, ‘mbrăcat în soare! Ridică-ţi capul între popoare!\nPrivește la gloria cerului, ce peste Tin’ lumina revarsă!\n\n2. Pe calea ‘naltă a ţării, vezi că toţi cei mântuiţi pe Isus primesc?\nAuzi cum Îl laudă pământul? Iehova e vestit în tot locul.\n\n3. Mare, pământ și cer deși dispar, această lume rea s-a nimici.\nDar cuvântul lui Dumnezeu zice că domnia lui Mesia vine.` },
            243: { title: "Stânca veșnică", text: `1. Cel ce Te-ai deschis mie, stânca mea de scăpare,\nDușmanii mai mult mie nu-mi vor face stricare!\nAi murit pentru mine, plătind răscumpărare.\n\n2. Pe cin’ să-mi pun sarcina, de nu pe stânca asta?\nChiar de îmi arde zelul, ca râu curgă lacrima,\nNu-mi va da mântuire decât al Tău sfânt sânge!\n\n3. Sărman, dator precum sunt, la crucea Ta mă arunc,\nȘtiind că al Tău sânge s-a vărsat pentru mine,\nPăcatul mi-acoperit, de moarte m-a mântuit.` },
            244: { title: "Domnul în templul Său", text: `1. Al Domnului tron cu cete de îngeri e ‘nconjurat.\nCântând laudă, biserica cu aceasta e plină.\n\nRefren:\nSfânt, sfânt, sfânt, sfânt, sfânt ești, Doamne! Mărirea-Ţi peste tot e!\nLăudând în biserica Sa, pământul să-L mărească!\n\n2. Cu cântecul îngerilor ceruri noi continuă.\nSfinţii cei drepţi reînviaţi, cu zel, așa răsună.\n\n3. Și noi aici jos pe pământ, ca a Sa biserică,\nAuzind corul ceresc, să ne unim și noi cu el!` },
            245: { title: "În braţele lui Isus", text: `1. În braţele lui Isus, eu, capul îmi aplec.\nAcolo-mi e scăparea. La El mă odihnesc.\nPrin al Său cuvânt gentil, El, așa vorbește:\nVino, să îţi odihnești oboseala luptei!\n\nRefren:\nÎn braţele lui Isus, pot să mă odihnesc.\nInima mea zdrobită acol’ se bucură.\n\n2. Turnul inimii mele, Ţi-ai vărsat sângele!\nStând pe stâncă veșnică, rău nu mă atinge.\nAici liniștit aștept pân’ va trece ceaţa,\nȘi ziua Lui răsărind, va aduce pacea.` },
            246: { title: "Seceriș", text: `1. Sfinţi, vedeţi? Crapă zorile. Lumina e crescândă.\nLucrul este mult la care cuvântul te îndeamnă.\nPe Domnul roagă-L ne‘ncetat, să fii de El ajutat!\n\n2. Pe sfinţii Tăi, cum Tu voiești să îi folosești, Doamne,\nCa în a lor vase de lut comoara Ta s-o poarte!\nPe câmpul de lucru, Doamne, și pe noi trimite-ne!\n\n3. De chiar cu lacrimi vei lucra, bucurie vei avea,\nCă, unde au fost mari pustii, sună cânt de bucurii,\nMari privilegii, lucru scump. Stai, dar, curajos în rând!\n\n4. Nu peste mult, sfârși-se-va lucrul nostru de aici,\nȘi Domnul nost’, în patria noastră, ne va strămuta.\nInima ni se bucură că speranţa ni-e dreaptă.` },
            247: { title: "Mântuire", text: `1. Ce fericire-i cuvântul: “mântuire”, “milă”!\n|: Omului îi dă scăpare Domnul cel cu milă. :|\n\n2. Mântuire. Acest cuvânt să umple pământul!\n|: Răsune cu bucurie tuturor cântecul! :|\n\n3. Mântuire, ce toţi sfinţii posed prin credinţă!\n|: Caută voia Domnului și cred promisiunea. :|\n\n4. Mântuire. Ce minune, ce o face Christos!\n|: El la ‘mpărtășire cheamă pe oricine voios. :|\n\n5. Mântuire. Acest lucru pământul mângâie.\n|: Și când lucrul va fi gata, sună laudele. :|` },
            248: { title: "Păstorul nostru", text: `1. Domnul nost’, nutrește-ne! Și, ca bun păstor, condu-ne!\nDu-ne pe a Ta pășune, unde ne aflăm bine!\n|: Scumpe Isus! Scumpe Isus, suntem din a Ta turmă! :|\n\n2. Păzește-ne ca pe ai Tăi, că Domnul nostru Tu ești!\nO, nu lăsa să rătăcim! De dușmani să ne păzești!\n|: Scumpe Isus! Scumpe Isus, cererea ne ascultă! :|\n\n3. Tu ai promis că ne primești, deși suntem noi nedemni.\nLa Tine e ‘liberarea și mântuire avem.\n|: Scumpe Isus! Scumpe Isus, ruga noastră ne-ascultă! :|\n\n4. Har și ajutor Tu dă-ne, să-Ţi îndeplinim porunca!\nDoamne, Salvatorul nostru, las’ să fim cu Tin’ una!\n|: Scumpe Isus! Scumpe Isus, dă-ne a Ta iubire! :|` },
            249: { title: "Trimite, Doamne, lumina Ta!", text: `1. Trimite, Doamne, lumină, vizir să ne fie,\nS-ajungem pe muntele sfânt, să ne-nchinăm Ţie!\nTrimite-o pe uscat și-ape, ca Ţie toţi să se-nchine!\n\nRefren:\nLumina Ta dreaptă ni-o dă, Doamne!\n\n2. Trimite, Doamne, lumină, unde e păcatul!\nRidică ostașii crucii să ne dea cuvântul!\nRisipește rătăcirea, și răspândește-Ţi mărirea!\n\n3. Trimite, Doamne, lumină – vestea bucuriei –\nPână lumea va cunoaște cuvântul Scripturii!\nRazele stelelor Tale străbată tot mai departe!\n\n4. Trimite, Doamne, lumină, aducând ziua Ta,\nCa tot omul să vadă că Tu dai mântuirea!\nTrimite, Doamne, lumină! Deplină fă-Ţi domnia Ta!` },
            250: { title: "Sfinţire deplină", text: `1. Oare frica omenească mărginire să îmi fie,\nCa să-Ţi vorbesc lucrurile ce mii de inimi mângâie?\n\n2. Să privesc că ce vor zice? Mânie, zâmbet mă-nfrice?\nCum voi putea fi credincios? Cum voi rezista în probe?\n\n3. Doamne, eu voi fi credincios, primind cruce, batjocură!\nMă bucur în porunca Ta! Serviciul Tău mi-e plăcere!\n\n4. Mi-e mai plăcut pustiul cu Tine, o, dragă prietene,\nCă orice pompă, făr’ de Tin’, de simţul ceresc lipsește!\n\n5. Pompa lumii mi-e nimic chiar dacă cu lumina compar.\nVezi ce cerul ne dăruie, viitorul descoperă?\n\n6. Mana Lui e un gust dulce, din care mânc când mi-e bine.\nStâlpul de nor ni-e lumina ce ne conduce viaţa.\n\n7. Dar, urmând calea Domnului, cu o inimă smerită,\nUmblu voios pe calea Lui, ce-mi dă speranţă cerească.` },
            251: { title: "Va fi întâlnire?", text: `1. Oare va fi întâlnire când apa morţii trecem,\nUnde valuri nu ne ‘nfrică, vuietul ei se-alină?\nVom avea ‘ntâlnire, trecând noi potopul morţii,\nUnde e al vieţii pom, ce-n veci nu va veșteji?\n\n2. Vom avea întâlnire când va trece strâmtorarea,\nȘi a lui Christos domnie în tot locul străbate?\nVom avea ‘ntâlnire după marea strâmtorare,\nCând naţia, puterea și chiar Diavolul vor trece?\n\n3. Mare va fi bucuria când la mal vom ajunge,\nUnde, pe stânca vârstelor, calea păcii se ‘ntinde.\nÎntâlnire va fi în al fericirii port sfânt,\nUnde “fiul risipitor” viaţă poate primi.\n\n4. Gloriasa cetate ce cerul jos va trimite,\nCa o frumoasă mireasă, vine pentru salvare.\nVa fi întâlnire în Ierusalimul cel nou.\nJale, plâns, moarte nu vor fi, că e prezent Dumnezeu.\n\n5. Iubiţii noștri i-om vedea. O, ce simţ dulce va fi,\nCând moartea, păcatul vor fi prin Christos nimicite!\nÎntâlnire va fi când va trece lumea ‘ceasta.\nSe va sfârși apăsarea. Ce timp fericit va fi!` },
            252: { title: "Mireasa Regelui", text: `1. Mireasa frumoasă, în haine-aurite,\nVin’, urmată de fecioare, la Rege acasă.\n\n2. Vesel o aduc de fiice însoţită.\nÎn casa Regelui v’ avea locaș pe vecie.\n\n3. Fiii tăi vor fi în locul părinţilor, \nCar’ peste întreg pământul vor fi conducători.\n\n4. La toată naţia Îţi vestesc Numele, \nCa așa toţi pe vecie Ţie să se-nchine.` },
            253: { title: "Frumuseţea sfinţeniei", text: `1. Viaţa să ne exprime în noi sfinţenie dreaptă,\nCa să vadă orice om că harul cel ceresc lucrează.\n\n2. Credinţa și iubirea să nu dea loc egoismului.\nSă ne conducă Christos și să nu aibă loc păcatul.\n\n3. Tată ceresc, la Tin’ venim! Ajută calea să ţinem!\nDă-ne răbdare, lumină, să vorbim înţelepţește!` },
            254: { title: "Te încrede în El!", text: `1. Mâna Domnului te poartă bine, știi! Când mâna grea te mustră, fii liniștit,\nCă Tatăl te iubește, îţi dă învăţătură! De-i și dureros, în El te-ncrede!\n\n2. Nu te jeli! Nu murmura contra Lui! Ce nu poţi ca să înţelegi, așteaptă!\nȘi dacă te vor blama, în mărturisirea ta, liniștit ești de te vei încrede.\n\n3. În calea ta orice să te ‘ntâmpine, iubirea Sa pentru tine lucrează.\nȘi tu batjocuri rabdă, cu mare mulţumire! Bucuros, permite-I Lui! Nu-L urî!\n\n4. El dă putere în fiecare zi. Pace cel trist numai la El va primi. Pe cei slabi îngrijește.\nCa bun păstor îi poartă. O, acest cuget liniște ne dă!` },
            255: { title: "Înviere", text: `1. Cântă cu corul îngeresc despre timpul fericit,\nCând n-a mai fi moarte, jale, că va fi mântuire!\nIată, norii se-mprăștie! Noaptea groaznică trece,\nȘi în chipul lui Dumnezeu omul va afla pace.\n\n2. Ce prin mila lui Dumnezeu, noi, în Christos vom primi,\nOchi, urechi, inimi și minte n-or putea a preţui.\nPentru bunătatea mare, la car’ nimeni n-a gândit,\nToţi vor lăuda pe Dumnezeu, și chiar și cei din mormânt.` },
            256: { title: "Ostașul crucii, scoală!", text: `1. Ostașul crucii, scoală! Cu arma-ţi încinge-te!\nTe așteaptă lupta grea. Pregătește-te la ea!\nSteagul tău desfășoară, pe car’ stă vestea bună\n|: Că Christos e Regele! Dar tu, Lui, supune-te! :|\n\n2. Poartă vestea-n tot locul, să știe tot poporul!\nÎn gura ta să fie vestea de mângâiere!\nLa cel obosit spune că sosesc zile bune,\n|: Când necazul va trece, n-a mai fi chin și moarte! :|` },
            257: { title: "S-a ‘ntronat El!", text: `1. Laude făptura pe Isus! ‘Nainte, voi îngerii!\nPuneţi-I pe cap coroana!\n\nRefren:\n|: Pe tron a pășit El! :|\n\n2. Poporul lui Israel, din păcat răscumpărat,\nO, salută-ţi Regele tău!\n\n3. Voi sfinţi, a căror tristeţe nu se poate uita,\nCânt de biruinţă cântaţi!\n\n4. Orice neam, popor, ce este de pământ suportat,\nAdorând, închinaţi-vă!` },
            258: { title: "Cântarea nouă a pământului", text: `1. Cântecul jubiliar sună, în curând toată limba,\nCântarea slăvită care profetul Moise cânta.\nMântuitor, noi Te mărim! Emanuel, Te slăvim!\n\nRefren:\nAleluia! Aleluia! Aleluia! Amin.\n\n2. O istorie scumpă ce va cânta tot pământul,\nLăudând pe Mesia, toată limba răsună cântul,\nCă bunăstare, viaţă tot pământul vor umple. \n\n3. Cu ‘nchinare punem noi la piciorul Său coroana,\nȘi cu cetele îngerești și noi în cor vom cânta. \nAleluia! Că pământul tot cu pace va fi plin. \n\n4. Puterea își exercită Mesia, că e Rege.\nSperanţa Israelului iarăși se înnoiește.\nSalută-L, dar, că vrednic ca El nu este nimenea!` },
            259: { title: "Odihnă", text: `1. Restaurarea mărită pământul va liniști,\nCe cu bine va umple pe cei obosiţi și sleiţi.\n\nRefren:\n|: Odihnă la ostenit! :| Odihnă la ostenit!\nVa fi odihnă.\n\n2. În dosul pericolului pacea dulce zâmbește.\nA sosit Împărăţia! N-a mai fi violenţă. \n\n3. Moștenitorii măririi, sus! Dar cântec răsunaţi!\nLas’ să cunoască tot omul balsamul mântuirii!\n\n4. Răsunaţi! Edenul cum va fi din nou reașezat,\nCa grădina Domnului. Va privi omul patria.\n\n5. Moștenitorii măririi, sunaţi cânt de ‘nvingere!\nPe disperaţi a ‘nveseli prin cântări de laude.` },
            260: { title: "‘Nainte, pentru Isus!", text: `1. ‘Nainte, pentru Isus, tu ostașul crucii!\nVesel fâlfâie steagul! Cu El vei birui!\nChristos te va conduce. El dă învingere.\nBiruind toţi vrăjmașii, Domn El va rămâne.\n\n2. ‘Nainte, pentru Isus, în Dumnezeu crezând!\nTu însuţi în tine să nu te încrezi nicicând!\nÎn rugă, priveghind, să aștepţi porunca Sa!\nFă cu zel și credincios ce ţi-a încredinţat!\n\n3. ‘Nainte, pentru Isus, că lupta scurtă e!\nAzi sună glas de luptă, mâine de ‘nvingere.\nCoroane ale vieţii sunt pentru ‘nvingători.\nCu Regele măririi, ei pe veci vor domni.` },
            261: { title: "Pământul este al Domnului", text: `1. Va răsuna, nu peste mult, al bucuriei măreţ cânt,\nCă tot omul e-al Domnului și va domni peste pământ.\n\n2. Popoarele I se-nchină. La al Său cuvânt se pleacă.\nDomnia-I umple terenul. Lui se pleacă tot genunchiul.\n\n3. La Sion vor veni cu toţi. Bucuroși vor intra pe porţi,\nUnde nu va mai fi moarte, ci pace și fericire.` },
            262: { title: "Iehova este soare și scut", text: `1. Bun Părinte, soare îmi ești! Cu Tin’ noaptea nu m-atacă.\nChiar nor sau ceaţă pe mine de Tin’ nu mă acoperă.\n\n2. Îmi ești platoșa vieţii! De mă atacă dușmanii,\nCetatea-mi ești! Tu mă ascunzi! Înaintea-Ţi toate ruini.\n\n3. Cin’ lângă Tin’ va rămâne, din haru-Ţi Tău parte vei da.\nOile-Ţi nu duc lipsă, pân’ ele-n staulul Tău rămân.\n\n4. Pe al Tău Fiu, tezaur scump, pentru noi ca jertfă L-ai dat,\nCa preţ de răscumpărare, în faţa Ta apărare.\n\n5. Ce pentru noi așa preţ, dând moarte și mormânt distrugând,\nNu ne-ntinzi tot binele, ca salvarea plină să fie?` },
            263: { title: "Toată clipa-i fericită", text: `1. Toată clipa-i fericită, la crucea-Ţi petrecută!\nPrietenul păcătoșilor îmi dă viaţă, pace.\n\n2. O, ce loc scump de repaus! Aici a fi mi-e bine,\nA vedea lacrimile Lui, prin marea simpatie.\n\n3. Cu vărsări de lacrimi și eu ud picioarele sfinte,\nCă sângele Lui scump, vărsat, izvor de viaţă e.\n\n4. Deși plâng pentru moartea Lui, în mine simt mulţumiri,\nCă-mi dă scăpare, speranţă. Noaptea în zi o schimbă.` },
            264: { title: "Ora de rugăciune", text: `1. O, ce oră dulce, ce mă retrage de grijuri grele!\nLa Tronul Părintelui meu, să spun ruga, mă conduce.\nCând inima-mi repaus află, de gând sau mâhnire are,\n|: Se va depărta ispita. Repaus îmi dă ora dulce. :|\n\n2. O, ce oră dulce, ce la Domnul mintea îmi atrage!\nBinecuvântă pe cel ce la El caută mângâiere.\nDe când Îl cunosc și cred în cuvânt, ce poate să-mi strice?\n|: Predau eu Lui sarcina mea. Repaus îmi dă ora dulce. :|` },
            265: { title: "Slujbă îmbucurătoare", text: `1. O, Dumnezeu, Regele meu, a Te lăuda ce bine e!\nScopu-Ţi milos comunic eu! Serviciul Tău plăcere-mi e!\n\n2. Gânduri pământești nu-mi pasă de pot răspândi vestea Ta.\nCa David, numele-Ţi mare, prin cântece-L voi lăuda!\n\n3. Fericit cum să nu fiu eu dacă am credinţă vie?\nVăzând scopu-Ţi dumnezeiesc, să cânt despre el mi-e dulce.\n\n4. Inima-mi când e curată voi primi marea răsplată.\nHar, bucurii n-au sfârșire, că Tu le dai prelungire.\n\n5. O, să fii binecuvântat pentu cele ce Tu ne-ai dat!\nMi-e plăcere serviciul Tău! Îl fac din toată puterea.` },
            266: { title: "Totul să fie al Tău!", text: `1. O, primește-mă deplin! Ce am, tot al Tău fie!\nÎndeamnă, dar, mâna mea să fac a Ta plăcere!\n\n2. Primește-mi picioarele să poarte vestea bună!\nÎntărește vocea mea, pe Rege ca să laude!\n\n3. Îndreaptă-mi gura, limba să-Ţi vestească numele!\nFolosește-mi tot ce am! Să dispui Tu de mine!\n\n4. Fie-mi tot timpul al Tău! Îndreaptă-mi minutele!\nCum voiești să folosești Tu capacitatea mea!\n\n5. La picioarele Tale pun mintea și inima.\nO, deplin primește-mă! Tot ce am al Tău fie!` },
            267: { title: "Vestește-L!", text: `1. Vestește naţiunilor că Domnul e Rege! Vestește! Vestește!\nVestește naţiunilor că ce le așteaptă! Vestește !Vestește!\nVestește că puterea Lui n-are hotare,\nCă e Împăratul păcii și-aduce pace!\nVestește, și strigătul Tău sfârșit să n-aibă! Vestește! Vestește!\n\n2. Vestește naţiunilor e-aici domnia Lui! Vestește! Vestește!\nVestește păgânilor că lanţul lor s-a rupt! Vestește! Vestește!\nVestește celor ce plâng că Isus trăiește!\nVestește, obosiţilor, odihnă este!\nVestește păcătoșilor că-i mântuiește! Vestește! Vestește!\n\n3. Vestește naţiunilor că Isus ia tronul! Vestește! Vestește!\nVestește naţiunilor că pierde păcatul! Vestește! Vestește!\nVestește cu glas puternic, printre văi și munţi!\nVestește pe marea largă și chiar între stânci,\nCă sufletul cel obosit va fi fericit! Vestește! Vestește!` },
            268: { title: "Ia-ţi crucea ta! zise Isus", text: `1. “Ia-ţi crucea ta!” zise Isus, învăţăcel de vrei să-mi fii.\nLeapădă-te de tine și, urmând mie, umil să fii!\n\n2. “Ia-ţi crucea!” Și de va fi grea, nu-ţi dă gânduri grele ţie!\nHarul Său îţi dă putere. El îţi dă ajutor ţie.\n\n3. “Ia-ţi crucea!” Dar și luptă-te! În pericol să n-ai frică!\nPrin El moartea vei birui. Mâna-I tare ‘n cer te duce.\n\n4. “Ia-ţi crucea!” și jos n-o pune! Zelos poart-o pân’ la moarte!\nCel pân’ la sfârșit credincios va primi în cer patrie.` },
            269: { title: "Biserica", text: `1. Isus Christos, fundament la biserica Sa,\nPrin El sfântă ea este, lui Dumnezeu casă,\nVenind din cer s-aleagă pe ea de mireasă, \nCumpărând-o cu sânge, pe veci să trăiască.\n\n2. Popor sfânt ales de El, chemat din orice neam,\nPrin un Domn, credinţă, duh, ei cu toţii una sunt.\nLa un nume se-nchină. Într-un semn se unesc.\nUn scop măreţ au pentru care luptă, trăiesc.\n\n3. Lupta-i cu nepăsare. O privește lumea.\nSau a hulii săgeată mereu I-o aruncă.\nO, strigă credincioșii! Scoală Rege mare!\nVino soare-al dreptăţii, negura să treacă!\n\n4. Prigonit și apăsat prin luptă crâncenă,\nEroic luptând, cu dor, după biruinţă,\nLuptă! Până speranţa măreţ se ‘mplinește.\nIar cap și corp într-una cu Domnul să fie!` },
            270: { title: "Regele vine!", text: `1. Pe creasta munţilor zorile, fugărind negura mare,\nOpunători, poartă deschideţi, ca să primiţi pe Regele!\nVine! Vine El, Principele! Viaţă din El străluce’.\nSalutat fie din tot locul! Între Regi El e mai mare.\n\n2. Pe creasta munţilor zorile, străbătând tot mai departe, \nPământ, scoală! Drumul e gata acelui ce-n drept tronează.\nÎmprejur, chiar de negură e, raza prin ceaţă străbate.\nPe creastă, sus, asupra ceţii, deja se și văd zorile.` },
            271: { title: "O, Domnul lui Avram!", text: `1. O, Domnul lui Avraam, Te binecuvântăm!\nEști veșnic Atotputernic și iubire!\nNumele-Ţi Iehova! Zice toată lumea.\nA Ta este toată cinstea și mărirea!\n\n2. O, Domnul lui Avraam, aud cuvântul Tău!\nAștept numai mântuirea din harul Tău!\nComorile lumești la o parte le las,\nȘi Îl aleg pe El, care-i apărător.\n\n3. O, Domnul lui Avraam, mie, a Ta milă\nE destulă bucurie! Ea mă ducă!\nDoamne, m-ai invitat la moștenirea Ta!\nO, ţine-mă pentru Isus, și dă-mi milă!` },
            272: { title: "Slava lui Iehova", text: `1. Doamne, puterea-Ţi măreaţă firmamentul descoperă!\nIscoditorul, acolo, află dovezi fără număr.\n\n2. Autor al naturii mari, Tu ești care i-ai dat lege!\nTe lăudăm ca prima cauză, căutând drumu-Ţi cu ‘nchinare!\n\n3. Și până tot universul despre mărirea-Ţi vorbește,\nȘi făptura de pe pământ despre Tin’ mărturisește.\n\n4. Nu numai cer’ și pământul arată ‘nţelepciunea Ta.\nLumina cuvântului Tău ne conduce să-Ţi știm taina.\n\n5. Și când, în Christos, întreg’ cer și pământ una vor fi,\nPeste tot va fi lauda Ta. Toată făptura Te va ști.\n\n6. Prin credinţă și noi vedem lucrul măreţ al iubirii.\nDorim a Te vedea, și ce prin cuvântul Tău ne-ai promis.\n\n7. Car’ ne binecuvânţi, că ne pregătești loc chiar la Tine,\nPentru haru-Ţi nemărginit, cum să Te lăudăm cuvenit?` },
            273: { title: "Domnul este Rege!", text: `1. Domnul e Rege! Sus! La cânt! Pământ cer pe El preamărind,\nSă știe orișicine că marele Rege domnește!\nDomnul e Rege! Toţi cei sfinţi să vestească al Lui anunţ,\nÎmplinind tocmai voia Sa, bucuros făcând aceasta!\n\n2. Domnul e Rege! Voi oameni, a vă ‘mpotrivi nu ‘ncercaţi!\nEl cu dreptate judecă. Trăiește cel ce-L ascultă.\nDomnul e Rege puternic, distrugând pe nelegiuit.\nÎn Sion, pe tron, L’așezat! Iehova, ca Rege L-a dat!` },
            274: { title: "Un jug ușor", text: `1. Domnul e al meu Păstor ‘grijitor. El mă paște credincios\nPe câmpuri verzi. Și de-nsetez, mă duce la izvor.\n\nRefren:\nJugul Lui e ușor și foarte bun. Cei ce-l poartă sunt fericiţi.\nNoaptea, ziua El mă conducă la apa vieţii!\n\n2. Sufletu-mi strigă: O, ‘ntărește-mă! Dă-mi putere destulă,\nNumai pentru a Ta voie pe calea îngustă!\n\n3. Deși umblu în valea morţii, eu oare de ce să mă tem?\nMă apără toiagul Tău, Doamne! Și nu mă tem!` },
            275: { title: "Domnul a înviat!", text: `1. Domnul a înviat! Iadul nu-L mai ţine.\nToţi cei mântuiţi vor ieși, primind ei viaţă.\n\n2. Domnul a înviat! Moarte n-a mai vedea.\nSalvează pe cei car’ primesc răscumpărarea Sa.\n\n3. Domnul a înviat! Și ceata cerească,\nServind pe El, pe Domnul lor, voluntar se-nchină.\n\n4. Sioane, dar și tu ia-ţi harfa la mână,\nȘi cântă cu sfinţii îngeri a Sa înviere!` },
            276: { title: "Păstorul meu", text: `1. Domnul mă paște pe mine. Pe câmp frumos mă conduce.\nSe îngrijește credincios. În lipsă mă răcorește.\n\n2. De în pustii însetez, sau umblând pe coaste eu slăbesc,\nLa câmp bogat mă conduce, unde deplin mă răcoresc.\n\n3. Chiar de umblu în deșerturi, drumul e greu, brușos și sec,\nPrin harul Său, pentru mine, mângâieri, bucurii rodesc.\n\n4. Să umblu în valea morţii, groaza ei nu mă ‘nspăimântă.\nPăstorul meu e cu mine. Soarta cu El mi-e ușoară.` },
            277: { title: "Prezenţa Domnului", text: `1. Salvatorul e de faţă. Ziua Lui se vede.\nȘi, din semnele timpului, |: înţeleptul vede. :|\n\n2. El începe a guverna cu credincioșii Săi.\nEl, ca Rege, nu peste mult, |: pământul va salva. :|\n\n3. Rânduiala lumii rele El acum va zdrobi.\nȘi Satan domn nu va mai fi, |: rău n-a mai făptui. :|\n\n4. Car’ pentru El au suferit batjocură, moarte,\nÎnvie în mărire și |: cu Domnul tronează. :|\n\n5. Om’ acest timp nu bănuie cât de măreţ va fi.\nDar Biblia ne declară, |: și noi ne mulţumim. :|` },
            278: { title: "Zi măreaţă", text: `1. Noaptea a trecut. Aproape e ziuă, când odihnă e,\nCe Domnul câștigă. Ascultă! Trâmbiţa sună.\nCu speranţă totul umple. Ce ziuă măreaţă!\n\n2. Acest lucru de mare preţ au crezut apostoli, profeţi.\nN-a fost crez mincinos, pe car’ credincioși i-a găsit,\nMoarte, hulă au suferit, ca martori credincioși.\n\n3. Ei credincioși au rămas și răsplată mare vor primi,\nCa a luptei fructe. Vor fi ei regi și domnitori,\nPe om binecuvântători, în putere mare.` },
            279: { title: "Cântecul Mielului", text: `1. Noapte’-a trecut. Ziu’-a sosit. Raza Domnului străluce\nPe-ntregul orizont. A cânta încep zeci de mii\nUn cântec plin de bucurii. Acest cântec plăcut:\nFii vesel! Rasa-i liberă! Domnia rea se înfrânge!\nErori, gropi nu vor mai săpa, că stăpânește Mesia!\n\n2. Din Sion fulger străbate. Pomul vieţi’-acolo e,\nCe dă vindecare. Pe pământ va fi dreptate.\nȘi pe cer se va cunoaște, prin arcul Domnului,\nCe El nouă ca semn ne-a da că n-a mai fi păcat, moarte.\nȘi lumea greș nu va mai da, că stăpânește Mesia!` },
            280: { title: "Este Dumnezeu!", text: `1. Tot universul grăiește că Dumnezeu, da, există.\nCer, pământ despre El grăiesc, ce a creat și creează.\n\n2. Aurora zilei și-amurg’ ne vorbesc înţelepciune.\nA soarelui lumină ne vestește a Lui mărire.\n\n3. Despre El măreţ răsună stelele nenumărate.\nTu car’ vezi minunile, că Dumnezeu e, recunoaște!` },
